<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payments — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── Payments page ── */

/* balance hero */
.bal-hero{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:16px;margin-bottom:22px}
@media(max-width:860px){.bal-hero{grid-template-columns:1fr}}
.bal-main{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-radius:var(--r-lg);padding:22px 24px;position:relative;overflow:hidden}
.bal-main::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.07) 1px,transparent 1px);background-size:20px 20px}
.bal-main .blab{font-size:.78rem;color:rgba(255,255,255,.75);font-weight:500;position:relative}
.bal-main .bval{font-size:2.3rem;font-weight:800;color:#fff;font-family:var(--font-mono);letter-spacing:-.03em;margin-top:8px;line-height:1;position:relative}
.bal-main .bsub{display:flex;gap:18px;margin-top:16px;position:relative}
.bal-main .bsub .bi{font-size:.74rem;color:rgba(255,255,255,.7)}
.bal-main .bsub .bi b{display:block;font-family:var(--font-mono);font-size:.95rem;color:#fff;font-weight:700;margin-top:2px}
.bal-side{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;display:flex;flex-direction:column;justify-content:center}
.bal-side .bsl{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text-3);font-weight:500}
.bal-side .bsi{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.bal-side .bsi svg{width:16px;height:16px}
.bal-side .bsv{font-size:1.7rem;font-weight:800;font-family:var(--font-mono);letter-spacing:-.03em;margin-top:12px;line-height:1}
.bal-side .bsc{font-size:.74rem;color:var(--text-3);margin-top:7px}
.bsi.in{background:var(--ok-soft);color:var(--ok)}
.bsi.out{background:var(--danger-soft);color:var(--danger)}

/* toolbar */
.pay-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.pay-tabs{display:flex;gap:4px;flex-wrap:wrap}
.pay-tab{height:34px;padding:0 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--elev);font-size:.82rem;font-weight:600;color:var(--text-2);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.pay-tab:hover{border-color:var(--border-2);color:var(--text)}
.pay-tab.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
.pay-tab .tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pay-tab .tcnt{font-family:var(--font-mono);font-size:.64rem;padding:1px 6px;border-radius:99px;background:rgba(255,255,255,.07)}
.pay-tab.on .tcnt{background:var(--accent-soft-2)}
.pay-search{display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;background:var(--elev);border:1px solid var(--border);border-radius:9px;color:var(--text-3);min-width:200px}
.pay-search svg{width:14px;height:14px;flex-shrink:0}
.pay-search input{background:none;border:none;outline:none;font-family:inherit;font-size:.82rem;color:var(--text);width:100%}
.pay-search input::placeholder{color:var(--text-3)}

/* transactions table */
.pay-table-wrap{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow-x:auto}
.pay-table{width:100%;border-collapse:collapse;min-width:820px}
.pay-table th{text-align:left;padding:11px 16px;font-family:var(--font-mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:600;background:var(--content);border-bottom:1px solid var(--border);white-space:nowrap}
.pay-table th.r,.pay-table td.r{text-align:right}
.pay-table td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.pay-table tbody tr:last-child td{border-bottom:none}
.pay-table tbody tr{transition:background .12s;cursor:pointer}
.pay-table tbody tr:hover{background:var(--content)}

/* txn type icon */
.txn-ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.txn-ico svg{width:17px;height:17px}
.txn-ico.salary{background:rgba(59,91,219,.13);color:var(--accent-ink)}
.txn-ico.vendor{background:rgba(245,158,11,.13);color:var(--warn)}
.txn-ico.client{background:rgba(74,222,128,.13);color:var(--ok)}
.txn-ico.reimburse{background:rgba(167,139,250,.14);color:#a78bfa}
.txn-ico.refund{background:rgba(255,107,107,.12);color:var(--danger)}
.txn-ico.tax{background:var(--border);color:var(--text-2)}

.txn-name{font-size:.88rem;font-weight:600;color:var(--text)}
.txn-cat{font-size:.72rem;color:var(--text-3);font-family:var(--font-mono);margin-top:2px}
.txn-id{font-family:var(--font-mono);font-size:.72rem;color:var(--text-3)}
.txn-method{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-2)}
.txn-method svg{width:14px;height:14px;color:var(--text-3)}
.txn-date{font-family:var(--font-mono);font-size:.78rem;color:var(--text-2)}
.txn-amt{font-family:var(--font-mono);font-size:.92rem;font-weight:800}
.txn-amt.in{color:var(--ok)}
.txn-amt.out{color:var(--text)}

/* status chip */
.pst{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:99px;white-space:nowrap}
.pst.completed{background:var(--ok-soft);color:var(--ok)}
.pst.pending{background:var(--warn-soft);color:var(--warn)}
.pst.scheduled{background:rgba(59,91,219,.14);color:var(--accent-ink)}
.pst.failed{background:var(--danger-soft);color:var(--danger)}

/* drawer */
.pd-back{position:fixed;inset:0;background:rgba(4,8,18,.6);backdrop-filter:blur(3px);z-index:100;opacity:0;transition:opacity .22s;pointer-events:none}
.pd-back.open{opacity:1;pointer-events:auto}
.pd-drawer{position:fixed;top:0;right:0;height:100vh;width:540px;max-width:96vw;background:var(--elev);border-left:1px solid var(--border-2);box-shadow:-30px 0 60px rgba(0,0,0,.45);z-index:101;transform:translateX(100%);transition:transform .28s var(--ease);display:flex;flex-direction:column;overflow:hidden}
.pd-drawer.open{transform:translateX(0)}
.pd-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.pd-close{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none}
.pd-close:hover{background:var(--content);color:var(--text)}
.pd-close svg{width:17px;height:17px}
.pd-body{flex:1;overflow-y:auto;padding:22px}

.amt-hero{text-align:center;padding:22px;background:var(--content);border:1px solid var(--border);border-radius:14px;margin-bottom:20px}
.amt-hero .ah-ico{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;margin:0 auto 12px}
.amt-hero .ah-ico svg{width:24px;height:24px}
.amt-hero .ah-amt{font-family:var(--font-mono);font-size:2rem;font-weight:800;letter-spacing:-.03em;line-height:1}
.amt-hero .ah-lbl{font-size:.8rem;color:var(--text-3);margin-top:8px}

.dsec{font-family:var(--font-mono);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px}
.dcard{background:var(--content);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.drow{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none}
.drow .dl{font-size:.8rem;color:var(--text-3);min-width:120px;flex-shrink:0}
.drow .dv{font-size:.88rem;color:var(--text);flex:1;display:flex;align-items:center;gap:8px;font-weight:500}

/* timeline */
.tl-steps{display:flex;flex-direction:column;gap:0;margin-bottom:8px}
.tl-step{display:flex;gap:12px;padding-bottom:18px;position:relative}
.tl-step:last-child{padding-bottom:0}
.tl-step::before{content:"";position:absolute;left:11px;top:24px;bottom:-2px;width:2px;background:var(--border)}
.tl-step:last-child::before{display:none}
.tl-step.done::before{background:var(--ok)}
.tl-dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;z-index:1;font-size:.6rem}
.tl-dot.done{background:var(--ok);color:#fff}
.tl-dot.active{background:var(--accent);color:#fff;box-shadow:0 0 0 4px var(--accent-soft)}
.tl-dot.todo{background:var(--border);color:var(--text-3)}
.tl-dot svg{width:13px;height:13px}
.tl-info .tlt{font-size:.86rem;font-weight:600;color:var(--text)}
.tl-info .tlt.todo{color:var(--text-3);font-weight:500}
.tl-info .tlm{font-size:.74rem;color:var(--text-3);font-family:var(--font-mono);margin-top:1px}

.pd-foot{flex-shrink:0;border-top:1px solid var(--border);padding:16px 22px;display:flex;gap:10px}

/* create modal */
.pm-modal{width:100%;max-width:520px;max-height:92vh;background:var(--elev);border:1px solid var(--border-2);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden}
.pm-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.pm-head .ico{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;flex-shrink:0}
.pm-head .ico svg{width:17px;height:17px;color:#fff}
.pm-head h3{font-size:1rem;font-weight:700}
.pm-head .x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none}
.pm-head .x:hover{background:var(--content);color:var(--text)}
.pm-head .x svg{width:17px;height:17px}
.pm-body{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:16px}
.pm-foot{flex-shrink:0;display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border)}
.pm-field{display:flex;flex-direction:column;gap:6px}
.pm-field label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3)}
.pm-field input,.pm-field select,.pm-field textarea{font-family:inherit;font-size:.9rem;color:var(--text);background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:9px 12px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.pm-field input:focus,.pm-field select:focus,.pm-field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.pm-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.pm-row{grid-template-columns:1fr}}
/* direction toggle */
.dir-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dir-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:10px;border:2px solid var(--border);background:var(--content);cursor:pointer;font-family:inherit;font-size:.86rem;font-weight:600;color:var(--text-2);transition:all .15s}
.dir-btn svg{width:16px;height:16px}
.dir-btn.on.in{border-color:var(--ok);background:var(--ok-soft);color:var(--ok)}
.dir-btn.on.out{border-color:var(--danger);background:var(--danger-soft);color:var(--danger)}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--elev);border:1px solid var(--border-2);border-radius:10px;padding:12px 22px;font-size:.86rem;font-weight:500;color:var(--text);box-shadow:var(--shadow-lg);z-index:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-left:3px solid var(--ok)}
.toast.warn{border-left:3px solid var(--warn)}
.toast.err{border-left:3px solid var(--danger)}
</style>
</head>
<body>
<div class="nav-scrim" id="navScrim"></div>
<div class="app">
<aside class="side">
  <div class="side-brand"><span class="lm">j</span><div><div class="bt">jobihome</div><div class="bs">Workspace · Do thi Lan</div></div></div>
  <nav class="side-nav scroll" id="sideNav"></nav>
  <div class="side-foot"><div class="side-user"><span class="av">DL</span><div><div class="un">Do thi Lan</div><div class="ur">Super Admin</div></div><span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg></span></div></div>
</aside>
<div class="main">
  <header class="topbar">
    <button class="tb-icon menu-btn" id="menuBtn" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
    <div><div class="tb-title">Payments</div></div>
    <div class="tb-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input type="text" placeholder="Tìm giao dịch…"/><kbd>⌘K</kbd></div>
    <div class="tb-right">
      <button class="tb-icon" id="themeToggle" aria-label="Sáng/Tối">
        <span class="icon-moon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
        <span class="icon-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
      </button>
      <button class="tb-icon" aria-label="Thông báo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="dot"></span></button>
    </div>
  </header>

  <main class="content scroll">
    <div class="content-inner">

      <div class="page-head" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px">
        <div>
          <h1>Payments</h1>
          <p>Dòng tiền &amp; giao dịch · Tháng 6/2026 · <b id="pendingHead">—</b> giao dịch chờ xử lý</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="abtn ghost" id="exportBtn" style="gap:7px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Xuất sổ quỹ
          </button>
          <button class="abtn primary" id="newPayBtn" style="gap:7px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>
            Tạo giao dịch
          </button>
        </div>
      </div>

      <!-- Balance hero -->
      <div class="bal-hero">
        <div class="bal-main">
          <div class="blab">Số dư khả dụng · Tài khoản công ty</div>
          <div class="bval" id="balanceVal">—</div>
          <div class="bsub">
            <div class="bi">Tiền vào tháng này<b id="inMonth">—</b></div>
            <div class="bi">Tiền ra tháng này<b id="outMonth">—</b></div>
          </div>
        </div>
        <div class="bal-side">
          <div class="bsl"><span class="bsi in"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg></span>Đã thu</div>
          <div class="bsv" style="color:var(--ok)" id="totalIn">—</div>
          <div class="bsc" id="inCount">—</div>
        </div>
        <div class="bal-side">
          <div class="bsl"><span class="bsi out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg></span>Đã chi</div>
          <div class="bsv" id="totalOut">—</div>
          <div class="bsc" id="outCount">—</div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="pay-bar">
        <div class="pay-tabs" id="payTabs"></div>
        <div style="flex:1"></div>
        <div class="pay-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input type="text" id="paySearch" placeholder="Tìm đối tác, mã GD…"/>
        </div>
      </div>

      <!-- Table -->
      <div class="pay-table-wrap">
        <table class="pay-table">
          <thead>
            <tr>
              <th>Giao dịch</th>
              <th>Mã GD</th>
              <th>Phương thức</th>
              <th>Ngày</th>
              <th class="r">Số tiền</th>
              <th>Trạng thái</th>
            </tr>
          </thead>
          <tbody id="payBody"></tbody>
        </table>
      </div>

    </div>
  </main>
</div>
</div>

<!-- Detail drawer -->
<div class="pd-back" id="pdBack"></div>
<div class="pd-drawer" id="pdDrawer">
  <div class="pd-head">
    <div class="txn-ico" id="pdIco" style="width:38px;height:38px">—</div>
    <div style="flex:1;min-width:0">
      <div id="pdTitle" style="font-size:.98rem;font-weight:700;color:var(--text)"></div>
      <div id="pdSub" style="font-size:.74rem;color:var(--text-3);font-family:var(--font-mono);margin-top:2px"></div>
    </div>
    <button class="pd-close" id="pdClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  </div>
  <div class="pd-body" id="pdBody"></div>
  <div class="pd-foot" id="pdFoot"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

/* ── CATEGORY META ── */
var CATS = {
  salary:   {l:"Lương nhân viên",   dir:"out", cls:"salary",   svg:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>'},
  vendor:   {l:"Nhà cung cấp",      dir:"out", cls:"vendor",   svg:'<path d="M3 9l1-5h16l1 5M4 9v11a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9M9 13h6" stroke-linecap="round" stroke-linejoin="round"/>'},
  reimburse:{l:"Hoàn ứng nhân viên", dir:"out", cls:"reimburse",svg:'<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18M7 15h4" stroke-linecap="round"/>'},
  tax:      {l:"Thuế & BH",         dir:"out", cls:"tax",      svg:'<path d="M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6" stroke-linecap="round" stroke-linejoin="round"/>'},
  client:   {l:"Thu từ khách hàng", dir:"in",  cls:"client",   svg:'<circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6" stroke-linecap="round" stroke-linejoin="round"/>'},
  refund:   {l:"Hoàn tiền KH",      dir:"out", cls:"refund",   svg:'<path d="M3 7v6h6M3 13a9 9 0 1 0 3-7" stroke-linecap="round" stroke-linejoin="round"/>'}
};
var METHODS = {
  bank:    {l:"Chuyển khoản", svg:'<rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18" stroke-linecap="round"/>'},
  cash:    {l:"Tiền mặt",     svg:'<rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/>'},
  vnpay:   {l:"VNPay QR",     svg:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 14v.01M17 21h.01M21 21v-3" stroke-linecap="round"/>'},
  card:    {l:"Thẻ tín dụng", svg:'<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20" stroke-linecap="round"/>'}

/* ── STATE ── */
var selTab="all", search="", openId=null;

/* ── UTILS ── */
function fmt(n){
  if(n>=1000000) return (n/1000000).toFixed(n%1000000===0?0:1)+"tr";
  if(n>=1000) return Math.round(n/1000)+"k";
  return n.toLocaleString("vi-VN");
}
function fmtFull(n){return n.toLocaleString("vi-VN")+"đ";}
function viDate(d){var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function statusLabel(s){return {completed:"Hoàn tất",pending:"Chờ xử lý",scheduled:"Đã lên lịch",failed:"Thất bại"}[s]||s;}
function dirOf(t){return CATS[t.cat]?CATS[t.cat].dir:"out";}

function filtered(){
  return TXNS.filter(function(t){
    if(selTab==="in"&&dirOf(t)!=="in") return false;
    if(selTab==="out"&&dirOf(t)!=="out") return false;
    if(selTab==="pending"&&!(t.status==="pending"||t.status==="scheduled"||t.status==="failed")) return false;
    if(search){
      var q=search.toLowerCase();
      return t.party.toLowerCase().indexOf(q)!==-1||t.id.toLowerCase().indexOf(q)!==-1||(t.ref||"").toLowerCase().indexOf(q)!==-1||CATS[t.cat].l.toLowerCase().indexOf(q)!==-1;
    }
    return true;
  });
}

/* ── HERO + KPIs ── */
function renderHero(){
  var ins=TXNS.filter(function(t){return dirOf(t)==="in"&&t.status==="completed";});
  var outs=TXNS.filter(function(t){return dirOf(t)==="out"&&t.status==="completed";});
  var totalIn=ins.reduce(function(a,t){return a+t.amount;},0);
  var totalOut=outs.reduce(function(a,t){return a+t.amount;},0);
  var pending=TXNS.filter(function(t){return t.status==="pending"||t.status==="scheduled"||t.status==="failed";}).length;

  document.getElementById("balanceVal").textContent=fmtFull(BALANCE);
  document.getElementById("inMonth").textContent="+"+fmt(totalIn);
  document.getElementById("outMonth").textContent="−"+fmt(totalOut);
  document.getElementById("totalIn").textContent=fmt(totalIn);
  document.getElementById("totalOut").textContent=fmt(totalOut);
  document.getElementById("inCount").textContent=ins.length+" giao dịch thu";
  document.getElementById("outCount").textContent=outs.length+" giao dịch chi";
  document.getElementById("pendingHead").textContent=pending;
}

/* ── TABS ── */
function renderTabs(){
  var counts={
    all:TXNS.length,
    in:TXNS.filter(function(t){return dirOf(t)==="in";}).length,
    out:TXNS.filter(function(t){return dirOf(t)==="out";}).length,
    pending:TXNS.filter(function(t){return t.status==="pending"||t.status==="scheduled"||t.status==="failed";}).length
  };
  var tabs=[
    {k:"all",l:"Tất cả",dot:"var(--text-3)"},
    {k:"in",l:"Tiền vào",dot:"var(--ok)"},
    {k:"out",l:"Tiền ra",dot:"var(--danger)"},
    {k:"pending",l:"Chờ xử lý",dot:"var(--warn)"}
  ];
  document.getElementById("payTabs").innerHTML=tabs.map(function(t){
    return '<button class="pay-tab'+(selTab===t.k?" on":"")+'" data-k="'+t.k+'"><span class="tdot" style="background:'+t.dot+'"></span>'+t.l+'<span class="tcnt">'+counts[t.k]+'</span></button>';
  }).join("");
}

/* ── TABLE ── */
function renderTable(){
  var list=filtered().sort(function(a,b){return b.date.localeCompare(a.date)||b.id.localeCompare(a.id);});
  var body=document.getElementById("payBody");
  if(!list.length){
    body.innerHTML='<tr><td colspan="6" style="text-align:center;padding:48px;color:var(--text-3)">Không có giao dịch nào.</td></tr>';
    return;
  }
  body.innerHTML=list.map(function(t){
    var c=CATS[t.cat], m=METHODS[t.method], dir=c.dir;
    return '<tr data-id="'+t.id+'">'+
      '<td><div style="display:flex;align-items:center;gap:11px">'+
        '<div class="txn-ico '+c.cls+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+c.svg+'</svg></div>'+
        '<div style="min-width:0"><div class="txn-name">'+t.party+'</div><div class="txn-cat">'+c.l+'</div></div>'+
      '</div></td>'+
      '<td><span class="txn-id">'+t.id+'</span></td>'+
      '<td><span class="txn-method"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+m.svg+'</svg>'+m.l+'</span></td>'+
      '<td><span class="txn-date">'+viDate(t.date)+'</span></td>'+
      '<td class="r"><span class="txn-amt '+dir+'">'+(dir==="in"?"+":"−")+fmtFull(t.amount)+'</span></td>'+
      '<td><span class="pst '+t.status+'">'+statusLabel(t.status)+'</span></td>'+
    '</tr>';
  }).join("");
}

/* ── DRAWER ── */
function timelineFor(t){
  var steps;
  if(t.status==="completed"){
    steps=[{l:"Tạo giao dịch",m:viDate(t.date)+" · hệ thống",s:"done"},{l:"Phê duyệt",m:"Do thi Lan",s:"done"},{l:"Hoàn tất chuyển khoản",m:viDate(t.date)+" · "+METHODS[t.method].l,s:"done"}];
  } else if(t.status==="scheduled"){
    steps=[{l:"Tạo giao dịch",m:"hệ thống",s:"done"},{l:"Phê duyệt",m:"Do thi Lan",s:"done"},{l:"Chờ đến ngày chi ("+viDate(t.date)+")",m:"tự động thực hiện",s:"active"},{l:"Hoàn tất",m:"chưa thực hiện",s:"todo"}];
  } else if(t.status==="pending"){
    steps=[{l:"Tạo giao dịch",m:"hệ thống",s:"done"},{l:"Đang xử lý tại ngân hàng",m:"chờ xác nhận",s:"active"},{l:"Hoàn tất",m:"chưa thực hiện",s:"todo"}];
  } else {
    steps=[{l:"Tạo giao dịch",m:"hệ thống",s:"done"},{l:"Thực hiện chuyển khoản",m:"thất bại — sai STK",s:"done"},{l:"Cần xử lý lại",m:"chờ thao tác",s:"active"}];
  }
  return '<div class="tl-steps">'+steps.map(function(st){
    var ic=st.s==="done"?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>':st.s==="active"?'●':'';
    return '<div class="tl-step '+(st.s==="done"?"done":"")+'">'+
      '<div class="tl-dot '+st.s+'">'+ic+'</div>'+
      '<div class="tl-info"><div class="tlt '+(st.s==="todo"?"todo":"")+'">'+st.l+'</div><div class="tlm">'+st.m+'</div></div>'+
    '</div>';
  }).join("")+'</div>';
}

function openDrawer(id){
  var t=TXNS.find(function(x){return x.id===id;});
  if(!t) return;
  openId=id;
  var c=CATS[t.cat], m=METHODS[t.method], dir=c.dir;
  var ico=document.getElementById("pdIco");
  ico.className="txn-ico "+c.cls;ico.style.width="38px";ico.style.height="38px";
  ico.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+c.svg+'</svg>';
  document.getElementById("pdTitle").textContent=t.party;
  document.getElementById("pdSub").textContent=t.id+" · "+c.l;

  var amtColor=dir==="in"?"var(--ok)":t.status==="failed"?"var(--danger)":"var(--text)";
  document.getElementById("pdBody").innerHTML=
    '<div class="amt-hero">'+
      '<div class="ah-ico '+c.cls+'" style="background:'+(dir==="in"?"var(--ok-soft)":"var(--accent-soft)")+'"><svg viewBox="0 0 24 24" fill="none" stroke="'+amtColor+'" stroke-width="2">'+c.svg+'</svg></div>'+
      '<div class="ah-amt" style="color:'+amtColor+'">'+(dir==="in"?"+":"−")+fmtFull(t.amount)+'</div>'+
      '<div class="ah-lbl">'+(dir==="in"?"Tiền vào":"Tiền ra")+' · <span class="pst '+t.status+'" style="margin-left:4px">'+statusLabel(t.status)+'</span></div>'+
    '</div>'+
    '<div class="dsec">Chi tiết giao dịch</div>'+
    '<div class="dcard">'+
      '<div class="drow"><span class="dl">Mã giao dịch</span><span class="dv" style="font-family:var(--font-mono)">'+t.id+'</span></div>'+
      '<div class="drow"><span class="dl">Loại</span><span class="dv">'+c.l+'</span></div>'+
      '<div class="drow"><span class="dl">Phương thức</span><span class="dv"><svg viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" width="15" height="15">'+m.svg+'</svg>'+m.l+'</span></div>'+
      '<div class="drow"><span class="dl">Tài khoản</span><span class="dv" style="font-family:var(--font-mono)">'+t.account+'</span></div>'+
      '<div class="drow"><span class="dl">Mã tham chiếu</span><span class="dv" style="font-family:var(--font-mono);color:var(--accent-ink)">'+t.ref+'</span></div>'+
      '<div class="drow"><span class="dl">Ngày</span><span class="dv">'+viDate(t.date)+'</span></div>'+
    '</div>'+
    (t.note?'<div class="dsec">Ghi chú</div><div style="font-size:.88rem;color:var(--text-2);line-height:1.6;padding:14px;background:var(--content);border:1px solid var(--border);border-radius:10px;margin-bottom:20px">'+t.note+'</div>':'')+
    '<div class="dsec">Tiến trình</div>'+
    timelineFor(t);

  /* footer actions */
  var foot=document.getElementById("pdFoot");
  if(t.status==="pending"){
    foot.style.display="flex";
    foot.innerHTML='<button class="abtn ghost" data-act="export" style="flex:1">📄 Xuất chứng từ</button><button class="abtn primary" data-act="confirm" style="flex:1">✓ Xác nhận hoàn tất</button>';
  } else if(t.status==="scheduled"){
    foot.style.display="flex";
    foot.innerHTML='<button class="abtn ghost" data-act="cancel" style="flex:1;color:var(--danger);border-color:rgba(255,107,107,.3)">Hủy lịch</button><button class="abtn primary" data-act="paynow" style="flex:1">Chi ngay</button>';
  } else if(t.status==="failed"){
    foot.style.display="flex";
    foot.innerHTML='<button class="abtn ghost" data-act="export" style="flex:1">📄 Chứng từ</button><button class="abtn primary" data-act="retry" style="flex:1">↻ Thử lại</button>';
  } else {
    foot.style.display="flex";
    foot.innerHTML='<button class="abtn ghost" data-act="export" style="width:100%">📄 Xuất chứng từ PDF</button>';
  }

  document.getElementById("pdBack").classList.add("open");
  document.getElementById("pdDrawer").classList.add("open");
}
function closeDrawer(){
  document.getElementById("pdBack").classList.remove("open");
  document.getElementById("pdDrawer").classList.remove("open");
  openId=null;
}

/* ── CREATE MODAL ── */
function openModal(){
  if(document.getElementById("payModal")) return;
  var dir="out", cat="vendor";
  var back=document.createElement("div");back.className="modal-back";back.id="payModal";
  back.innerHTML='<div class="pm-modal">'+
    '<div class="pm-head">'+
      '<div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>'+
      '<h3>Tạo giao dịch mới</h3>'+
      '<button class="x" id="pmClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>'+
    '</div>'+
    '<div class="pm-body">'+
      '<div class="pm-field"><label>Loại dòng tiền</label>'+
        '<div class="dir-row" id="dirRow">'+
          '<button class="dir-btn out on" data-dir="out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>Tiền ra (chi)</button>'+
          '<button class="dir-btn in" data-dir="in"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>Tiền vào (thu)</button>'+
        '</div>'+
      '</div>'+
      '<div class="pm-field"><label>Hạng mục</label><select id="pmCat"></select></div>'+
      '<div class="pm-field"><label>Đối tác / Nội dung *</label><input type="text" id="pmParty" placeholder="vd. Nhà cung cấp ABC…"/></div>'+
      '<div class="pm-row">'+
        '<div class="pm-field"><label>Số tiền (đ) *</label><input type="number" id="pmAmt" min="0" step="1000" placeholder="vd. 5000000"/></div>'+
        '<div class="pm-field"><label>Ngày *</label><input type="date" id="pmDate" value="2026-06-15"/></div>'+
      '</div>'+
      '<div class="pm-row">'+
        '<div class="pm-field"><label>Phương thức</label><select id="pmMethod">'+Object.keys(METHODS).map(function(k){return '<option value="'+k+'">'+METHODS[k].l+'</option>';}).join("")+'</select></div>'+
        '<div class="pm-field"><label>Trạng thái</label><select id="pmStatus"><option value="completed">Hoàn tất</option><option value="pending">Chờ xử lý</option><option value="scheduled">Lên lịch</option></select></div>'+
      '</div>'+
      '<div class="pm-field"><label>Ghi chú</label><textarea id="pmNote" rows="2" placeholder="Mô tả thêm về giao dịch…" style="resize:vertical;min-height:60px"></textarea></div>'+
    '</div>'+
    '<div class="pm-foot"><button class="abtn ghost" id="pmCancel">Hủy</button><button class="abtn primary" id="pmSave">Tạo giao dịch</button></div>'+
  '</div>';
  document.body.appendChild(back);

  function fillCats(){
    var sel=document.getElementById("pmCat");
    var keys=Object.keys(CATS).filter(function(k){return CATS[k].dir===dir;});
    sel.innerHTML=keys.map(function(k){return '<option value="'+k+'">'+CATS[k].l+'</option>';}).join("");
    cat=keys[0];
  }
  fillCats();

  document.getElementById("dirRow").addEventListener("click",function(e){
    var b=e.target.closest(".dir-btn");if(!b)return;
    dir=b.dataset.dir;
    document.querySelectorAll(".dir-btn").forEach(function(x){x.classList.remove("on");});
    b.classList.add("on");
    fillCats();
  });
  document.getElementById("pmCat").addEventListener("change",function(){cat=this.value;});

  function close(){var m=document.getElementById("payModal");if(m)m.remove();}
  back.addEventListener("click",function(e){if(e.target===back)close();});
  document.getElementById("pmClose").addEventListener("click",close);
  document.getElementById("pmCancel").addEventListener("click",close);
  document.getElementById("pmSave").addEventListener("click",function(){
    var party=document.getElementById("pmParty").value.trim();
    var amt=parseInt(document.getElementById("pmAmt").value)||0;
    var date=document.getElementById("pmDate").value;
    var method=document.getElementById("pmMethod").value;
    var status=document.getElementById("pmStatus").value;
    var note=document.getElementById("pmNote").value.trim();
    if(!party||!amt||!date){showToast("Điền đầy đủ thông tin *","err");return;}
    var id="PAY-"+String(nextId++).padStart(4,"0");
    TXNS.unshift({id:id,cat:cat,party:party,amount:amt,method:method,date:date,status:status,ref:"REF-"+nextId,note:note,account:"VCB ****4412"});
    if(status==="completed"){BALANCE+=(dir==="in"?amt:-amt);}
    close();renderAll();
    showToast("Đã tạo giao dịch "+id+" ✓","ok");
  });
  requestAnimationFrame(function(){document.getElementById("pmParty").focus();});
}

/* ── EVENTS ── */
document.getElementById("payBody").addEventListener("click",function(e){
  var row=e.target.closest("tr[data-id]");
  if(row) openDrawer(row.dataset.id);
});
document.getElementById("payTabs").addEventListener("click",function(e){
  var b=e.target.closest(".pay-tab");if(!b)return;
  selTab=b.dataset.k;renderTabs();renderTable();
});
document.getElementById("paySearch").addEventListener("input",function(e){search=e.target.value.trim();renderTable();});
document.getElementById("pdBack").addEventListener("click",closeDrawer);
document.getElementById("pdClose").addEventListener("click",closeDrawer);
document.getElementById("pdFoot").addEventListener("click",function(e){
  var b=e.target.closest("[data-act]");if(!b||!openId)return;
  var act=b.dataset.act, idx=TXNS.findIndex(function(x){return x.id===openId;});
  if(act==="export"){showToast("Đang tạo chứng từ PDF…","ok");return;}
  if(idx===-1)return;
  if(act==="confirm"||act==="paynow"||act==="retry"){
    var was=TXNS[idx].status;
    TXNS[idx].status="completed";
    if(was!=="completed"){BALANCE+=(dirOf(TXNS[idx])==="in"?TXNS[idx].amount:-TXNS[idx].amount);}
    showToast("Giao dịch đã hoàn tất ✓","ok");
  } else if(act==="cancel"){
    TXNS.splice(idx,1);showToast("Đã hủy giao dịch theo lịch","warn");
  }
  closeDrawer();renderAll();
});
document.getElementById("newPayBtn").addEventListener("click",openModal);
document.getElementById("exportBtn").addEventListener("click",function(){showToast("Đang xuất sổ quỹ Excel…","ok");});

/* ── TOAST ── */
function showToast(msg,type){
  var t=document.getElementById("toast");
  t.textContent=msg;t.className="toast "+(type||"ok");
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2800);
}

/* ── RENDER ── */
function renderAll(){renderHero();renderTabs();renderTable();}
renderAll();

})();
