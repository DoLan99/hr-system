<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Task Reviews — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── Task Reviews page ── */

/* status tabs */
.rev-tabs{display:flex;align-items:center;gap:4px}
.rev-tab{height:32px;padding:0 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--elev);font-size:.81rem;font-weight:600;color:var(--text-2);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.rev-tab:hover{border-color:var(--border-2);color:var(--text)}
.rev-tab.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
.rev-tab .tcnt{font-family:var(--font-mono);font-size:.64rem;padding:1px 6px;border-radius:99px;background:rgba(255,255,255,.1)}
.rev-tab.on .tcnt{background:var(--accent-soft-2)}

/* review status chips */
.rev-status{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:.69rem;font-weight:700;padding:4px 10px;border-radius:99px;white-space:nowrap;letter-spacing:.02em}
.rev-status.pending{background:var(--warn-soft);color:var(--warn)}
.rev-status.approved{background:var(--ok-soft);color:var(--ok)}
.rev-status.changes{background:rgba(139,92,246,.13);color:#a78bfa}
.rev-status.rejected{background:var(--danger-soft);color:var(--danger)}

/* main review table */
.rev-table-wrap{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.rev-table{width:100%;border-collapse:collapse}
.rev-table th{text-align:left;padding:10px 16px;font-family:var(--font-mono);font-size:.67rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:600;background:var(--content);border-bottom:1px solid var(--border);white-space:nowrap}
.rev-table td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
.rev-table tbody tr:last-child td{border-bottom:none}
.rev-table tbody tr{transition:background .12s;cursor:pointer}
.rev-table tbody tr:hover{background:var(--content)}

/* task cell */
.rt-task{display:flex;flex-direction:column;gap:3px}
.rt-id{font-family:var(--font-mono);font-size:.72rem;color:var(--accent-ink)}
.rt-title{font-size:.88rem;font-weight:600;color:var(--text);max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rt-sprint{font-size:.74rem;color:var(--text-3)}
.rt-av{display:inline-flex;align-items:center;gap:7px;font-size:.84rem;color:var(--text-2)}
.rt-av .av-sm{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#8b7bff,#4f7aff);display:grid;place-items:center;color:#fff;font-size:.64rem;font-weight:700}
.rt-date{font-size:.8rem;color:var(--text-3);font-family:var(--font-mono)}

/* score display */
.score-badge{font-family:var(--font-mono);font-size:.86rem;font-weight:800;padding:4px 10px;border-radius:8px;display:inline-block}
.score-badge.hi{background:rgba(74,222,128,.12);color:#4ade80}
.score-badge.md{background:rgba(251,191,36,.12);color:#fbbf24}
.score-badge.lo{background:rgba(255,107,107,.12);color:#ff6b6b}
.score-badge.none{color:var(--border-2);font-size:.74rem;font-weight:400}

/* review drawer */
.rd-back{position:fixed;inset:0;background:rgba(4,8,18,.6);backdrop-filter:blur(3px);z-index:100;opacity:0;transition:opacity .22s;pointer-events:none}
.rd-back.open{opacity:1;pointer-events:auto}
.rd-drawer{position:fixed;top:0;right:0;height:100vh;width:580px;max-width:96vw;background:var(--elev);border-left:1px solid var(--border-2);box-shadow:-30px 0 60px rgba(0,0,0,.45);z-index:101;transform:translateX(100%);transition:transform .28s var(--ease);display:flex;flex-direction:column}
.rd-drawer.open{transform:translateX(0)}
.rd-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.rd-type{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.rd-type svg{width:16px;height:16px;color:#fff}
.rd-close{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none;flex-shrink:0}
.rd-close:hover{background:var(--content);color:var(--text)}
.rd-close svg{width:17px;height:17px}
.rd-body{flex:1;overflow-y:auto;padding:0}

/* drawer tabs */
.rd-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rd-tab{flex:1;height:44px;display:flex;align-items:center;justify-content:center;font-size:.83rem;font-weight:600;color:var(--text-3);border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s;font-family:inherit;border-top:none;border-left:none;border-right:none;background:none}
.rd-tab:hover{color:var(--text-2)}
.rd-tab.on{color:var(--text);border-bottom-color:var(--accent)}
.rd-pane{display:none;padding:22px}
.rd-pane.on{display:block}

/* task info in drawer */
.ri-card{background:var(--content);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.ri-row{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border)}
.ri-row:last-child{border-bottom:none}
.ri-l{font-size:.77rem;color:var(--text-3);min-width:100px;flex-shrink:0;padding-top:1px}
.ri-v{font-size:.87rem;color:var(--text);flex:1;line-height:1.5}

/* checklist in drawer */
.cl-review-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.cl-review-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;border:1px solid var(--border);background:var(--content);transition:border-color .15s}
.cl-review-item.done{opacity:.75}
.cl-review-item.done .cli-text{text-decoration:line-through;color:var(--text-3)}
.cl-checkbox{width:16px;height:16px;border-radius:4px;flex-shrink:0;display:grid;place-items:center}
.cl-checkbox.done{background:var(--ok);border:none}
.cl-checkbox.done svg{width:10px;height:10px;color:#fff}
.cl-checkbox.todo{border:2px solid var(--border-2)}
.cli-text{font-size:.85rem;color:var(--text-2);flex:1}
.cl-prog-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:16px}
.cl-prog-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),#4ade80);border-radius:99px;transition:width .4s var(--ease)}

/* review form */
.score-section{margin-bottom:20px}
.score-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:10px}
.score-criteria{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.sc-item{background:var(--content);border:1px solid var(--border);border-radius:10px;padding:12px}
.sc-item .sc-name{font-size:.78rem;color:var(--text-2);margin-bottom:8px}
.sc-stars{display:flex;gap:4px}
.sc-star{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border-2);display:grid;place-items:center;cursor:pointer;transition:background .1s,border-color .1s;font-size:.75rem;color:var(--text-3);font-family:var(--font-mono);font-weight:700;background:none}
.sc-star.on{background:var(--warn-soft);border-color:var(--warn);color:var(--warn)}
.sc-total{font-family:var(--font-mono);font-size:1.5rem;font-weight:800;color:var(--text);text-align:right;margin-top:10px}
.sc-total span{font-size:.78rem;color:var(--text-3);font-weight:400}

.rv-comment{width:100%;font-family:inherit;font-size:.9rem;color:var(--text);background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:11px 13px;outline:none;resize:vertical;min-height:90px;transition:border-color .15s,box-shadow .15s}
.rv-comment:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.rv-comment::placeholder{color:var(--text-3)}

.decision-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}
.decision-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;border-radius:12px;border:2px solid var(--border);background:var(--content);cursor:pointer;font-family:inherit;transition:all .18s;position:relative}
.decision-btn:hover{transform:translateY(-2px)}
.decision-btn .db-ico{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;transition:background .15s}
.decision-btn .db-ico svg{width:18px;height:18px}
.decision-btn .db-label{font-size:.8rem;font-weight:700;color:var(--text-2)}
.decision-btn .db-sub{font-size:.7rem;color:var(--text-3);text-align:center;line-height:1.3}
.decision-btn.approve:hover,.decision-btn.approve.on{border-color:var(--ok);background:var(--ok-soft)}
.decision-btn.approve:hover .db-ico,.decision-btn.approve.on .db-ico{background:var(--ok-soft);color:var(--ok)}
.decision-btn.approve.on .db-label{color:var(--ok)}
.decision-btn.changes:hover,.decision-btn.changes.on{border-color:#a78bfa;background:rgba(139,92,246,.08)}
.decision-btn.changes:hover .db-ico,.decision-btn.changes.on .db-ico{background:rgba(139,92,246,.13);color:#a78bfa}
.decision-btn.changes.on .db-label{color:#a78bfa}
.decision-btn.reject:hover,.decision-btn.reject.on{border-color:var(--danger);background:var(--danger-soft)}
.decision-btn.reject:hover .db-ico,.decision-btn.reject.on .db-ico{background:var(--danger-soft);color:var(--danger)}
.decision-btn.reject.on .db-label{color:var(--danger)}

/* history */
.rv-hist-list{display:flex;flex-direction:column;gap:0}
.rv-hist-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.rv-hist-item:last-child{border-bottom:none}
.rv-hist-item .hav{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#8b7bff,#4f7aff);display:grid;place-items:center;color:#fff;font-size:.72rem;font-weight:700}
.rv-hist-item .hbody{flex:1;min-width:0}
.rv-hist-item .hmeta{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.rv-hist-item .hname{font-size:.86rem;font-weight:700;color:var(--text)}
.rv-hist-item .hdate{font-size:.74rem;color:var(--text-3);font-family:var(--font-mono)}
.rv-hist-item .htext{font-size:.86rem;color:var(--text-2);line-height:1.55}
.rv-hist-item .htext b{color:var(--text);font-weight:600}
.rv-hist-item .hcomment{margin-top:8px;padding:10px 12px;background:var(--content);border-radius:9px;border-left:3px solid var(--border-2);font-size:.84rem;color:var(--text-2);line-height:1.5}
.rv-hist-item .hcomment.approved-c{border-left-color:var(--ok)}
.rv-hist-item .hcomment.changes-c{border-left-color:#a78bfa}
.rv-hist-item .hcomment.rejected-c{border-left-color:var(--danger)}

/* empty state */
.rev-empty{text-align:center;padding:56px 20px;color:var(--text-3)}
.rev-empty svg{width:48px;height:48px;margin:0 auto 16px;opacity:.3}
.rev-empty p{font-size:.95rem;font-weight:500;color:var(--text-2)}
.rev-empty span{font-size:.83rem;margin-top:6px;display:block}

/* search/filter bar */
.rf-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:22px}
.rf-search{display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;background:var(--elev);border:1px solid var(--border);border-radius:9px;color:var(--text-3);min-width:200px}
.rf-search svg{width:14px;height:14px;flex-shrink:0}
.rf-search input{background:none;border:none;outline:none;font-family:inherit;font-size:.82rem;color:var(--text);width:100%}
.rf-search input::placeholder{color:var(--text-3)}
.mf-chip{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--elev);font-size:.8rem;font-weight:500;color:var(--text-2);transition:border-color .15s,background .15s,color .15s;cursor:pointer;font-family:inherit}
.mf-chip:hover{border-color:var(--border-2);color:var(--text)}
.mf-chip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
.mf-av{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#8b7bff,#4f7aff);display:grid;place-items:center;color:#fff;font-size:.58rem;font-weight:700;flex-shrink:0}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--elev);border:1px solid var(--border-2);border-radius:10px;padding:12px 22px;font-size:.86rem;font-weight:500;color:var(--text);box-shadow:var(--shadow-lg);z-index:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-left:3px solid var(--ok)}
.toast.err{border-left:3px solid var(--danger)}
.toast.warn{border-left:3px solid var(--warn)}
</style>
</head>
<body>
<div class="nav-scrim" id="navScrim"></div>
<div class="app">

<!-- SIDEBAR -->
<aside class="side">
  <div class="side-brand">
    <span class="lm">j</span>
    <div><div class="bt">jobihome</div><div class="bs">Workspace · Do thi Lan</div></div>

  </div>
</aside>

<!-- MAIN -->
<div class="main">

        <span class="icon-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>

  <main class="content scroll">
    <div class="content-inner">

      <!-- Page head -->
      <div class="page-head" style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px">
        <div>
          <h1>Task Reviews</h1>
          <p>Quy trình kiểm duyệt công việc · <b id="pendingBadge">—</b> đang chờ review · Sprint 14</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div style="font-size:.8rem;color:var(--text-3);font-family:var(--font-mono)">Reviewer:</div>
          <div style="display:flex;gap:-4px">
            <span class="av-sm" style="width:26px;height:26px;font-size:.66rem;border:2px solid var(--elev)">DL</span>
          </div>
        </div>
      </div>

      <!-- KPIs -->
      <div class="kpis" id="kpiRow"></div>

      <!-- Filter bar -->
      <div class="rf-bar">
        <div class="rev-tabs" id="statusTabs"></div>
        <div style="flex:1"></div>
        <div style="display:flex;gap:6px;align-items:center" id="reviewerFilter"></div>
        <div class="rf-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input type="text" id="revSearch" placeholder="Lọc nhanh…"/>

      <!-- Table -->
      <div class="rev-table-wrap">

          </thead>
          <tbody id="revBody"></tbody>
        </table>
      </div>

    </div>
  </main>
</div>
</div>

<!-- Review Drawer -->
<div class="rd-back" id="rdBack"></div>
<div class="rd-drawer" id="rdDrawer">
  <div class="rd-head">
    <div class="rd-type" id="rdTypeIco" style="background:var(--accent)">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke-linecap="round" stroke-linejoin="round"/></svg>

    <div style="flex:1;min-width:0">

    <button class="rd-tab" data-pane="history">Lịch sử <span id="histCnt" style="font-family:var(--font-mono);font-size:.68rem;color:var(--text-3)"></span></button>

  <div class="rd-body" id="rdBody">
    <div class="rd-pane on" id="pane-info"></div>
    <div class="rd-pane" id="pane-review"></div>
    <div class="rd-pane" id="pane-history"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ── STATE ── */
var selStatus = "all";
var selReviewer = "ALL";
var searchQ = "";
var openRevId = null;
var scoreState = {};
var selDecision = null;

/* ── UTILS ── */
function mn(v){var m=MEMBERS.find(function(x){return x.v===v;});return m?m.l:v;}
function scoreClass(s){if(!s&&s!==0)return "none";if(s>=4)return "hi";if(s>=2.5)return "md";return "lo";}
function avgScore(sc){
  var vals=Object.values(sc).filter(function(v){return v>0;});
  if(!vals.length)return null;
  return Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length*10)/10;
}
function statusLabel(s){return {pending:"Chờ review",approved:"Đã duyệt",changes:"Cần sửa",rejected:"Từ chối"}[s]||s;}

function filtered(){
  return REVIEWS.filter(function(r){
    if(selStatus!=="all"&&r.status!==selStatus)return false;
    if(selReviewer!=="ALL"&&r.reviewer!==selReviewer)return false;
    if(searchQ){
      var q=searchQ.toLowerCase();
      return r.taskId.toLowerCase().indexOf(q)!==-1||r.taskTitle.toLowerCase().indexOf(q)!==-1||mn(r.submitter).toLowerCase().indexOf(q)!==-1;
    }
    return true;
  });
}

/* ── KPI CARDS ── */
function renderKPIs(){
  var pending=REVIEWS.filter(function(r){return r.status==="pending";}).length;
  var approved=REVIEWS.filter(function(r){return r.status==="approved";}).length;

  var scored=REVIEWS.filter(function(r){return avgScore(r.scores)!==null;});
  var avgAll=scored.length?Math.round(scored.reduce(function(a,r){return a+avgScore(r.scores);},0)/scored.length*10)/10:null;

  document.getElementById("pendingBadge").textContent=pending;

  var cards=[

     lab:"Đã duyệt",val:approved,chg:"sprint 14",cls:"up"},

  ];

  function starsHtml(key,val){
    return [1,2,3,4,5].map(function(i){
      return '<button class="sc-star'+(i<=(val||0)?" on":"")+'" data-key="'+key+'" data-val="'+i+'">'+i+'</button>';
    }).join("");
  }

  var isApproved=r.status==="approved"||r.status==="rejected";

  document.getElementById("pane-review").innerHTML=

            return '<div class="sc-item">'+
              '<div class="sc-name">'+c.l+'<div style="font-size:.68rem;color:var(--text-3);margin-top:1px">'+c.desc+'</div></div>'+
              '<div class="sc-stars" id="stars-'+c.k+'">'+starsHtml(c.k,scoreState[c.k]||0)+'</div>'+
            '</div>';
          }).join("")+
        '</div>'+
        '<div class="sc-total" id="avgDisplay">'+(avg!==null?avg+' <span>/ 5</span>':'<span style="font-size:.88rem">Chưa có điểm</span>')+'</div>'+

      '<div style="margin-bottom:16px">'+

        '<textarea class="rv-comment" id="rvComment" placeholder="Nhận xét chi tiết, điểm cần cải thiện…">'+(r.comment||"")+'</textarea>'+

      '<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:10px">Quyết định</div>'+
      '<div class="decision-row" id="decisionRow">'+
        '<button class="decision-btn approve'+(selDecision==="approve"?" on":"")+'" data-d="approve">'+
          '<div class="db-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M5 12l5 5L20 6"/></svg></div>'+
          '<div class="db-label">Duyệt</div>'+
          '<div class="db-sub">Task đạt yêu cầu,<br>chuyển sang Done</div>'+
        '</button>'+
        '<button class="decision-btn changes'+(selDecision==="changes"?" on":"")+'" data-d="changes">'+
          '<div class="db-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 2l-3 0"/></svg></div>'+

        '</button>'+

          '<div class="db-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M6 6l12 12M18 6L6 18"/></svg></div>'+
          '<div class="db-label">Từ chối</div>'+
          '<div class="db-sub">Không đạt, cần làm<br>lại từ đầu</div>'+
        '</button>'+
      '</div>'+
      (!isApproved?'<button class="abtn primary" id="submitReviewBtn" style="width:100%;margin-top:16px;height:44px">Gửi đánh giá</button>':'')+
    '</div>';

  if(isApproved) return;

  /* star clicks */
  document.getElementById("pane-review").addEventListener("click",function(e){
    var star=e.target.closest(".sc-star");
    if(star){
      var key=star.dataset.key, val=+star.dataset.val;
      /* toggle off if clicking same value */
      scoreState[key]=scoreState[key]===val?0:val;
      var container=document.getElementById("stars-"+key);

    }
    var sub=e.target.closest("#submitReviewBtn");
    if(sub) submitReview();
  });
}

      '<div class="hav">'+h.who+'</div>'+
      '<div class="hbody">'+
        '<div class="hmeta">'+
          '<span class="hname">'+mn(h.who)+'</span>'+
          (h.score!==undefined&&h.score!==null?'<span class="score-badge '+scoreClass(h.score)+'" style="font-size:.72rem;padding:2px 7px">'+h.score+'/5</span>':'')+
          '<span class="hdate">'+h.date+'</span>'+
        '</div>'+
        '<div class="htext">'+actionMap[h.action]+'</div>'+
        (h.comment?'<div class="hcomment '+cls+'">'+h.comment+'</div>':'')+
      '</div>'+
    '</div>';
  }).join("");
  document.getElementById("pane-history").innerHTML='<div style="padding:22px"><div class="rv-hist-list">'+(html||'<div style="text-align:center;padding:32px;color:var(--text-3)">Chưa có lịch sử.</div>')+'</div></div>';
}

function submitReview(){
  if(!selDecision){showToast("Chọn quyết định: Duyệt / Cần sửa / Từ chối","err");return;}
  var comment=document.getElementById("rvComment").value.trim();
  if(!comment){showToast("Vui lòng nhập nhận xét","err");document.getElementById("rvComment").focus();return;}
  var avg=avgScore(scoreState);
  var idx=REVIEWS.findIndex(function(x){return x.id===openRevId;});
  if(idx===-1)return;
  REVIEWS[idx].status=selDecision;
  REVIEWS[idx].scores=Object.assign({},scoreState);
  REVIEWS[idx].comment=comment;
  REVIEWS[idx].history.push({
    who:"DL",action:selDecision,
    date:"15/06/2026 "+new Date().getHours()+":"+String(new Date().getMinutes()).padStart(2,"0"),
    score:avg,comment:comment
  });
  closeDrawer();
  renderAll();
  var msgs={approve:"Đã duyệt task ✓",changes:"Đã yêu cầu sửa đổi",reject:"Đã từ chối task"};
  showToast(msgs[selDecision],"ok");
}

function closeDrawer(){
  document.getElementById("rdBack").classList.remove("open");
  document.getElementById("rdDrawer").classList.remove("open");
  openRevId=null;
}

/* ── EVENTS ── */
document.getElementById("revBody").addEventListener("click",function(e){
  var row=e.target.closest("tr[data-id]");
  if(row) openDrawer(row.dataset.id);
});

document.getElementById("rdTabBar").addEventListener("click",function(e){
  var b=e.target.closest(".rd-tab");if(!b)return;
  var pane=b.dataset.pane;
  document.querySelectorAll(".rd-tab").forEach(function(t){t.classList.remove("on");});
  document.querySelectorAll(".rd-pane").forEach(function(p){p.classList.remove("on");});
  b.classList.add("on");
  document.getElementById("pane-"+pane).classList.add("on");
});

document.getElementById("rdBack").addEventListener("click",closeDrawer);
document.getElementById("rdClose").addEventListener("click",closeDrawer);

document.getElementById("statusTabs").addEventListener("click",function(e){
  var b=e.target.closest(".rev-tab");if(!b)return;
  selStatus=b.dataset.s;renderTabs();renderTable();
});

document.getElementById("reviewerFilter").addEventListener("click",function(e){
  var c=e.target.closest(".mf-chip");if(!c)return;
  selReviewer=c.dataset.rv;renderReviewerFilter();renderTable();
});

document.getElementById("revSearch").addEventListener("input",function(e){
  searchQ=e.target.value.trim();renderTable();
});

/* ── TOAST ── */
function showToast(msg,type){
  var t=document.getElementById("toast");
  t.textContent=msg;t.className="toast "+(type||"ok");
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2800);
}

/* ── RENDER ALL ── */
function renderAll(){
  renderKPIs();renderTabs();renderReviewerFilter();renderTable();
}

/* ── INIT ── */
renderAll();

})();
</script>
<script src="js/admin.js"></script>
</body>
</html>
