<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Customers — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── Customers page ── */

/* segment tabs */
.cust-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.seg-tabs{display:flex;gap:4px;flex-wrap:wrap}
.seg-tab{height:34px;padding:0 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--elev);font-size:.82rem;font-weight:600;color:var(--text-2);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.seg-tab:hover{border-color:var(--border-2);color:var(--text)}
.seg-tab.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
.seg-tab .tcnt{font-family:var(--font-mono);font-size:.64rem;padding:1px 6px;border-radius:99px;background:rgba(255,255,255,.07)}
.seg-tab.on .tcnt{background:var(--accent-soft-2)}
.cust-search{display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;background:var(--elev);border:1px solid var(--border);border-radius:9px;color:var(--text-3);min-width:200px}
.cust-search svg{width:14px;height:14px;flex-shrink:0}
.cust-search input{background:none;border:none;outline:none;font-family:inherit;font-size:.82rem;color:var(--text);width:100%}
.cust-search input::placeholder{color:var(--text-3)}
.view-toggle{display:inline-flex;background:var(--elev);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px}
.view-toggle button{width:32px;height:30px;border-radius:6px;display:grid;place-items:center;color:var(--text-3);border:none;background:none;cursor:pointer;font-family:inherit;transition:background .15s,color .15s}
.view-toggle button svg{width:16px;height:16px}
.view-toggle button.on{background:var(--accent-soft);color:var(--accent-ink)}

/* grid view */
.cust-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:1100px){.cust-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.cust-grid{grid-template-columns:1fr}}
.cust-card{background:var(--elev);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:border-color .18s var(--ease),transform .18s var(--ease),box-shadow .15s;position:relative;overflow:hidden}
.cust-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,50,.32)}
.cust-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.cust-logo{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-weight:800;font-size:1.1rem;color:#fff;flex-shrink:0}
.cust-name{font-size:.95rem;font-weight:700;color:var(--text);line-height:1.3}
.cust-ind{font-size:.74rem;color:var(--text-3);font-family:var(--font-mono);margin-top:2px}
.plan-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
.plan-badge.enterprise{background:rgba(167,139,250,.15);color:#a78bfa}
.plan-badge.pro{background:rgba(59,91,219,.14);color:var(--accent-ink)}
.plan-badge.starter{background:var(--border);color:var(--text-2)}
.plan-badge.trial{background:var(--warn-soft);color:var(--warn)}

.cust-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.cust-stat{background:var(--content);border:1px solid var(--border);border-radius:9px;padding:10px 12px}
.cust-stat .cs-lbl{font-size:.68rem;color:var(--text-3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em}
.cust-stat .cs-val{font-family:var(--font-mono);font-size:1.05rem;font-weight:800;color:var(--text);margin-top:3px;line-height:1}

/* health meter */
.health-row{display:flex;align-items:center;gap:10px;padding-top:12px;border-top:1px solid var(--border)}
.health-bar{flex:1;height:6px;border-radius:99px;background:var(--border);overflow:hidden}
.health-bar i{display:block;height:100%;border-radius:99px;transition:width .5s var(--ease)}
.health-label{font-family:var(--font-mono);font-size:.74rem;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:5px}
.health-dot{width:8px;height:8px;border-radius:50%}

/* list view table */
.cust-table-wrap{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow-x:auto}
.cust-table{width:100%;border-collapse:collapse;min-width:820px}
.cust-table th{text-align:left;padding:11px 16px;font-family:var(--font-mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:600;background:var(--content);border-bottom:1px solid var(--border);white-space:nowrap}
.cust-table th.r,.cust-table td.r{text-align:right}
.cust-table td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.cust-table tbody tr:last-child td{border-bottom:none}
.cust-table tbody tr{transition:background .12s;cursor:pointer}
.cust-table tbody tr:hover{background:var(--content)}
.ct-mrr{font-family:var(--font-mono);font-size:.88rem;font-weight:800;color:var(--text)}

/* drawer */
.cd-back{position:fixed;inset:0;background:rgba(4,8,18,.6);backdrop-filter:blur(3px);z-index:100;opacity:0;transition:opacity .22s;pointer-events:none}
.cd-back.open{opacity:1;pointer-events:auto}
.cd-drawer{position:fixed;top:0;right:0;height:100vh;width:560px;max-width:97vw;background:var(--elev);border-left:1px solid var(--border-2);box-shadow:-30px 0 60px rgba(0,0,0,.45);z-index:101;transform:translateX(100%);transition:transform .28s var(--ease);display:flex;flex-direction:column;overflow:hidden}
.cd-drawer.open{transform:translateX(0)}
.cd-head{display:flex;align-items:center;gap:14px;padding:20px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.cd-close{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none;flex-shrink:0}
.cd-close:hover{background:var(--content);color:var(--text)}
.cd-close svg{width:17px;height:17px}
.cd-body{flex:1;overflow-y:auto;padding:22px}
.cd-foot{flex-shrink:0;border-top:1px solid var(--border);padding:16px 22px;display:flex;gap:10px}

.dsec{font-family:var(--font-mono);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;margin-top:6px}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.metric{background:var(--content);border:1px solid var(--border);border-radius:11px;padding:14px}
.metric .ml{font-size:.7rem;color:var(--text-3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em}
.metric .mv{font-family:var(--font-mono);font-size:1.15rem;font-weight:800;margin-top:5px;line-height:1}
.metric .mc{font-size:.7rem;margin-top:4px;font-weight:600}

.dcard{background:var(--content);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.drow{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none}
.drow .dl{font-size:.8rem;color:var(--text-3);min-width:110px;flex-shrink:0}
.drow .dv{font-size:.88rem;color:var(--text);flex:1;display:flex;align-items:center;gap:8px;font-weight:500}

/* contacts */
.contact-item{display:flex;align-items:center;gap:11px;padding:11px 14px;background:var(--content);border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.contact-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#8b7bff,#4f7aff);display:grid;place-items:center;color:#fff;font-size:.78rem;font-weight:700;flex-shrink:0}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:.86rem;font-weight:600;color:var(--text)}
.contact-role{font-size:.74rem;color:var(--text-3)}
.contact-actions{display:flex;gap:6px;flex-shrink:0}
.contact-actions a{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);background:var(--elev);border:1px solid var(--border);transition:color .15s,border-color .15s}
.contact-actions a:hover{color:var(--accent-ink);border-color:var(--accent)}
.contact-actions a svg{width:14px;height:14px}
.primary-tag{font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:99px;background:var(--accent-soft);color:var(--accent-ink)}

/* activity feed */
.act-feed{display:flex;flex-direction:column;gap:0}
.act-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.act-row:last-child{border-bottom:none}
.act-ico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.act-ico svg{width:14px;height:14px}
.act-txt{font-size:.84rem;color:var(--text-2);line-height:1.4}
.act-txt b{color:var(--text);font-weight:600}
.act-time{font-size:.72rem;color:var(--text-3);font-family:var(--font-mono);margin-top:2px}

/* modal */
.cm-modal{width:100%;max-width:520px;max-height:92vh;background:var(--elev);border:1px solid var(--border-2);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden}
.cm-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.cm-head .ico{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;flex-shrink:0}
.cm-head .ico svg{width:17px;height:17px;color:#fff}
.cm-head h3{font-size:1rem;font-weight:700}
.cm-head .x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none}
.cm-head .x:hover{background:var(--content);color:var(--text)}
.cm-head .x svg{width:17px;height:17px}
.cm-body{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:16px}
.cm-foot{flex-shrink:0;display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border)}
.cm-field{display:flex;flex-direction:column;gap:6px}
.cm-field label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3)}
.cm-field input,.cm-field select,.cm-field textarea{font-family:inherit;font-size:.9rem;color:var(--text);background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:9px 12px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.cm-field input:focus,.cm-field select:focus,.cm-field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.cm-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.cm-row{grid-template-columns:1fr}}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--elev);border:1px solid var(--border-2);border-radius:10px;padding:12px 22px;font-size:.86rem;font-weight:500;color:var(--text);box-shadow:var(--shadow-lg);z-index:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-left:3px solid var(--ok)}
.toast.warn{border-left:3px solid var(--warn)}
.toast.err{border-left:3px solid var(--danger)}
</style>
</head>

var selSeg="all", search="", view="grid", openId=null;

/* ── UTILS ── */
function fmt(n){if(n===0)return "0";if(n>=1000000)return (n/1000000).toFixed(n%1000000===0?0:1)+"tr";if(n>=1000)return Math.round(n/1000)+"k";return n.toLocaleString("vi-VN");}
function fmtFull(n){return n.toLocaleString("vi-VN")+"đ";}
function viDate(d){var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function csmName(v){var c=CSM.find(function(x){return x.v===v;});return c?c.l:v;}
function healthColor(h){if(h>=80)return "var(--ok)";if(h>=60)return "var(--accent)";if(h>=45)return "var(--warn)";return "var(--danger)";}
function healthLabel(h){if(h>=80)return "Tốt";if(h>=60)return "Ổn định";if(h>=45)return "Cần chú ý";return "Rủi ro";}
function gradFor(i){return GRADS[i%GRADS.length];}
function statusLabel(s){return {active:"Đang dùng",trial:"Dùng thử","at-risk":"Rủi ro",churned:"Đã rời"}[s]||s;}

function filtered(){
  return CUSTOMERS.filter(function(c){
    if(selSeg==="enterprise"&&c.plan!=="enterprise")return false;
    if(selSeg==="pro"&&c.plan!=="pro")return false;
    if(selSeg==="risk"&&!(c.status==="at-risk"||c.health<60))return false;
    if(selSeg==="trial"&&c.status!=="trial")return false;
    if(search){var q=search.toLowerCase();return c.name.toLowerCase().indexOf(q)!==-1||c.industry.toLowerCase().indexOf(q)!==-1;}
    return true;
  });
}

/* ── KPIs ── */

document.getElementById("custBody").addEventListener("click",function(e){var row=e.target.closest("tr[data-id]");if(row)openDrawer(row.dataset.id);});
document.getElementById("segTabs").addEventListener("click",function(e){var b=e.target.closest(".seg-tab");if(!b)return;selSeg=b.dataset.k;renderSegTabs();renderGrid();renderList();});
document.getElementById("custSearch").addEventListener("input",function(e){search=e.target.value.trim();renderGrid();renderList();});
document.getElementById("viewToggle").addEventListener("click",function(e){
  var b=e.target.closest("button[data-v]");if(!b)return;
  view=b.dataset.v;
  document.querySelectorAll("#viewToggle button").forEach(function(x){x.classList.remove("on");});
  b.classList.add("on");
  document.getElementById("custGrid").style.display=view==="grid"?"grid":"none";
  document.getElementById("custTableWrap").style.display=view==="list"?"block":"none";
});
document.getElementById("cdBack").addEventListener("click",closeDrawer);
document.getElementById("cdClose").addEventListener("click",closeDrawer);
document.getElementById("cdMsgBtn").addEventListener("click",function(){showToast("Mở cửa sổ nhắn tin…","ok");});
document.getElementById("cdEditBtn").addEventListener("click",function(){showToast("Mở form chỉnh sửa khách hàng…","ok");});
document.getElementById("newCustBtn").addEventListener("click",openModal);

/* ── TOAST ── */
function showToast(msg,type){var t=document.getElementById("toast");t.textContent=msg;t.className="toast "+(type||"ok");t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2800);}

/* ── RENDER ── */
function renderAll(){renderKPIs();renderSegTabs();renderGrid();renderList();}
renderAll();

})();
</script>
<script src="js/admin.js"></script>
