<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messages — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* Messages: full-height chat, no content padding */
.content.msg-content{padding:0;overflow:hidden;display:flex}
.msg-app{flex:1;display:grid;grid-template-columns:360px 1fr 280px;min-height:0;height:100%}
@media(max-width:1180px){.msg-app{grid-template-columns:360px 1fr}.msg-info{display:none!important}}
@media(max-width:760px){.msg-app{grid-template-columns:1fr}.msg-app.show-thread .conv-pane{display:none}.msg-app:not(.show-thread) .thread-pane{display:none}}

/* ── conversation list pane ── */
.conv-pane{border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;background:var(--side)}
.conv-head{padding:14px 14px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.conv-head .ch-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.conv-head h2{font-size:1.1rem;font-weight:800;letter-spacing:-.02em}
/* source channel tabs */
.src-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.src-tabs::-webkit-scrollbar{display:none}
.src-tabs-wrap{position:relative;margin-bottom:10px}
.src-tabs-wrap::after{content:"";position:absolute;top:0;right:0;width:0;height:100%;pointer-events:none}
.src-tab{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 9px;border-radius:8px;border:1.5px solid var(--border);background:var(--content);font-size:.74rem;font-weight:600;color:var(--text-2);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;flex-shrink:0}
.src-tab .src-tab-label{}
.src-tab .src-tab-cnt{font-family:var(--font-mono);font-size:.62rem;opacity:.65;margin-left:1px}
.src-tab:hover{border-color:var(--border-2);color:var(--text)}
.src-tab.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
.src-tab .si{width:18px;height:18px;border-radius:5px;overflow:hidden;flex-shrink:0;display:grid;place-items:center}
.src-tab .si svg{width:18px;height:18px}
.src-badge{width:16px;height:16px;border-radius:4px;overflow:hidden;flex-shrink:0;display:inline-grid;place-items:center;position:absolute;bottom:-1px;right:-1px;border:2px solid var(--side)}
.src-badge svg{width:16px;height:16px}

.conv-head .ch-new{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--accent);color:#fff;cursor:pointer;border:none;transition:background .15s,transform .15s}
.conv-head .ch-new:hover{background:var(--accent-2);transform:translateY(-1px)}
.conv-head .ch-new svg{width:16px;height:16px}
.conv-search{display:flex;align-items:center;gap:8px;height:36px;padding:0 12px;background:var(--content);border:1px solid var(--border);border-radius:9px;color:var(--text-3)}
.conv-search svg{width:14px;height:14px;flex-shrink:0}
.conv-search input{background:none;border:none;outline:none;font-family:inherit;font-size:.84rem;color:var(--text);width:100%}
.conv-search input::placeholder{color:var(--text-3)}
.conv-filters{display:flex;gap:4px;padding:8px 10px;flex-shrink:0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.conv-filters::after{content:"";flex-shrink:0;width:2px}
.conv-filters::-webkit-scrollbar{display:none}
.conv-fil{font-size:.74rem;font-weight:600;color:var(--text-3);padding:5px 10px;border-radius:99px;cursor:pointer;border:1.5px solid transparent;background:none;transition:background .15s,color .15s,border-color .15s;white-space:nowrap;flex-shrink:0}
.conv-fil:hover{background:var(--content);color:var(--text-2);border-color:var(--border)}
.conv-fil.on{background:var(--accent-soft);color:var(--accent-ink);border-color:var(--accent-soft-2)}
.conv-list{flex:1;overflow-y:auto;min-height:0}
.conv-item{display:flex;gap:11px;padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;position:relative}
.conv-item:hover{background:var(--content)}
.conv-item.on{background:var(--accent-soft)}
.conv-item.on::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.conv-av{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:.86rem;font-weight:700;flex-shrink:0;position:relative}
.conv-av .on-dot{position:absolute;bottom:0;right:0;width:12px;height:12px;border-radius:50%;background:var(--ok);border:2.5px solid var(--side)}
.conv-item.on .conv-av .on-dot{border-color:var(--elev)}
.conv-mid{flex:1;min-width:0}
.conv-row1{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.conv-name{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.conv-time{font-size:.7rem;color:var(--text-3);font-family:var(--font-mono);flex-shrink:0}
.conv-preview{font-size:.8rem;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.conv-preview.unread{color:var(--text);font-weight:600}
.conv-badge{flex-shrink:0;min-width:18px;height:18px;padding:0 5px;border-radius:99px;background:var(--accent);color:#fff;font-size:.66rem;font-weight:700;display:grid;place-items:center;font-family:var(--font-mono)}
.conv-tag{font-size:.62rem;font-weight:700;padding:1px 7px;border-radius:99px;flex-shrink:0}
.conv-tag.cust{background:var(--accent-soft);color:var(--accent-ink)}
.conv-tag.team{background:rgba(74,222,128,.13);color:var(--ok)}

/* ── thread pane ── */
.thread-pane{display:flex;flex-direction:column;min-height:0;background:var(--content)}
.thread-head{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--elev)}
.thread-back{display:none;width:32px;height:32px;border-radius:8px;place-items:center;color:var(--text-2);border:none;background:none;cursor:pointer}
.thread-back svg{width:18px;height:18px}
@media(max-width:760px){.thread-back{display:grid}}
.thread-av{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:.82rem;font-weight:700;flex-shrink:0;position:relative}
.thread-info-mini{flex:1;min-width:0}
.thread-name{font-size:.95rem;font-weight:700;color:var(--text)}
.thread-status{font-size:.74rem;color:var(--ok);font-family:var(--font-mono);display:flex;align-items:center;gap:5px}
.thread-status .sd{width:6px;height:6px;border-radius:50%;background:var(--ok)}
.thread-status.off{color:var(--text-3)}
.thread-status.off .sd{background:var(--text-3)}
.thread-actions{display:flex;gap:4px}
.thread-actions button{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;color:var(--text-3);border:1px solid transparent;background:none;cursor:pointer;transition:background .15s,color .15s,border-color .15s}
.thread-actions button:hover{background:var(--content);color:var(--text);border-color:var(--border)}
.thread-actions button svg{width:17px;height:17px}

.thread-body{flex:1;overflow-y:auto;min-height:0;padding:22px 24px;display:flex;flex-direction:column;gap:4px}
.day-div{display:flex;align-items:center;gap:12px;margin:14px 0 10px}
.day-div::before,.day-div::after{content:"";flex:1;height:1px;background:var(--border)}
.day-div span{font-family:var(--font-mono);font-size:.68rem;color:var(--text-3);background:var(--content);padding:0 4px}

.msg-grp{display:flex;gap:10px;margin-top:8px;max-width:78%}
.msg-grp.me{flex-direction:row-reverse;align-self:flex-end}
.msg-grp .mg-av{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:.7rem;font-weight:700;flex-shrink:0;align-self:flex-end}
.msg-grp.me .mg-av{display:none}
.mg-bubbles{display:flex;flex-direction:column;gap:3px;min-width:0}
.bubble{padding:9px 13px;border-radius:14px;font-size:.88rem;line-height:1.5;color:var(--text);word-wrap:break-word;position:relative}
.msg-grp:not(.me) .bubble{background:var(--elev);border:1px solid var(--border);border-bottom-left-radius:5px}
.msg-grp.me .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:5px}
.msg-grp .bubble:not(:last-child){border-radius:14px}
.msg-grp.me .bubble:not(:last-child){border-bottom-right-radius:14px}
.msg-grp:not(.me) .bubble:not(:last-child){border-bottom-left-radius:14px}
.bubble-time{font-size:.66rem;color:var(--text-3);font-family:var(--font-mono);margin-top:3px;padding:0 4px}
.msg-grp.me .bubble-time{text-align:right;color:var(--text-3)}
.bubble .b-read{margin-left:5px;color:rgba(255,255,255,.7)}
/* attachment bubble */
.bubble.attach{display:flex;align-items:center;gap:10px;padding:11px 13px}
.bubble.attach .att-ic{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.15);display:grid;place-items:center;flex-shrink:0}
.msg-grp:not(.me) .bubble.attach .att-ic{background:var(--accent-soft)}
.bubble.attach .att-ic svg{width:16px;height:16px}
.bubble.attach .att-name{font-size:.84rem;font-weight:600}
.bubble.attach .att-size{font-size:.72rem;opacity:.7;font-family:var(--font-mono)}

/* typing */
.typing{display:flex;gap:10px;margin-top:8px;align-items:flex-end}
.typing .mg-av{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:.7rem;font-weight:700;flex-shrink:0}
.typing-bubble{background:var(--elev);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:5px;padding:13px 15px;display:flex;gap:4px}
.typing-bubble i{width:7px;height:7px;border-radius:50%;background:var(--text-3);animation:typeb 1.3s infinite}
.typing-bubble i:nth-child(2){animation-delay:.2s}
.typing-bubble i:nth-child(3){animation-delay:.4s}
@keyframes typeb{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* composer */
.composer{flex-shrink:0;border-top:1px solid var(--border);padding:14px 20px;background:var(--elev)}
.composer-box{display:flex;align-items:flex-end;gap:10px;background:var(--content);border:1.5px solid var(--border-2);border-radius:14px;padding:8px 8px 8px 14px;transition:border-color .15s,box-shadow .15s}
.composer-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.composer-box textarea{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:.9rem;color:var(--text);resize:none;max-height:120px;line-height:1.5;padding:6px 0}
.composer-box textarea::placeholder{color:var(--text-3)}
.composer-tools{display:flex;gap:2px;align-items:center}
.composer-tools button{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--text-3);border:none;background:none;cursor:pointer;transition:background .15s,color .15s}
.composer-tools button:hover{background:var(--elev-2);color:var(--text)}
.composer-tools button svg{width:18px;height:18px}
.send-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:var(--accent);color:#fff;border:none;cursor:pointer;transition:background .15s,transform .15s;flex-shrink:0}
.send-btn:hover{background:var(--accent-2);transform:scale(1.05)}
.send-btn:disabled{background:var(--border);color:var(--text-3);cursor:default;transform:none}
.send-btn svg{width:18px;height:18px}
.quick-replies{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.qr{font-size:.78rem;color:var(--text-2);padding:5px 12px;border-radius:99px;border:1px solid var(--border-2);background:var(--content);cursor:pointer;transition:border-color .15s,color .15s}
.qr:hover{border-color:var(--accent);color:var(--accent-ink)}

/* ── info pane ── */
.msg-info{border-left:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow-y:auto;background:var(--side)}
.info-hero{text-align:center;padding:26px 20px 20px;border-bottom:1px solid var(--border)}
.info-av{width:72px;height:72px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:1.5rem;font-weight:800;margin:0 auto 12px}
.info-name{font-size:1.02rem;font-weight:700}
.info-role{font-size:.78rem;color:var(--text-3);font-family:var(--font-mono);margin-top:3px}
.info-tags{display:flex;justify-content:center;gap:6px;margin-top:12px}
.info-quick{display:flex;justify-content:center;gap:8px;margin-top:16px}
.info-quick button{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:var(--text-2);background:var(--content);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.info-quick button:hover{border-color:var(--accent);color:var(--accent-ink);transform:translateY(-1px)}
.info-quick button svg{width:17px;height:17px}
.info-sec{padding:16px 20px;border-bottom:1px solid var(--border)}
.info-sec h4{font-family:var(--font-mono);font-size:.64rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}
.info-field{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:.84rem;color:var(--text-2)}
.info-field svg{width:15px;height:15px;color:var(--text-3);flex-shrink:0}
.info-field b{color:var(--text);font-weight:600}
.info-file{display:flex;align-items:center;gap:10px;padding:9px 0}
.info-file .if-ic{width:32px;height:32px;border-radius:8px;background:var(--content);border:1px solid var(--border);display:grid;place-items:center;flex-shrink:0;color:var(--accent-ink)}
.info-file .if-ic svg{width:15px;height:15px}
.info-file .if-name{font-size:.82rem;color:var(--text);font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info-file .if-size{font-size:.7rem;color:var(--text-3);font-family:var(--font-mono)}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--elev);border:1px solid var(--border-2);border-radius:10px;padding:12px 22px;font-size:.86rem;font-weight:500;color:var(--text);box-shadow:var(--shadow-lg);z-index:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-left:3px solid var(--ok)}
</style>
</head>
<body>
<div class="nav-scrim" id="navScrim"></div>
<div class="app">
<aside class="side">
  <div class="side-brand"><span class="lm">j</span><div><div class="bt">jobihome</div><div class="bs">Workspace · Do thi Lan</div></div></div>
  <nav class="side-nav scroll" id="sideNav"></nav>
  <div class="side-foot"><div class="side-user"><span class="av">DL</span><div><div class="un">Do thi Lan</div><div class="ur">Super Admin</div></div><span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg></span></div></div>
</aside>
<div class="main">
  <header class="topbar">
    <button class="tb-icon menu-btn" id="menuBtn" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
    <div><div class="tb-title">Messages</div></div>
    <div class="tb-right" style="margin-left:auto">
      <button class="tb-icon" id="themeToggle" aria-label="Sáng/Tối">
        <span class="icon-moon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
        <span class="icon-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
      </button>
      <button class="tb-icon" aria-label="Thông báo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="dot"></span></button>
    </div>
  </header>

  <main class="content scroll msg-content">
    <div class="msg-app" id="msgApp">

      <!-- conversation list -->
      <div class="conv-pane">
        <div class="conv-head">
          <div class="ch-top">
            <h2>Tin nhắn</h2>
            <button class="ch-new" id="newConvBtn" title="Tin nhắn mới"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
          </div>
          <div class="src-tabs-wrap"><div class="src-tabs" id="srcTabs"></div></div>
          <div class="conv-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input type="text" id="convSearch" placeholder="Tìm hội thoại…"/></div>
        </div>
        <div class="conv-filters" id="convFilters">
          <button class="conv-fil on" data-f="all">Tất cả</button>
          <button class="conv-fil" data-f="unread">Chưa đọc</button>
          <button class="conv-fil" data-f="cust">Khách hàng</button>

          <button class="conv-fil" data-f="team">Nội bộ</button>
        </div>
        <div class="conv-list" id="convList"></div>
      </div>

      <!-- thread -->
      <div class="thread-pane">
        <div class="thread-head" id="threadHead"></div>
        <div class="thread-body" id="threadBody"></div>
        <div class="composer">
          <div class="composer-box">
            <textarea id="composerInput" rows="1" placeholder="Nhập tin nhắn…"></textarea>
            <div class="composer-tools">
              <button title="Đính kèm" id="attachBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.4 11.05l-9.2 9.2a5 5 0 0 1-7.07-7.07l9.2-9.2a3 3 0 0 1 4.24 4.24l-9.2 9.2a1 1 0 0 1-1.42-1.42l8.5-8.48"/></svg></button>
              <button title="Emoji" id="emojiBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg></button>
            </div>
            <button class="send-btn" id="sendBtn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg></button>
          </div>
          <div class="quick-replies" id="quickReplies"></div>
        </div>
      </div>

      <!-- info -->
      <div class="msg-info" id="msgInfo"></div>

    </div>
  </main>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

var GRADS={
  PN:"linear-gradient(135deg,#3B5BDB,#5275e6)",SG:"linear-gradient(135deg,#a78bfa,#8b5cf6)",
  ED:"linear-gradient(135deg,#4ADE80,#16a34a)",VT:"linear-gradient(135deg,#fbbf24,#d97706)",
  AT:"linear-gradient(135deg,#22d3ee,#0891b2)",HG:"linear-gradient(135deg,#f472b6,#db2777)",
  MA:"linear-gradient(135deg,#8b7bff,#4f7aff)",TU:"linear-gradient(135deg,#34d399,#059669)"};
function grad(a){return GRADS[a]||"linear-gradient(135deg,#8b7bff,#4f7aff)";}

/* ── DATA ── */
var SOURCES={
  all:  {l:'Tất cả', short:'All', ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'},

/* ── STATE ── */
var activeId="cv1", filter="all", search="", srcFilter="all";

/* ── UTILS ── */
function active(){return CONVOS.find(function(c){return c.id===activeId;});}
function filtered(){
  return CONVOS.filter(function(c){
    if(srcFilter!=="all"&&c.src!==srcFilter)return false;
    if(filter==="unread"&&c.unread===0)return false;
    if(filter==="cust"&&c.type!=="cust")return false;
    if(filter==="team"&&c.type!=="team")return false;
    if(search&&c.name.toLowerCase().indexOf(search.toLowerCase())===-1)return false;
    return true;
  });
}
function lastMsg(c){
  for(var i=c.msgs.length-1;i>=0;i--){if(c.msgs[i].t!==undefined&&!c.msgs[i].d)return c.msgs[i];}
  return {t:"",time:""};
}

/* ── CONV LIST ── */
function renderSrcTabs(){
  var counts={all:CONVOS.length};
  ["zalo","teams","gchat"].forEach(function(k){counts[k]=CONVOS.filter(function(c){return c.src===k;}).length;});
  document.getElementById("srcTabs").innerHTML=Object.keys(SOURCES).map(function(k){
    var s=SOURCES[k];
    var cnt=counts[k]||0;
    return '<button class="src-tab'+(srcFilter===k?" on":"")+' " data-src="'+k+'" title="'+s.l+'"><span class="si">'+s.ico+'</span><span class="src-tab-label">'+s.short+'</span><span class="src-tab-cnt">'+cnt+'</span></button>';
  }).join("");
}

function renderConvList(){
  var list=filtered();
  var el=document.getElementById("convList");
  if(!list.length){el.innerHTML='<div style="padding:30px 20px;text-align:center;color:var(--text-3);font-size:.84rem">Không có hội thoại.</div>';return;}
  el.innerHTML=list.map(function(c){
    var lm=lastMsg(c);
    var preview=lm.attach?'📎 '+lm.attach.n:(lm.me?"Bạn: ":"")+lm.t;
    return '<div class="conv-item'+(c.id===activeId?" on":"")+'" data-id="'+c.id+'">'+
      '<div class="conv-av" style="background:'+grad(c.av)+';position:relative">'+c.av+(c.online?'<span class="on-dot" style="bottom:2px"></span>':'')+(c.src&&c.src!=="all"?'<span class="src-badge">'+SOURCES[c.src].ico+'</span>':'')+'</div>'+
      '<div class="conv-mid">'+
        '<div class="conv-row1"><span class="conv-name">'+c.name+'</span><span class="conv-time">'+lm.time+'</span></div>'+
        '<div class="conv-preview '+(c.unread?"unread":"")+'">'+
          '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+preview+'</span>'+
          (c.unread?'<span class="conv-badge">'+c.unread+'</span>':'<span class="conv-tag '+c.type+'">'+(c.type==="cust"?"KH":"Team")+'</span>')+
        '</div>'+
      '</div>'+
    '</div>';
  }).join("");
}

/* ── THREAD ── */
function renderThread(){

      '<button title="Video"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></button>'+
      '<button title="Thông tin" id="infoToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg></button>'+
    '</div>';

  var body=document.getElementById("threadBody");
  var html=c.msgs.map(function(m){
    if(m.d)return '<div class="day-div"><span>'+m.d+'</span></div>';
    var inner=m.attach
      ?'<div class="bubble attach"><div class="att-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div><div style="min-width:0"><div class="att-name">'+m.attach.n+'</div><div class="att-size">'+m.attach.s+'</div></div></div>'
      :'<div class="bubble">'+m.t+'</div>';
    return '<div class="msg-grp '+(m.me?"me":"")+'">'+
      (m.me?'':'<div class="mg-av" style="background:'+grad(c.av)+'">'+c.av+'</div>')+
      '<div class="mg-bubbles">'+inner+
        '<div class="bubble-time">'+m.time+(m.me?'<span class="b-read">✓✓</span>':'')+'</div>'+
      '</div>'+
    '</div>';
  }).join("");
  /* typing indicator for online convos with unread */
  if(c.online&&c.unread>0){
    html+='<div class="typing"><div class="mg-av" style="background:'+grad(c.av)+'">'+c.av+'</div><div class="typing-bubble"><i></i><i></i><i></i></div></div>';
  }
  body.innerHTML=html;
  body.scrollTop=body.scrollHeight;

  /* quick replies by type */
  document.getElementById("quickReplies").innerHTML=(QUICK[c.type]||[]).map(function(q){
    return '<button class="qr" data-q="'+q.replace(/"/g,"&quot;")+'">'+q+'</button>';
  }).join("");
}

}

/* ── SEND ── */
function nowTime(){var d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function sendMsg(text){
  var c=active();if(!c||!text.trim())return;
  c.msgs.push({me:true,t:text.trim(),time:nowTime()});
  var ta=document.getElementById("composerInput");
  ta.value="";ta.style.height="auto";document.getElementById("sendBtn").disabled=true;
  renderThread();renderConvList();
}

/* ── EVENTS ── */
document.getElementById("convList").addEventListener("click",function(e){
  var it=e.target.closest(".conv-item[data-id]");if(!it)return;
  activeId=it.dataset.id;
  var c=active();if(c)c.unread=0;
  document.getElementById("msgApp").classList.add("show-thread");
  renderConvList();renderThread();renderInfo();
});
document.getElementById("srcTabs").addEventListener("click",function(e){
  var b=e.target.closest(".src-tab[data-src]");if(!b)return;
  srcFilter=b.dataset.src;renderSrcTabs();renderConvList();
});
document.getElementById("convFilters").addEventListener("click",function(e){
  var b=e.target.closest(".conv-fil");if(!b)return;
  filter=b.dataset.f;
  document.querySelectorAll(".conv-fil").forEach(function(x){x.classList.remove("on");});
  b.classList.add("on");renderConvList();
});
document.getElementById("convSearch").addEventListener("input",function(e){search=e.target.value.trim();renderConvList();});

var input=document.getElementById("composerInput");
input.addEventListener("input",function(){
  this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px";
  document.getElementById("sendBtn").disabled=!this.value.trim();
});
input.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg(this.value);}
});
document.getElementById("sendBtn").addEventListener("click",function(){sendMsg(input.value);});
document.getElementById("quickReplies").addEventListener("click",function(e){
  var b=e.target.closest(".qr");if(!b)return;
  input.value=b.dataset.q;input.focus();input.dispatchEvent(new Event("input"));
});
document.getElementById("threadHead").addEventListener("click",function(e){
  if(e.target.closest("#threadBack")){document.getElementById("msgApp").classList.remove("show-thread");}
  if(e.target.closest("#infoToggle")){
    var inf=document.getElementById("msgInfo");
    inf.style.display=inf.style.display==="none"?"flex":(getComputedStyle(inf).display==="none"?"flex":"none");
  }
});
document.getElementById("attachBtn").addEventListener("click",function(){showToast("Chọn file đính kèm…","ok");});
document.getElementById("emojiBtn").addEventListener("click",function(){input.value+=" 😊";input.dispatchEvent(new Event("input"));input.focus();});
document.getElementById("newConvBtn").addEventListener("click",function(){showToast("Tạo hội thoại mới…","ok");});

/* ── TOAST ── */
function showToast(msg,type){var t=document.getElementById("toast");t.textContent=msg;t.className="toast "+(type||"ok");t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}

/* ── INIT ── */
renderSrcTabs();renderConvList();renderThread();renderInfo();

})();
</script>
