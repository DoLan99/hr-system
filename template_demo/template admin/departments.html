<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Phòng ban & Teams — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── Departments page ── */
.dept-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.dst{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;display:flex;align-items:center;gap:14px}
.dst .di{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex-shrink:0}
.dst .di svg{width:20px;height:20px}
.dst .dv{font-size:1.65rem;font-weight:800;letter-spacing:-0.03em}
.dst .dl{font-size:0.8rem;color:var(--text-3);margin-top:1px}

/* dept cards grid */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.dept-card{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:border-color .2s,box-shadow .2s}
.dept-card:hover{border-color:var(--border-2);box-shadow:var(--shadow)}
.dc-head{display:flex;align-items:center;gap:12px;padding:18px 18px 14px;cursor:pointer;user-select:none}
.dc-ico{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.dc-ico svg{width:20px;height:20px}
.dc-name{font-weight:700;font-size:1.02rem}
.dc-sub{font-size:0.78rem;color:var(--text-3);margin-top:2px}
.dc-head .dc-chev{margin-left:auto;color:var(--text-3);transition:transform .2s}
.dc-head .dc-chev svg{width:16px;height:16px}
.dept-card.open .dc-chev{transform:rotate(180deg)}
.dc-meta{display:flex;gap:8px;padding:0 18px 14px;flex-wrap:wrap}
.dc-tag{display:inline-flex;align-items:center;gap:5px;font-size:0.74rem;font-weight:500;padding:3px 9px;border-radius:99px;background:var(--content);color:var(--text-2);border:1px solid var(--border)}
.dc-tag svg{width:12px;height:12px}
.dc-lead{display:flex;align-items:center;gap:8px;padding:0 18px 14px;font-size:0.85rem;color:var(--text-2)}
.dc-lead .lav{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:0.62rem;font-weight:700;color:#fff;flex-shrink:0}
.dc-lead b{color:var(--text)}

/* teams inside dept */
.dc-teams{border-top:1px solid var(--border);display:none;flex-direction:column;gap:0}
.dept-card.open .dc-teams{display:flex}
.team-row{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.team-row:last-child{border-bottom:none}
.team-row:hover{background:var(--content)}
.team-ico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.team-ico svg{width:14px;height:14px}
.tr-name{font-weight:600;font-size:0.88rem}
.tr-sub{font-size:0.74rem;color:var(--text-3);margin-top:1px}
.tr-avs{display:flex;margin-left:auto}
.tr-avs .av-xs{width:22px;height:22px;border-radius:50%;border:2px solid var(--elev);margin-left:-7px;display:grid;place-items:center;font-size:0.56rem;font-weight:700;color:#fff;flex-shrink:0}
.tr-avs .av-xs:first-child{margin-left:0}
.tr-ct{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-3);margin-left:6px}
.dc-footer{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--border);background:var(--content)}

/* org chart view */
.org-wrap{overflow-x:auto;padding-bottom:16px}
.org-tree{display:flex;flex-direction:column;align-items:center;gap:0;min-width:max-content}
.org-root{background:var(--accent);border-radius:12px;padding:12px 20px;color:#fff;font-weight:700;font-size:0.92rem;text-align:center;box-shadow:0 6px 20px rgba(59,91,219,0.35)}
.org-line-down{width:2px;height:28px;background:var(--border-2);margin:0 auto}
.org-row{display:flex;gap:20px;align-items:flex-start;justify-content:center}
.org-col{display:flex;flex-direction:column;align-items:center;gap:0}
.org-line-h{display:flex;align-items:center;height:2px;align-self:flex-start;margin-top:28px}
.org-node{background:var(--elev);border:1px solid var(--border);border-radius:11px;padding:10px 16px;min-width:130px;text-align:center;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.org-node:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(59,91,219,0.18)}
.org-node .on-name{font-weight:700;font-size:0.88rem}
.org-node .on-ct{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-3);margin-top:3px}
.org-node .on-av{width:30px;height:30px;border-radius:50%;margin:0 auto 8px;display:grid;place-items:center;font-size:0.68rem;font-weight:700;color:#fff}
.org-branch{position:relative;display:flex;flex-direction:column;align-items:center}
.org-branch::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:2px;height:28px;background:var(--border-2)}

/* team detail panel */
.team-detail{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:94vw;background:var(--elev);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:60;transform:translateX(110%);transition:transform .32s cubic-bezier(.22,1,.36,1);box-shadow:-20px 0 60px rgba(0,0,0,.35)}
.team-detail.open{transform:translateX(0)}
.td-head{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.td-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:18px}
.member-list{display:flex;flex-direction:column;gap:2px}
.member-row{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:background .12s}
.member-row:hover{background:var(--content)}
.mr-av{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:0.78rem;font-weight:700;color:#fff;flex-shrink:0}
.mr-name{font-weight:600;font-size:0.87rem;color:var(--text)}
.mr-role{font-size:0.74rem;color:var(--text-3)}
.mr-badge{margin-left:auto}

/* modal */
.dm-modal{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.dm-modal.open{opacity:1;pointer-events:auto}
.dm-scrim{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.dm-card{position:relative;z-index:1;background:var(--elev);border:1px solid var(--border-2);border-radius:var(--r-lg);width:100%;max-width:480px;padding:26px;display:flex;flex-direction:column;gap:16px;box-shadow:var(--shadow-lg)}
.dm-card h2{font-size:1.05rem;font-weight:800}
.dm-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--text-3)}
.dm-close:hover{background:var(--content);color:var(--text)}
.dm-f{display:flex;flex-direction:column;gap:5px}
.dm-f label{font-size:0.81rem;font-weight:600;color:var(--text-2)}
.dm-f input,.dm-f select,.dm-f textarea{background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:0 12px;height:40px;font-family:inherit;font-size:0.88rem;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.dm-f input::placeholder{color:var(--text-3)}
.dm-f input:focus,.dm-f select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.dm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dm-foot{display:flex;justify-content:flex-end;gap:8px;padding-top:4px;border-top:1px solid var(--border)}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:59;opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.on{opacity:1;pointer-events:auto}

/* color picker row */
.color-row{display:flex;gap:7px;flex-wrap:wrap}
.cpick{width:26px;height:26px;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s}
.cpick:hover{transform:scale(1.15)}
.cpick.on{border-color:var(--text)}

@media(max-width:900px){.dept-stats{grid-template-columns:1fr 1fr}.dg{grid-template-columns:1fr}.team-detail{width:100vw}}
</style>
</head>
<body>
<div class="nav-scrim" id="navScrim"></div>
<div class="scrim" id="scrim"></div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="side">
    <div class="side-brand"><span class="lm">j</span><div><div class="bt">jobihome</div><div class="bs">Workspace · Do thi Lan</div></div></div>
    <nav class="side-nav scroll" id="sideNav"></nav>
    <div class="side-foot"><div class="side-user"><span class="av">DL</span><div><div class="un">Do thi Lan</div><div class="ur">Super Admin</div></div><span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg></span></div></div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <button class="tb-icon menu-btn" id="menuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      <div><div class="tb-title">Phòng ban &amp; Teams</div></div>
      <div class="tb-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input type="text" id="searchInput" placeholder="Tìm phòng ban, team, thành viên…"/>
        <kbd>⌘K</kbd>
      </div>
      <div class="tb-right">
        <button class="tb-icon" id="themeToggle">
          <span class="icon-moon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
          <span class="icon-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
        </button>
        <button class="tb-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="dot"></span></button>
      </div>
    </header>

    <main class="content scroll">
      <div class="content-inner">

        <!-- page head -->
        <div class="page-head" style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;">
          <div><h1>Phòng ban &amp; Teams</h1><p>Quản lý cơ cấu tổ chức, phòng ban và nhóm làm việc.</p></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="abtn ghost" id="addTeamBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="15" height="15"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Thêm team</button>
            <button class="abtn primary" id="addDeptBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>Thêm phòng ban</button>
          </div>
        </div>

        <!-- stats -->
        <div class="dept-stats" id="deptStats"></div>

        <!-- toolbar -->
        <div class="tools" style="margin-bottom:18px;">
          <div class="seg">
            <button class="on" id="viewCards"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Cards</button>
            <button id="viewOrg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="5" rx="1"/><rect x="3" y="16" width="6" height="5" rx="1"/><rect x="15" y="16" width="6" height="5" rx="1"/><path d="M12 7v5M6 16v-2h12v2" stroke-linecap="round" stroke-linejoin="round"/></svg>Org chart</button>
          </div>
          <div class="spacer"></div>
          <span style="font-size:0.83rem;color:var(--text-3);font-family:var(--font-mono);" id="countLbl"></span>
        </div>

        <!-- cards view -->
        <div id="cardsView"><div class="dg" id="deptGrid"></div></div>

        <!-- org chart view -->
        <div id="orgView" style="display:none;">
          <div class="panel" style="padding:28px;">
            <div class="org-wrap"><div class="org-tree" id="orgTree"></div></div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<!-- Team detail panel -->
<aside class="team-detail" id="teamDetail">
  <div class="td-head" id="tdHead"></div>
  <div class="td-body" id="tdBody"></div>
</aside>

<!-- Add dept modal -->
<div class="dm-modal" id="addDeptModal">
  <div class="dm-scrim" id="deptScrim"></div>
  <div class="dm-card">
    <h2>Thêm phòng ban</h2>
    <button class="dm-close" id="deptModalClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <div class="dm-f"><label>Tên phòng ban *</label><input type="text" id="newDeptName" placeholder="Engineering, Design, HR…"/></div>
    <div class="dm-f"><label>Mô tả</label><input type="text" id="newDeptDesc" placeholder="Mô tả ngắn…"/></div>
    <div class="dm-grid">
      <div class="dm-f"><label>Trưởng phòng</label>
        <select id="newDeptLead"><option value="">— Chọn —</option></select>
      </div>
      <div class="dm-f"><label>Màu phòng ban</label>
        <div class="color-row" id="deptColorRow"></div>
      </div>
    </div>
    <div class="dm-foot"><button class="abtn ghost" id="deptCancelBtn">Hủy</button><button class="abtn primary" id="deptSaveBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="14" height="14"><path d="M5 12l5 5L20 6"/></svg>Lưu</button></div>
  </div>
</div>

<!-- Add team modal -->
<div class="dm-modal" id="addTeamModal">
  <div class="dm-scrim" id="teamScrim"></div>
  <div class="dm-card">
    <h2>Thêm team</h2>
    <button class="dm-close" id="teamModalClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <div class="dm-f"><label>Tên team *</label><input type="text" id="newTeamName" placeholder="Frontend, Backend, Infra…"/></div>
    <div class="dm-grid">
      <div class="dm-f"><label>Phòng ban *</label><select id="newTeamDept"></select></div>
      <div class="dm-f"><label>Team Lead</label><select id="newTeamLead"><option value="">— Chọn —</option></select></div>
    </div>
    <div class="dm-f"><label>Màu team</label><div class="color-row" id="teamColorRow"></div></div>
    <div class="dm-foot"><button class="abtn ghost" id="teamCancelBtn">Hủy</button><button class="abtn primary" id="teamSaveBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="14" height="14"><path d="M5 12l5 5L20 6"/></svg>Lưu</button></div>
  </div>
</div>

<script>
var COLORS = ["#3B5BDB","#7c3aed","#0891b2","#059669","#d97706","#dc2626","#0f766e","#be185d","#1d4ed8","#7e22ce"];
var AVCOLORS = ["#3B5BDB","#2196f3","#7c3aed","#0891b2","#059669","#d97706","#dc2626","#7c3aed","#0f766e","#b45309","#1d4ed8","#6d28d9","#047857","#be185d"];

var EMPLOYEES = [
  {id:"JH-E001",name:"Nguyễn Minh Anh",initials:"MA",role:"Frontend Lead",col:0},
  {id:"JH-E002",name:"Trần Quốc Hoàng",initials:"HG",role:"Backend Developer",col:1},
  {id:"JH-E003",name:"Lê Thị Lan",initials:"LN",role:"UI/UX Designer",col:2},
  {id:"JH-E004",name:"Phạm Văn Tú",initials:"TU",role:"DevOps Engineer",col:3},
  {id:"JH-E005",name:"Đỗ Thị Lan",initials:"DL",role:"HR Manager",col:4},
  {id:"JH-E006",name:"Vũ Thanh Hà",initials:"TH",role:"Product Manager",col:5},
  {id:"JH-E007",name:"Nguyễn Đức Nam",initials:"DN",role:"QA Engineer",col:6},
  {id:"JH-E008",name:"Trần Thị Mai",initials:"TM",role:"Marketing Lead",col:7},
  {id:"JH-E009",name:"Lê Hoàng Phúc",initials:"HP",role:"Full-stack Dev",col:8},
  {id:"JH-E010",name:"Bùi Thị Ngọc",initials:"BN",role:"Designer",col:9},
  {id:"JH-E011",name:"Hoàng Văn Dũng",initials:"VD",role:"Sales Manager",col:10},
  {id:"JH-E012",name:"Phan Thị Thu",initials:"PT",role:"Accountant",col:11}
];

var DEPTS = [
  {id:"D1",name:"Engineering",desc:"Phát triển sản phẩm & hạ tầng kỹ thuật",color:"#3B5BDB",lead:"JH-E001",
    teams:[
      {id:"T1",name:"Frontend",color:"#2196f3",lead:"JH-E001",members:["JH-E001","JH-E003"]},
      {id:"T2",name:"Backend",color:"#0891b2",lead:"JH-E002",members:["JH-E002","JH-E009"]},
      {id:"T3",name:"DevOps & QA",color:"#059669",lead:"JH-E004",members:["JH-E004","JH-E007"]}
    ]},
  {id:"D2",name:"Design",desc:"Thiết kế UX/UI và thương hiệu sản phẩm",color:"#7c3aed",lead:"JH-E003",
    teams:[
      {id:"T4",name:"UX Research",color:"#7c3aed",lead:"JH-E003",members:["JH-E003"]},
      {id:"T5",name:"Visual Design",color:"#be185d",lead:"JH-E010",members:["JH-E010"]}
    ]},
  {id:"D3",name:"Product",desc:"Chiến lược sản phẩm và roadmap",color:"#0f766e",lead:"JH-E006",
    teams:[
      {id:"T6",name:"Product Core",color:"#0f766e",lead:"JH-E006",members:["JH-E006"]}
    ]},
  {id:"D4",name:"HR",desc:"Quản lý nhân sự, tuyển dụng và chính sách",color:"#d97706",lead:"JH-E005",
    teams:[
      {id:"T7",name:"Talent Acquisition",color:"#d97706",lead:"JH-E005",members:["JH-E005","JH-E012"]}
    ]},
  {id:"D5",name:"Marketing",desc:"Tăng trưởng thương hiệu và acquisition",color:"#dc2626",lead:"JH-E008",
    teams:[
      {id:"T8",name:"Growth & Content",color:"#dc2626",lead:"JH-E008",members:["JH-E008"]}
    ]},
  {id:"D6",name:"Sales",desc:"Phát triển kinh doanh và đối tác",color:"#6d28d9",lead:"JH-E011",
    teams:[
      {id:"T9",name:"Enterprise Sales",color:"#6d28d9",lead:"JH-E011",members:["JH-E011"]}
    ]}
];

function emp(id){ return EMPLOYEES.find(function(e){return e.id===id;})||{initials:"?",name:"Unknown",role:"",col:0}; }
function av(e,size,r){ size=size||28; r=r||9;
  return '<span style="width:'+size+'px;height:'+size+'px;border-radius:'+r+'px;background:'+AVCOLORS[e.col%AVCOLORS.length]+';display:grid;place-items:center;font-size:'+(size*0.3)+'px;font-weight:700;color:#fff;flex-shrink:0">'+e.initials+'</span>';
}
function allMembers(d){ var m=[]; d.teams.forEach(function(t){t.members.forEach(function(id){if(m.indexOf(id)===-1)m.push(id);})}); return m; }

/* ─── Stats ─── */
function renderStats(){
  var totalDepts=DEPTS.length, totalTeams=0, totalMembers=0;
  DEPTS.forEach(function(d){ totalTeams+=d.teams.length; totalMembers+=allMembers(d).length; });
  var avgTeam = totalTeams>0 ? (totalMembers/totalTeams).toFixed(1) : 0;
  document.getElementById("deptStats").innerHTML=[
    {svg:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',v:totalDepts,l:"Phòng ban"},
    {svg:'<rect x="9" y="2" width="6" height="5" rx="1"/><rect x="3" y="16" width="6" height="5" rx="1"/><rect x="15" y="16" width="6" height="5" rx="1"/><path d="M12 7v5M6 16v-2h12v2" stroke-linecap="round" stroke-linejoin="round"/>',v:totalTeams,l:"Teams"},
    {svg:'<circle cx="12" cy="8" r="4"/><path d="M5 20c0-3.9 3.1-7 7-7s7 3.1 7 7" stroke-linecap="round"/>',v:totalMembers,l:"Thành viên"},
    {svg:'<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6" stroke-linecap="round" stroke-linejoin="round"/>',v:avgTeam,l:"TB / team"}
  ].map(function(s){
    return '<div class="dst"><span class="di" style="background:var(--accent-soft);color:var(--accent-ink)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">'+s.svg+'</svg></span><div><div class="dv">'+s.v+'</div><div class="dl">'+s.l+'</div></div></div>';
  }).join("");
}

/* ─── Dept cards ─── */
var openDepts = {};
function renderCards(){
  var q=(document.getElementById("searchInput").value||"").toLowerCase();
  var list=DEPTS.filter(function(d){
    if(!q) return true;
    if(d.name.toLowerCase().indexOf(q)>-1) return true;
    if(d.teams.some(function(t){return t.name.toLowerCase().indexOf(q)>-1;})) return true;
    return false;
  });
  document.getElementById("countLbl").textContent=list.length+" phòng ban";
  document.getElementById("deptGrid").innerHTML=list.map(function(d){
    var members=allMembers(d), leadE=emp(d.lead), isOpen=!!openDepts[d.id];
    var avatars=members.slice(0,5).map(function(id){ var e=emp(id); return '<span class="av-xs" style="background:'+AVCOLORS[e.col%AVCOLORS.length]+'">'+e.initials+'</span>'; }).join("");
    var extraCt=members.length>5?'<span class="tr-ct">+'+( members.length-5)+'</span>':"";
    var teams=d.teams.map(function(t){
      var tavs=t.members.slice(0,4).map(function(id){ var e=emp(id); return '<span class="av-xs" style="background:'+AVCOLORS[e.col%AVCOLORS.length]+'">'+e.initials+'</span>'; }).join("");
      var tLead=emp(t.lead);
      return '<div class="team-row" data-tid="'+t.id+'" data-did="'+d.id+'">'+
        '<span class="team-ico" style="background:'+t.color+'22;color:'+t.color+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>'+
        '<div><div class="tr-name">'+t.name+'</div><div class="tr-sub">Lead: '+tLead.name+'</div></div>'+
        '<div class="tr-avs">'+tavs+'<span class="tr-ct">'+t.members.length+' người</span></div>'+
      '</div>';
    }).join("");
    return '<div class="dept-card'+(isOpen?" open":"")+'" id="dc-'+d.id+'">'+
      '<div class="dc-head" data-did="'+d.id+'">'+
        '<span class="dc-ico" style="background:'+d.color+'22;color:'+d.color+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2M8 7V5a2 2 0 0 0-4 0v2"/></svg></span>'+
        '<div><div class="dc-name">'+d.name+'</div><div class="dc-sub">'+d.desc+'</div></div>'+
        '<span class="dc-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>'+
      '</div>'+
      '<div class="dc-meta">'+
        '<span class="dc-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="12" height="12"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 4a3 3 0 0 1 0 6M21 20a5 5 0 0 0-4-5" stroke-linecap="round"/></svg>'+members.length+' thành viên</span>'+
        '<span class="dc-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="12" height="12"><rect x="9" y="2" width="6" height="5" rx="1"/><rect x="3" y="16" width="6" height="5" rx="1"/><rect x="15" y="16" width="6" height="5" rx="1"/><path d="M12 7v5M6 16v-2h12v2" stroke-linecap="round" stroke-linejoin="round"/></svg>'+d.teams.length+' teams</span>'+
      '</div>'+
      '<div class="dc-lead">'+av(leadE,26,50)+'<span>Trưởng phòng <b>'+leadE.name+'</b></span><div class="tr-avs" style="margin-left:auto">'+avatars+extraCt+'</div></div>'+
      '<div class="dc-teams">'+teams+'</div>'+
      '<div class="dc-footer">'+
        '<button class="abtn ghost" style="height:30px;font-size:0.8rem" data-did="'+d.id+'" data-act="addteam"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="13" height="13"><path d="M12 5v14M5 12h14"/></svg>Thêm team</button>'+
        '<button class="abtn ghost" style="height:30px;font-size:0.8rem" data-did="'+d.id+'" data-act="edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>Chỉnh sửa</button>'+
      '</div>'+
    '</div>';
  }).join("");

  /* toggle dept open */
  document.querySelectorAll(".dc-head[data-did]").forEach(function(h){
    h.addEventListener("click",function(){
      var did=h.getAttribute("data-did");
      openDepts[did]=!openDepts[did];
      renderCards();
    });
  });
  /* open team detail */
  document.querySelectorAll(".team-row[data-tid]").forEach(function(r){
    r.addEventListener("click",function(e){
      e.stopPropagation();
      var tid=r.getAttribute("data-tid"), did=r.getAttribute("data-did");
      openTeamDetail(did,tid);
    });
  });
  /* footer actions */
  document.querySelectorAll("[data-act='addteam']").forEach(function(b){
    b.addEventListener("click",function(e){e.stopPropagation(); document.getElementById("addTeamModal").classList.add("open"); populateTeamDeptSelect(b.getAttribute("data-did")); });
  });
}

/* ─── Org chart ─── */
function renderOrg(){
  var tree=document.getElementById("orgTree");
  tree.innerHTML='<div class="org-root">jobihome.vn · 12 thành viên</div>'+
    '<div class="org-line-down"></div>'+
    '<div class="org-row">'+
    DEPTS.map(function(d){
      var leadE=emp(d.lead);
      return '<div class="org-col">'+
        '<div class="org-node" style="border-color:'+d.color+'44" data-did="'+d.id+'">'+
          '<div class="on-av" style="background:'+d.color+'">'+leadE.initials+'</div>'+
          '<div class="on-name">'+d.name+'</div>'+
          '<div class="on-ct">'+allMembers(d).length+' người · '+d.teams.length+' teams</div>'+
        '</div>'+
      '</div>';
    }).join("")+
  '</div>';
  tree.querySelectorAll(".org-node[data-did]").forEach(function(n){
    n.addEventListener("click",function(){
      var did=n.getAttribute("data-did"), d=DEPTS.find(function(x){return x.id===did;});
      if(d&&d.teams.length>0) openTeamDetail(d.id,d.teams[0].id);
    });
  });
}

/* ─── Team detail panel ─── */
function openTeamDetail(did,tid){
  var d=DEPTS.find(function(x){return x.id===did;}); if(!d) return;
  var t=d.teams.find(function(x){return x.id===tid;}); if(!t) return;
  var tLead=emp(t.lead);
  var head=document.getElementById("tdHead");
  head.innerHTML='<span class="team-ico" style="width:36px;height:36px;border-radius:10px;background:'+t.color+'22;color:'+t.color+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>'+
    '<div><div style="font-weight:700;font-size:0.95rem">'+t.name+'</div><div style="font-size:0.78rem;color:var(--text-3)">'+d.name+'</div></div>'+
    '<button class="x" id="closeTeam" style="margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-3)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><path d="M18 6L6 18M6 6l12 12"/></svg></button>';
  document.getElementById("closeTeam").addEventListener("click",function(){ document.getElementById("teamDetail").classList.remove("open"); document.getElementById("scrim").classList.remove("on"); });

  var body=document.getElementById("tdBody");
  body.innerHTML='<div class="ed-sect">'+
    '<div class="ed-sect-h">Thông tin team</div>'+
    '<div class="ed-row"><span class="lbl">Phòng ban</span><span class="val" style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:'+d.color+';display:inline-block"></span>'+d.name+'</span></div>'+
    '<div class="ed-row"><span class="lbl">Team Lead</span><div style="display:flex;align-items:center;gap:8px">'+av(tLead,26,50)+'<span class="val">'+tLead.name+'</span></div></div>'+
    '<div class="ed-row"><span class="lbl">Thành viên</span><span class="val">'+t.members.length+' người</span></div>'+
  '</div>'+
  '<div class="ed-sect">'+
    '<div class="ed-sect-h">Thành viên</div>'+
    '<div class="member-list">'+
    t.members.map(function(id){
      var e=emp(id);
      var isLead=id===t.lead;
      return '<div class="member-row">'+
        '<span class="mr-av" style="background:'+AVCOLORS[e.col%AVCOLORS.length]+'">'+e.initials+'</span>'+
        '<div><div class="mr-name">'+e.name+'</div><div class="mr-role">'+e.role+'</div></div>'+
        (isLead?'<span class="emp-status active" style="margin-left:auto;font-size:0.68rem">Lead</span>':'')+
      '</div>';
    }).join("")+
    '</div>'+
  '</div>'+
  '<div class="ed-actions">'+
    '<button class="abtn primary" style="height:32px;font-size:0.8rem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="13" height="13"><path d="M12 5v14M5 12h14"/></svg>Thêm thành viên</button>'+
    '<button class="abtn ghost" style="height:32px;font-size:0.8rem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>Sửa team</button>'+
  '</div>';

  document.getElementById("teamDetail").classList.add("open");
  document.getElementById("scrim").classList.add("on");
}

/* ─── Color pickers ─── */
var deptPickedColor=COLORS[0], teamPickedColor=COLORS[2];
function buildColorPicker(containerId, initial, onChange){
  var c=document.getElementById(containerId);
  c.innerHTML=COLORS.map(function(col){
    return '<span class="cpick'+(col===initial?" on":"")+'" style="background:'+col+'" data-c="'+col+'"></span>';
  }).join("");
  c.querySelectorAll(".cpick").forEach(function(s){
    s.addEventListener("click",function(){
      c.querySelectorAll(".cpick").forEach(function(x){x.classList.remove("on");}); s.classList.add("on"); onChange(s.getAttribute("data-c"));
    });
  });
}
buildColorPicker("deptColorRow",deptPickedColor,function(c){deptPickedColor=c;});
buildColorPicker("teamColorRow",teamPickedColor,function(c){teamPickedColor=c;});

/* ─── Populate selects ─── */
function populateDeptLead(){
  var sel=document.getElementById("newDeptLead");
  sel.innerHTML='<option value="">— Chọn —</option>'+EMPLOYEES.map(function(e){return '<option value="'+e.id+'">'+e.name+'</option>';}).join("");
}
function populateTeamLead(){
  var sel=document.getElementById("newTeamLead");
  sel.innerHTML='<option value="">— Chọn —</option>'+EMPLOYEES.map(function(e){return '<option value="'+e.id+'">'+e.name+'</option>';}).join("");
}
function populateTeamDeptSelect(selectedId){
  var sel=document.getElementById("newTeamDept");
  sel.innerHTML=DEPTS.map(function(d){return '<option value="'+d.id+'"'+(d.id===selectedId?" selected":"")+'>'+d.name+'</option>';}).join("");
}
populateDeptLead(); populateTeamLead(); populateTeamDeptSelect();

/* ─── Modal controls ─── */
function openModal(id){ document.getElementById(id).classList.add("open"); }
function closeModal(id){ document.getElementById(id).classList.remove("open"); }
document.getElementById("addDeptBtn").addEventListener("click",function(){openModal("addDeptModal");});
document.getElementById("deptModalClose").addEventListener("click",function(){closeModal("addDeptModal");});
document.getElementById("deptScrim").addEventListener("click",function(){closeModal("addDeptModal");});
document.getElementById("deptCancelBtn").addEventListener("click",function(){closeModal("addDeptModal");});
document.getElementById("addTeamBtn").addEventListener("click",function(){openModal("addTeamModal");});
document.getElementById("teamModalClose").addEventListener("click",function(){closeModal("addTeamModal");});
document.getElementById("teamScrim").addEventListener("click",function(){closeModal("addTeamModal");});
document.getElementById("teamCancelBtn").addEventListener("click",function(){closeModal("addTeamModal");});
document.getElementById("scrim").addEventListener("click",function(){ document.getElementById("teamDetail").classList.remove("open"); document.getElementById("scrim").classList.remove("on"); });

document.getElementById("deptSaveBtn").addEventListener("click",function(){
  var name=document.getElementById("newDeptName").value.trim(); if(!name){alert("Nhập tên phòng ban.");return;}
  DEPTS.push({id:"D"+(DEPTS.length+1),name:name,desc:document.getElementById("newDeptDesc").value.trim(),color:deptPickedColor,lead:document.getElementById("newDeptLead").value,teams:[]});
  closeModal("addDeptModal"); renderStats(); renderCards(); renderOrg(); populateTeamDeptSelect();
});
document.getElementById("teamSaveBtn").addEventListener("click",function(){
  var name=document.getElementById("newTeamName").value.trim(); if(!name){alert("Nhập tên team.");return;}
  var did=document.getElementById("newTeamDept").value;
  var d=DEPTS.find(function(x){return x.id===did;}); if(!d)return;
  var lead=document.getElementById("newTeamLead").value;
  d.teams.push({id:"T"+(Math.random()*999|0),name:name,color:teamPickedColor,lead:lead,members:lead?[lead]:[]});
  closeModal("addTeamModal"); renderStats(); renderCards(); renderOrg();
});

/* ─── View toggle ─── */
document.getElementById("viewCards").addEventListener("click",function(){
  document.getElementById("viewCards").classList.add("on"); document.getElementById("viewOrg").classList.remove("on");
  document.getElementById("cardsView").style.display=""; document.getElementById("orgView").style.display="none";
});
document.getElementById("viewOrg").addEventListener("click",function(){
  document.getElementById("viewOrg").classList.add("on"); document.getElementById("viewCards").classList.remove("on");
  document.getElementById("orgView").style.display=""; document.getElementById("cardsView").style.display="none";
  renderOrg();
});

/* ─── Search ─── */
document.getElementById("searchInput").addEventListener("input",renderCards);

/* ─── Init ─── */
DEPTS.forEach(function(d){openDepts[d.id]=true;});
renderStats();
renderCards();
</script>
<script src="js/admin.js"></script>
</body>
</html>
