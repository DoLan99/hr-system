<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Audit Log — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── Audit Log ── */
.al-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.al-stat{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:12px}
.al-stat .asi{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.al-stat .asi svg{width:17px;height:17px}
.al-stat .asv{font-size:1.4rem;font-weight:800;letter-spacing:-.02em}
.al-stat .asl{font-size:0.78rem;color:var(--text-3);margin-top:1px}

/* filter bar */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:14px 16px;background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:16px}
.fb-select{background:var(--content);border:1px solid var(--border-2);border-radius:9px;padding:7px 12px;font-family:inherit;font-size:0.83rem;color:var(--text);outline:none;transition:border-color .15s;cursor:pointer}
.fb-select:focus{border-color:var(--accent)}
.fb-search{display:flex;align-items:center;gap:8px;background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:0 12px;height:38px;flex:1;min-width:200px;transition:border-color .15s,box-shadow .15s}
.fb-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.fb-search svg{width:14px;height:14px;color:var(--text-3);flex-shrink:0}
.fb-search input{background:none;border:none;outline:none;font-family:inherit;font-size:0.84rem;color:var(--text);width:100%}
.fb-search input::placeholder{color:var(--text-3)}
.filter-bar .spacer{flex:1}
.fb-count{font-family:var(--font-mono);font-size:0.78rem;color:var(--text-3)}

/* audit table */
.audit-wrap{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.audit-table{width:100%;border-collapse:collapse;font-size:0.84rem}
.audit-table thead th{text-align:left;padding:10px 14px;font-family:var(--font-mono);font-size:0.68rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border);background:var(--content);white-space:nowrap;user-select:none;cursor:pointer;transition:color .12s}
.audit-table thead th:hover{color:var(--text)}
.audit-table thead th .sort-ico{display:inline-flex;vertical-align:middle;margin-left:4px;opacity:.4;font-size:.64rem}
.audit-table thead th.sorted .sort-ico{opacity:1;color:var(--accent-ink)}
.audit-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text-2)}
.audit-table tbody tr{cursor:pointer;transition:background .12s}
.audit-table tbody tr:last-child td{border-bottom:none}
.audit-table tbody tr:hover{background:var(--content)}
.audit-table tbody tr.selected{background:var(--accent-soft)}

/* cells */
.at-time{font-family:var(--font-mono);font-size:0.76rem;white-space:nowrap}
.at-date{font-size:0.68rem;color:var(--text-3);display:block;margin-top:1px}
.at-user{display:flex;align-items:center;gap:8px}
.at-av{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:0.6rem;font-weight:700;color:#fff;flex-shrink:0}
.at-uname{font-weight:600;font-size:0.84rem;color:var(--text);white-space:nowrap}
.at-action-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:0.7rem;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap;text-transform:uppercase;letter-spacing:.02em}
.ac-create{background:rgba(34,197,94,.12);color:#22c55e}
.ac-update{background:var(--accent-soft);color:var(--accent-ink)}
.ac-delete{background:var(--danger-soft);color:var(--danger)}
.ac-approve{background:rgba(34,197,94,.12);color:#22c55e}
.ac-reject{background:var(--danger-soft);color:var(--danger)}
.ac-login{background:var(--ok-soft);color:var(--ok)}
.ac-logout{background:var(--border);color:var(--text-3)}
.ac-view{background:rgba(8,145,178,.12);color:#0891b2}
.ac-export{background:rgba(217,119,6,.12);color:#d97706}
.ac-warning{background:var(--danger-soft);color:var(--danger)}
.at-module{display:inline-flex;align-items:center;gap:5px;font-size:0.76rem;font-weight:500;padding:2px 8px;border-radius:99px;background:var(--content);color:var(--text-2);border:1px solid var(--border);white-space:nowrap}
.at-ip{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-3)}
.at-status{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:0.7rem;font-weight:600;padding:2px 8px;border-radius:99px}
.st-ok{background:var(--ok-soft);color:var(--ok)}
.st-fail{background:var(--danger-soft);color:var(--danger)}
.st-warn{background:var(--warn-soft);color:var(--warn)}

/* detail panel */
.audit-detail{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:94vw;background:var(--elev);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:60;transform:translateX(110%);transition:transform .3s cubic-bezier(.22,1,.36,1);box-shadow:-20px 0 60px rgba(0,0,0,.35)}
.audit-detail.open{transform:translateX(0)}
.ad-head{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.ad-head h3{font-size:0.96rem;font-weight:700}
.ad-close{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);margin-left:auto}
.ad-close:hover{background:var(--content);color:var(--text)}
.ad-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:18px}
.ad-sect-h{font-family:var(--font-mono);font-size:0.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.ad-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);font-size:0.85rem;gap:16px}
.ad-row:last-child{border-bottom:none}
.ad-row .lbl{color:var(--text-3);flex-shrink:0;width:110px}
.ad-row .val{color:var(--text);font-weight:500;text-align:right;word-break:break-all}
.ad-row .val.mono{font-family:var(--font-mono);font-size:0.82rem}
.ad-payload{background:var(--content);border:1px solid var(--border);border-radius:10px;padding:13px;font-family:var(--font-mono);font-size:0.76rem;color:var(--text-2);line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:240px;overflow-y:auto}

/* pagination */
.pager{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-top:1px solid var(--border);flex-wrap:wrap}
.pager-info{font-size:0.82rem;color:var(--text-3);font-family:var(--font-mono)}
.pager-btns{display:flex;gap:4px}
.pg{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:0.82rem;font-weight:600;color:var(--text-2);border:1px solid var(--border);background:var(--content);cursor:pointer;transition:all .12s}
.pg:hover{border-color:var(--accent);color:var(--accent-ink)}
.pg.on{background:var(--accent);border-color:var(--accent);color:#fff}
.pg.nav svg{width:14px;height:14px}

/* scrim */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:59;opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.on{opacity:1;pointer-events:auto}

@media(max-width:900px){.al-stats{grid-template-columns:1fr 1fr}.audit-detail{width:100vw}.audit-table th:nth-child(5),.audit-table td:nth-child(5),.audit-table th:nth-child(6),.audit-table td:nth-child(6){display:none}}
@media(max-width:600px){.al-stats{grid-template-columns:1fr 1fr}}
</style>
</head>

  {id:"A018",uid:"M1",action:"reject",module:"Nghỉ phép",target:"Đơn nghỉ phép · Nguyễn Đức Nam · 20/06",ip:"27.68.x.x",loc:"TP.HCM",browser:"Chrome 124",status:"ok",time:"2026-06-13 10:14:55",payload:JSON.stringify({leave_id:"LV-041",reason:"Thiếu nhân lực sprint cuối"},null,2)},
  {id:"A019",uid:"M5",action:"update",module:"Phân quyền",target:"Vai trò Member · +quyền task.create",ip:"27.68.x.x",loc:"TP.HCM",browser:"Firefox 125",status:"ok",time:"2026-06-12 14:02:08",payload:JSON.stringify({role:"Member",added_perms:["task.create"],removed_perms:[]},null,2)},
  {id:"A020",uid:"M2",action:"warning",module:"Hệ thống",target:"4 lần nhập sai mật khẩu liên tiếp",ip:"14.x.x.x",loc:"Đà Nẵng",browser:"Chrome 124",status:"warn",time:"2026-06-12 16:30:44",payload:JSON.stringify({attempts:4,threshold:5,account_locked:false},null,2)}
];

var PAGE_SIZE=12, currentPage=1, sortCol="time", sortAsc=false, selectedId=null;

/* ── Stats ── */
(function(){
  var total=RAW_DATA.length, warns=RAW_DATA.filter(function(r){return r.status==="warn";}).length;
  var creates=RAW_DATA.filter(function(r){return r.action==="create";}).length;
  var dels=RAW_DATA.filter(function(r){return r.action==="delete";}).length;
  document.getElementById("alStats").innerHTML=[
    {c:"#3B5BDB",sv:'<path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/>',v:total,l:"Tổng sự kiện"},
    {c:"#059669",sv:'<path d="M12 5v14M5 12h14"/>',v:creates,l:"Tạo mới"},
    {c:"#dc2626",sv:'<path d="M3 6h18M19 6l-1 14H6L5 6"/>',v:dels,l:"Xóa dữ liệu"},
    {c:"#d97706",sv:'<path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/><path d="M12 8v4M12 16h.01" stroke-linecap="round"/>',v:warns,l:"Cảnh báo"}
  ].map(function(s){
    return '<div class="al-stat"><span class="asi" style="background:'+s.c+'22;color:'+s.c+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">'+s.sv+'</svg></span><div><div class="asv">'+s.v+'</div><div class="asl">'+s.l+'</div></div></div>';
  }).join("");
})();

/* ── Filter + sort ── */
function getFiltered(){
  var q=document.getElementById("searchLog").value.toLowerCase();
  var mod=document.getElementById("filterModule").value;
  var act=document.getElementById("filterAction").value;
  var uid=document.getElementById("filterUser").value;
  var sts=document.getElementById("filterStatus").value;
  var list=RAW_DATA.filter(function(r){
    if(q&&r.target.toLowerCase().indexOf(q)===-1&&(MEMBERS.find(function(m){return m.id===r.uid;})||{name:""}).name.toLowerCase().indexOf(q)===-1&&r.module.toLowerCase().indexOf(q)===-1) return false;
    if(mod&&r.module!==mod) return false;
    if(act&&r.action!==act) return false;
    if(uid&&r.uid!==uid) return false;
    if(sts&&r.status!==sts) return false;
    return true;
  });
  list.sort(function(a,b){
    var va=sortCol==="time"?a.time:a[sortCol]||"";
    var vb=sortCol==="time"?b.time:b[sortCol]||"";
    return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
  });
  return list;
}

function render(){
  var list=getFiltered();
  var total=list.length;
  document.getElementById("fbCount").textContent=total+" sự kiện";
  var start=(currentPage-1)*PAGE_SIZE, page=list.slice(start,start+PAGE_SIZE);
  var body=document.getElementById("auditBody");
  body.innerHTML=page.map(function(r){
    var m=MEMBERS.find(function(x){return x.id===r.uid;})||{name:"System",init:"SY",col:11};
    var dt=r.time.split(" ");
    return '<tr data-rid="'+r.id+'"'+(r.id===selectedId?' class="selected"':'')+'>' +
      '<td><span class="at-time">'+dt[1].slice(0,5)+'</span><span class="at-date">'+dt[0]+'</span></td>'+
      '<td><div class="at-user"><span class="at-av" style="background:'+AVCOLORS[m.col%AVCOLORS.length]+'">'+m.init+'</span><span class="at-uname">'+m.name+'</span></div></td>'+
      '<td><span class="at-action-chip ac-'+r.action+'">'+ACTION_LABEL[r.action]+'</span></td>'+
      '<td style="max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)">'+r.target+'</td>'+
      '<td><span class="at-module">'+r.module+'</span></td>'+
      '<td><span class="at-ip">'+r.ip+'</span></td>'+
      '<td><span class="at-status st-'+r.status+'">'+(r.status==="ok"?"✓ OK":r.status==="warn"?"⚠ Cảnh báo":"✗ Lỗi")+'</span></td>'+
    '</tr>';
  }).join("");

  /* row click → detail */
  body.querySelectorAll("tr[data-rid]").forEach(function(row){
    row.addEventListener("click",function(){openDetail(row.getAttribute("data-rid"));});
  });

  /* pager */
  var totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  var pages="";
  for(var i=1;i<=totalPages;i++){
    if(i===1||i===totalPages||Math.abs(i-currentPage)<=1){
      pages+='<div class="pg'+(i===currentPage?" on":"")+'" data-pg="'+i+'">'+i+'</div>';
    } else if(Math.abs(i-currentPage)===2){
      pages+='<div class="pg" style="pointer-events:none;opacity:.4">…</div>';
    }
  }
  document.getElementById("pager").innerHTML=
    '<span class="pager-info">'+start+1+'–'+Math.min(start+PAGE_SIZE,total)+' / '+total+' sự kiện</span>'+
    '<div class="pager-btns">'+
      '<div class="pg nav" id="pgPrev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></div>'+
      pages+
      '<div class="pg nav" id="pgNext"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div>'+
    '</div>';

  document.querySelectorAll(".pg[data-pg]").forEach(function(b){
    b.addEventListener("click",function(){currentPage=parseInt(b.getAttribute("data-pg"));render();});
  });
  document.getElementById("pgPrev").addEventListener("click",function(){if(currentPage>1){currentPage--;render();}});
  document.getElementById("pgNext").addEventListener("click",function(){if(currentPage<totalPages){currentPage++;render();}});
}

/* ── Detail panel ── */
function openDetail(rid){
  selectedId=rid;
  var r=RAW_DATA.find(function(x){return x.id===rid;}); if(!r) return;
  var m=MEMBERS.find(function(x){return x.id===r.uid;})||{name:"System",init:"SY",col:11};
  document.getElementById("adTitle").textContent=ACTION_LABEL[r.action]||r.action;
  document.getElementById("adBody").innerHTML=
    '<div><div class="ad-sect-h">Tổng quan sự kiện</div>'+
      '<div class="ad-row"><span class="lbl">ID sự kiện</span><span class="val mono">'+r.id+'</span></div>'+
      '<div class="ad-row"><span class="lbl">Thời gian</span><span class="val mono">'+r.time+'</span></div>'+
      '<div class="ad-row"><span class="lbl">Hành động</span><span class="val"><span class="at-action-chip ac-'+r.action+'">'+ACTION_LABEL[r.action]+'</span></span></div>'+
      '<div class="ad-row"><span class="lbl">Module</span><span class="val"><span class="at-module">'+r.module+'</span></span></div>'+
      '<div class="ad-row"><span class="lbl">Đối tượng</span><span class="val" style="font-size:.82rem">'+r.target+'</span></div>'+
      '<div class="ad-row"><span class="lbl">Trạng thái</span><span class="val"><span class="at-status st-'+r.status+'">'+(r.status==="ok"?"✓ Thành công":r.status==="warn"?"⚠ Cảnh báo":"✗ Thất bại")+'</span></span></div>'+
    '</div>'+
    '<div><div class="ad-sect-h">Người thực hiện</div>'+
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'+
        '<span style="width:42px;height:42px;border-radius:12px;background:'+AVCOLORS[m.col%AVCOLORS.length]+';display:grid;place-items:center;font-size:0.9rem;font-weight:700;color:#fff">'+m.init+'</span>'+
        '<div><div style="font-weight:700;font-size:0.95rem">'+m.name+'</div><div style="font-size:0.78rem;color:var(--text-3)">Super Admin</div></div>'+
      '</div>'+
      '<div class="ad-row"><span class="lbl">Địa chỉ IP</span><span class="val mono">'+r.ip+'</span></div>'+
      '<div class="ad-row"><span class="lbl">Vị trí</span><span class="val">'+r.loc+'</span></div>'+
      '<div class="ad-row"><span class="lbl">Trình duyệt</span><span class="val" style="font-size:.82rem">'+r.browser+'</span></div>'+
    '</div>'+
    '<div><div class="ad-sect-h">Payload dữ liệu</div>'+
      '<div class="ad-payload">'+r.payload+'</div>'+
    '</div>'+
    '<div style="display:flex;gap:8px">'+
      '<button class="abtn ghost" style="height:32px;font-size:0.8rem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy JSON</button>'+
      (r.status==="warn"?'<button class="abtn ghost" style="height:32px;font-size:0.8rem;color:var(--danger);border-color:var(--danger-soft)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/><path d="M12 8v4M12 16h.01"/></svg>Điều tra</button>':'')+
    '</div>';
  document.getElementById("auditDetail").classList.add("open");
  document.getElementById("scrim").classList.add("on");
  render(); /* re-render to highlight selected row */
}
function closeDetail(){
  selectedId=null;
  document.getElementById("auditDetail").classList.remove("open");
  document.getElementById("scrim").classList.remove("on");
  render();
}
document.getElementById("closeDetail").addEventListener("click",closeDetail);
document.getElementById("scrim").addEventListener("click",closeDetail);

/* ── Sort on header click ── */
document.querySelectorAll(".audit-table thead th[data-col]").forEach(function(th){
  th.addEventListener("click",function(){
    var col=th.getAttribute("data-col");
    if(sortCol===col)sortAsc=!sortAsc; else{sortCol=col;sortAsc=false;}
    document.querySelectorAll(".audit-table thead th").forEach(function(t){t.classList.remove("sorted");});
    th.classList.add("sorted");
    th.querySelector(".sort-ico").textContent=sortAsc?"↑":"↓";
    currentPage=1;render();
  });
});

/* ── Filters ── */
["searchLog","filterModule","filterAction","filterUser","filterDate","filterStatus"].forEach(function(id){
  document.getElementById(id).addEventListener("input",function(){currentPage=1;render();});
  document.getElementById(id).addEventListener("change",function(){currentPage=1;render();});
});
document.getElementById("globalSearch").addEventListener("input",function(){document.getElementById("searchLog").value=this.value;currentPage=1;render();});
document.getElementById("clearFilters").addEventListener("click",function(){
  ["searchLog","filterModule","filterAction","filterUser","filterDate","filterStatus"].forEach(function(id){document.getElementById(id).value="";});
  currentPage=1;render();
});
document.getElementById("refreshBtn").addEventListener("click",function(){render();});
document.getElementById("exportBtn").addEventListener("click",function(){alert("Xuất CSV audit log đầy đủ sẽ ra mắt sớm.");});

render();
</script>
<script src="js/admin.js"></script>
</body>
