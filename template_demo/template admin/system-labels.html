<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>System Labels — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── System Labels page ── */
.lbl-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.lbl-tabs{display:flex;gap:4px;flex-wrap:wrap}
.lbl-tab{height:34px;padding:0 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--elev);font-size:.82rem;font-weight:600;color:var(--text-2);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.lbl-tab:hover{border-color:var(--border-2);color:var(--text)}
.lbl-tab.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
.lbl-tab .tcnt{font-family:var(--font-mono);font-size:.64rem;padding:1px 6px;border-radius:99px;background:rgba(255,255,255,.07)}
.lbl-tab.on .tcnt{background:var(--accent-soft-2)}
.lbl-search{display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;background:var(--elev);border:1px solid var(--border);border-radius:9px;color:var(--text-3);min-width:200px}
.lbl-search svg{width:14px;height:14px;flex-shrink:0}
.lbl-search input{background:none;border:none;outline:none;font-family:inherit;font-size:.82rem;color:var(--text);width:100%}
.lbl-search input::placeholder{color:var(--text-3)}

/* group sections */
.lbl-group{margin-bottom:28px}
.lbl-group-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.lbl-group-ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.lbl-group-ico svg{width:16px;height:16px}
.lbl-group-title{font-size:.95rem;font-weight:700;color:var(--text)}
.lbl-group-desc{font-size:.78rem;color:var(--text-3)}
.lbl-group-cnt{margin-left:auto;font-family:var(--font-mono);font-size:.72rem;color:var(--text-3)}
.lbl-group-add{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;font-weight:600;color:var(--accent-ink);background:var(--accent-soft);border:1px solid var(--accent-soft-2);padding:5px 11px;border-radius:8px;cursor:pointer;font-family:inherit;transition:background .15s}
.lbl-group-add:hover{background:var(--accent-soft-2)}
.lbl-group-add svg{width:13px;height:13px}

/* labels grid */
.lbl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:1100px){.lbl-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.lbl-grid{grid-template-columns:1fr}}

/* label card */
.lbl-card{background:var(--elev);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;transition:border-color .15s,box-shadow .15s;position:relative;display:flex;align-items:center;gap:13px}
.lbl-card:hover{border-color:var(--border-2);box-shadow:0 4px 16px rgba(0,0,30,.2)}
.lbl-swatch{width:14px;height:14px;border-radius:5px;flex-shrink:0}
.lbl-chip-preview{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600;padding:4px 11px;border-radius:99px;white-space:nowrap}
.lbl-chip-preview .lcd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lbl-info{flex:1;min-width:0}
.lbl-name{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lbl-usage{font-size:.72rem;color:var(--text-3);font-family:var(--font-mono);margin-top:2px}
.lbl-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.lbl-card:hover .lbl-actions{opacity:1}
.lbl-act{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--text-3);border:1px solid transparent;background:none;cursor:pointer;transition:background .12s,color .12s,border-color .12s}
.lbl-act:hover{background:var(--content);color:var(--text);border-color:var(--border)}
.lbl-act.del:hover{color:var(--danger);border-color:rgba(255,107,107,.3);background:var(--danger-soft)}
.lbl-act svg{width:14px;height:14px}
.lbl-lock{width:20px;height:20px;display:grid;place-items:center;color:var(--text-3);flex-shrink:0}
.lbl-lock svg{width:13px;height:13px}

/* modal */
.lm-modal{width:100%;max-width:440px;background:var(--elev);border:1px solid var(--border-2);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden}
.lm-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.lm-head .ico{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;flex-shrink:0}
.lm-head .ico svg{width:17px;height:17px;color:#fff}
.lm-head h3{font-size:1rem;font-weight:700}
.lm-head .x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none}
.lm-head .x:hover{background:var(--content);color:var(--text)}
.lm-head .x svg{width:17px;height:17px}
.lm-body{padding:22px;display:flex;flex-direction:column;gap:16px}
.lm-foot{flex-shrink:0;display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border)}
.lm-field{display:flex;flex-direction:column;gap:7px}
.lm-field label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3)}
.lm-field input,.lm-field select{font-family:inherit;font-size:.9rem;color:var(--text);background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:9px 12px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.lm-field input:focus,.lm-field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
/* color picker */
.color-grid{display:flex;flex-wrap:wrap;gap:8px}
.color-opt{width:32px;height:32px;border-radius:9px;cursor:pointer;border:2.5px solid transparent;transition:transform .12s;position:relative}
.color-opt:hover{transform:scale(1.1)}
.color-opt.on{border-color:var(--text)}
.color-opt.on::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:.8rem;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.4)}
/* live preview */
.lbl-live-preview{padding:16px;background:var(--content);border:1px solid var(--border);border-radius:11px;display:flex;align-items:center;justify-content:center;gap:8px}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--elev);border:1px solid var(--border-2);border-radius:10px;padding:12px 22px;font-size:.86rem;font-weight:500;color:var(--text);box-shadow:var(--shadow-lg);z-index:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-left:3px solid var(--ok)}
.toast.warn{border-left:3px solid var(--warn)}
.toast.err{border-left:3px solid var(--danger)}
</style>
</head>
<body>
<div class="nav-scrim" id="navScrim"></div>
<div class="app">
<aside class="side">
  <div class="side-brand"><span class="lm">j</span><div><div class="bt">jobihome</div><div class="bs">Workspace · Do thi Lan</div></div></div>
  <nav class="side-nav scroll" id="sideNav"></nav>
  <div class="side-foot"><div class="side-user"><span class="av">DL</span><div><div class="un">Do thi Lan</div><div class="ur">Super Admin</div></div><span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg></span></div></div>
</aside>
<div class="main">
  <header class="topbar">
    <button class="tb-icon menu-btn" id="menuBtn" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
    <div><div class="tb-title">System Labels</div></div>
    <div class="tb-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input type="text" placeholder="Tìm nhãn…"/><kbd>⌘K</kbd></div>
    <div class="tb-right">
      <button class="tb-icon" id="themeToggle" aria-label="Sáng/Tối">
        <span class="icon-moon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
        <span class="icon-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
      </button>
      <button class="tb-icon" aria-label="Thông báo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="dot"></span></button>
    </div>
  </header>

  <main class="content scroll">
    <div class="content-inner">

      <div class="page-head" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px">
        <div>
          <h1>System Labels</h1>
          <p>Nhãn dùng chung toàn hệ thống · <b id="totalLabels">—</b> nhãn trong <b id="groupCount">—</b> nhóm</p>
        </div>
        <button class="abtn primary" id="newLabelBtn" style="gap:7px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>
          Tạo nhãn
        </button>
      </div>

      <!-- KPIs -->
      <div class="kpis" id="kpiRow"></div>

      <!-- Toolbar -->
      <div class="lbl-bar">
        <div class="lbl-tabs" id="lblTabs"></div>
        <div style="flex:1"></div>
        <div class="lbl-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input type="text" id="lblSearch" placeholder="Tìm tên nhãn…"/>
        </div>
      </div>

      <!-- Groups -->
      <div id="groupsWrap"></div>

    </div>
  </main>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

/* ── COLOR PALETTE ── */
var COLORS=["#3B5BDB","#ef4444","#22c55e","#fbbf24","#a78bfa","#22d3ee","#f472b6","#f59e0b","#94a3b8","#14b8a6","#8b5cf6","#ec4899"];

/* ── GROUPS META ── */
var GROUPS={
  status:  {l:"Trạng thái",   desc:"Dùng cho Task, Approval",     color:"#3B5BDB",bg:"rgba(59,91,219,.13)",  ico:'<circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>'},
  priority:{l:"Mức ưu tiên",  desc:"Dùng cho Task, Issue",        color:"#ef4444",bg:"rgba(239,68,68,.13)",  ico:'<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>'},
  dept:    {l:"Bộ phận",      desc:"Dùng cho Nhân sự, Task",      color:"#22c55e",bg:"rgba(34,197,94,.13)",  ico:'<path d="M3 21h18M5 21V8l7-5 7 5v13M9 21v-6h6v6" stroke-linecap="round" stroke-linejoin="round"/>'},
  tag:     {l:"Thẻ chung",    desc:"Dùng cho Tài liệu, Khách hàng",color:"#a78bfa",bg:"rgba(167,139,250,.14)", ico:'<path d="M20.6 13.4L12 22l-9-9V3h10l7.6 7.6a2 2 0 0 1 0 2.8z"/><circle cx="7.5" cy="7.5" r="1"/>'}
};

/* ── DATA ── */
var nextId=40;
var LABELS=[
  /* status */
  {id:"L-01",name:"Đang làm",group:"status",color:"#3B5BDB",usage:48,locked:true},
  {id:"L-02",name:"Hoàn thành",group:"status",color:"#22c55e",usage:126,locked:true},
  {id:"L-03",name:"Chờ duyệt",group:"status",color:"#fbbf24",usage:23,locked:false},
  {id:"L-04",name:"Tạm hoãn",group:"status",color:"#94a3b8",usage:8,locked:false},
  {id:"L-05",name:"Đã hủy",group:"status",color:"#ef4444",usage:5,locked:false},
  /* priority */
  {id:"L-06",name:"Khẩn cấp",group:"priority",color:"#ef4444",usage:12,locked:true},
  {id:"L-07",name:"Cao",group:"priority",color:"#f59e0b",usage:34,locked:true},
  {id:"L-08",name:"Vừa",group:"priority",color:"#fbbf24",usage:67,locked:true},
  {id:"L-09",name:"Thấp",group:"priority",color:"#22c55e",usage:41,locked:true},
  /* dept */
  {id:"L-10",name:"Frontend",group:"dept",color:"#3B5BDB",usage:28,locked:false},
  {id:"L-11",name:"Backend",group:"dept",color:"#8b5cf6",usage:31,locked:false},
  {id:"L-12",name:"Design",group:"dept",color:"#f472b6",usage:19,locked:false},
  {id:"L-13",name:"QA",group:"dept",color:"#14b8a6",usage:14,locked:false},
  {id:"L-14",name:"DevOps",group:"dept",color:"#22d3ee",usage:9,locked:false},
  /* tag */
  {id:"L-15",name:"Enterprise",group:"tag",color:"#a78bfa",usage:22,locked:false},
  {id:"L-16",name:"API",group:"tag",color:"#3B5BDB",usage:17,locked:false},
  {id:"L-17",name:"Hợp đồng",group:"tag",color:"#f59e0b",usage:15,locked:false},
  {id:"L-18",name:"Brand",group:"tag",color:"#f472b6",usage:11,locked:false},
  {id:"L-19",name:"Onboarding",group:"tag",color:"#22c55e",usage:7,locked:false},
  {id:"L-20",name:"Bảo mật",group:"tag",color:"#ef4444",usage:6,locked:false}
];

/* ── STATE ── */
var selGroup="all", search="";

/* ── UTILS ── */
function hexBg(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return "rgba("+r+","+g+","+b+",0.14)";
}
function filtered(){
  return LABELS.filter(function(l){
    if(selGroup!=="all"&&l.group!==selGroup)return false;
    if(search&&l.name.toLowerCase().indexOf(search.toLowerCase())===-1)return false;
    return true;
  });
}

/* ── KPIs ── */
function renderKPIs(){
  var totalUsage=LABELS.reduce(function(a,l){return a+l.usage;},0);
  var locked=LABELS.filter(function(l){return l.locked;}).length;
  var mostUsed=LABELS.slice().sort(function(a,b){return b.usage-a.usage;})[0];

  document.getElementById("totalLabels").textContent=LABELS.length;
  document.getElementById("groupCount").textContent=Object.keys(GROUPS).length;

  var cards=[
    {ico:'<path d="M20.6 13.4L12 22l-9-9V3h10l7.6 7.6a2 2 0 0 1 0 2.8z"/><circle cx="7.5" cy="7.5" r="1.5"/>',
     lab:"Tổng nhãn",val:LABELS.length,chg:Object.keys(GROUPS).length+" nhóm",cls:"flat"},
    {ico:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/>',
     lab:"Lượt sử dụng",val:totalUsage,chg:"trên toàn hệ thống",cls:"up"},
    {ico:'<path d="M12 2l2.6 6.3L21 9l-5 4.3L17.5 20 12 16.5 6.5 20 8 13.3 3 9l6.4-.7z"/>',
     lab:"Dùng nhiều nhất",val:mostUsed?mostUsed.usage:"—",chg:mostUsed?mostUsed.name:"",cls:"up"},
    {ico:'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round"/>',
     lab:"Nhãn khóa",val:locked,chg:"không thể xóa",cls:"flat"}
  ];
  document.getElementById("kpiRow").innerHTML=cards.map(function(k){
    return '<div class="kpi"><div class="kt"><span class="ki"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+k.ico+'</svg></span>'+k.lab+'</div><div class="kv">'+k.val+'</div><div class="kc '+k.cls+'">'+k.chg+'</div></div>';
  }).join("");
}

/* ── TABS ── */
function renderTabs(){
  var counts={all:LABELS.length};
  Object.keys(GROUPS).forEach(function(k){counts[k]=LABELS.filter(function(l){return l.group===k;}).length;});
  var tabs=[{k:"all",l:"Tất cả"}].concat(Object.keys(GROUPS).map(function(k){return {k:k,l:GROUPS[k].l};}));
  document.getElementById("lblTabs").innerHTML=tabs.map(function(t){
    return '<button class="lbl-tab'+(selGroup===t.k?" on":"")+'" data-k="'+t.k+'">'+t.l+'<span class="tcnt">'+counts[t.k]+'</span></button>';
  }).join("");
}

/* ── GROUPS ── */
function renderGroups(){
  var wrap=document.getElementById("groupsWrap");
  var groupKeys=selGroup==="all"?Object.keys(GROUPS):[selGroup];
  var html="";
  groupKeys.forEach(function(gk){
    var g=GROUPS[gk];
    var labels=filtered().filter(function(l){return l.group===gk;});
    if(!labels.length&&search)return;
    html+='<div class="lbl-group">'+
      '<div class="lbl-group-head">'+
        '<div class="lbl-group-ico" style="background:'+g.bg+'"><svg viewBox="0 0 24 24" fill="none" stroke="'+g.color+'" stroke-width="2">'+g.ico+'</svg></div>'+
        '<div><div class="lbl-group-title">'+g.l+'</div><div class="lbl-group-desc">'+g.desc+'</div></div>'+
        '<span class="lbl-group-cnt">'+labels.length+' nhãn</span>'+
        '<button class="lbl-group-add" data-addgroup="'+gk+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Thêm</button>'+
      '</div>'+
      '<div class="lbl-grid">'+
        (labels.length?labels.map(function(l){
          return '<div class="lbl-card" data-id="'+l.id+'">'+
            '<span class="lbl-chip-preview" style="background:'+hexBg(l.color)+';color:'+l.color+'"><span class="lcd" style="background:'+l.color+'"></span>'+l.name+'</span>'+
            '<div class="lbl-info" style="flex:1"></div>'+
            '<div class="lbl-usage" style="font-family:var(--font-mono);font-size:.72rem;color:var(--text-3);white-space:nowrap">'+l.usage+' lần</div>'+
            (l.locked?'<span class="lbl-lock" title="Nhãn hệ thống"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>':'')+
            '<div class="lbl-actions">'+
              '<button class="lbl-act edit" data-edit="'+l.id+'" title="Sửa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg></button>'+
              (l.locked?'':'<button class="lbl-act del" data-del="'+l.id+'" title="Xóa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>')+
            '</div>'+
          '</div>';
        }).join(""):'<div style="grid-column:1/-1;font-size:.83rem;color:var(--text-3);padding:14px 4px">Không có nhãn nào.</div>')+
      '</div>'+
    '</div>';
  });
  wrap.innerHTML=html||'<div style="text-align:center;padding:50px;color:var(--text-3)">Không tìm thấy nhãn.</div>';
}

/* ── MODAL ── */
function openModal(label,defaultGroup){
  if(document.getElementById("lblModal"))return;
  var isEdit=!!label;
  var color=isEdit?label.color:COLORS[0];
  var group=isEdit?label.group:(defaultGroup||"status");
  var back=document.createElement("div");back.className="modal-back";back.id="lblModal";
  back.innerHTML='<div class="lm-modal">'+
    '<div class="lm-head"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.6 13.4L12 22l-9-9V3h10l7.6 7.6a2 2 0 0 1 0 2.8z"/><circle cx="7.5" cy="7.5" r="1"/></svg></div><h3>'+(isEdit?"Sửa nhãn":"Tạo nhãn mới")+'</h3><button class="x" id="lmClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>'+
    '<div class="lm-body">'+
      '<div class="lbl-live-preview"><span class="lbl-chip-preview" id="livePreview" style="font-size:.86rem;padding:5px 13px">nhãn</span></div>'+
      '<div class="lm-field"><label>Tên nhãn *</label><input type="text" id="lmName" placeholder="vd. Khẩn cấp" value="'+(isEdit?label.name:"")+'"/></div>'+
      '<div class="lm-field"><label>Nhóm</label><select id="lmGroup"'+(isEdit&&label.locked?" disabled":"")+'>'+Object.keys(GROUPS).map(function(k){return '<option value="'+k+'"'+(group===k?" selected":"")+'>'+GROUPS[k].l+'</option>';}).join("")+'</select></div>'+
      '<div class="lm-field"><label>Màu sắc</label><div class="color-grid" id="colorGrid">'+
        COLORS.map(function(c){return '<div class="color-opt'+(c===color?" on":"")+'" data-c="'+c+'" style="background:'+c+'"></div>';}).join("")+
      '</div></div>'+
    '</div>'+
    '<div class="lm-foot"><button class="abtn ghost" id="lmCancel">Hủy</button><button class="abtn primary" id="lmSave">'+(isEdit?"Lưu":"Tạo nhãn")+'</button></div>'+
  '</div>';
  document.body.appendChild(back);

  function updatePreview(){
    var name=document.getElementById("lmName").value.trim()||"nhãn";
    var pv=document.getElementById("livePreview");
    pv.style.background=hexBg(color);pv.style.color=color;
    pv.innerHTML='<span class="lcd" style="background:'+color+'"></span>'+name;
  }
  updatePreview();
  document.getElementById("lmName").addEventListener("input",updatePreview);
  document.getElementById("colorGrid").addEventListener("click",function(e){
    var o=e.target.closest(".color-opt");if(!o)return;
    color=o.dataset.c;
    document.querySelectorAll(".color-opt").forEach(function(x){x.classList.remove("on");});
    o.classList.add("on");updatePreview();
  });

  function close(){var m=document.getElementById("lblModal");if(m)m.remove();}
  back.addEventListener("click",function(e){if(e.target===back)close();});
  document.getElementById("lmClose").addEventListener("click",close);
  document.getElementById("lmCancel").addEventListener("click",close);
  document.getElementById("lmSave").addEventListener("click",function(){
    var name=document.getElementById("lmName").value.trim();
    if(!name){showToast("Nhập tên nhãn","err");return;}
    var grp=document.getElementById("lmGroup").value;
    if(isEdit){
      label.name=name;label.color=color;if(!label.locked)label.group=grp;
      showToast("Đã cập nhật nhãn ✓","ok");
    }else{
      LABELS.push({id:"L-"+(nextId++),name:name,group:grp,color:color,usage:0,locked:false});
      showToast("Đã tạo nhãn \""+name+"\" ✓","ok");
    }
    close();renderAll();
  });
  requestAnimationFrame(function(){document.getElementById("lmName").focus();});
}

/* ── EVENTS ── */
document.getElementById("groupsWrap").addEventListener("click",function(e){
  var ag=e.target.closest("[data-addgroup]");
  if(ag){openModal(null,ag.dataset.addgroup);return;}
  var eb=e.target.closest("[data-edit]");
  if(eb){var l=LABELS.find(function(x){return x.id===eb.dataset.edit;});if(l)openModal(l);return;}
  var db=e.target.closest("[data-del]");
  if(db){
    var idx=LABELS.findIndex(function(x){return x.id===db.dataset.del;});
    if(idx!==-1){var nm=LABELS[idx].name;LABELS.splice(idx,1);renderAll();showToast("Đã xóa nhãn \""+nm+"\"","warn");}
    return;
  }
});
document.getElementById("lblTabs").addEventListener("click",function(e){var b=e.target.closest(".lbl-tab");if(!b)return;selGroup=b.dataset.k;renderTabs();renderGroups();});
document.getElementById("lblSearch").addEventListener("input",function(e){search=e.target.value.trim();renderGroups();});
document.getElementById("newLabelBtn").addEventListener("click",function(){openModal(null,selGroup==="all"?"status":selGroup);});

/* ── TOAST ── */
function showToast(msg,type){var t=document.getElementById("toast");t.textContent=msg;t.className="toast "+(type||"ok");t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2600);}

/* ── RENDER ── */
function renderAll(){renderKPIs();renderTabs();renderGroups();}
renderAll();

})();
</script>
<script src="js/admin.js"></script>
</body>
</html>
