<style>
/* ── Skill & Career page ── */

/* member tabs */
.member-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.mtab{display:flex;align-items:center;gap:9px;padding:10px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--elev);cursor:pointer;font-family:inherit;transition:border-color .15s,background .15s,transform .15s var(--ease);flex-shrink:0}
.mtab:hover{border-color:var(--border-2);transform:translateY(-1px)}
.mtab.on{border-color:var(--accent);background:var(--accent-soft)}
.mtab .mav{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#8b7bff,#4f7aff);display:grid;place-items:center;color:#fff;font-size:.76rem;font-weight:700;flex-shrink:0}
.mtab .mname{font-size:.86rem;font-weight:700;color:var(--text)}
.mtab .mrole{font-size:.7rem;color:var(--text-3);font-family:var(--font-mono)}
.mtab .mlevel{font-family:var(--font-mono);font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--accent-soft-2);color:var(--accent-ink)}

/* main layout */
.sc-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
@media(max-width:1050px){.sc-layout{grid-template-columns:1fr}}

/* section card */
.sc-card{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px}
.sc-card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.sc-card-head h3{font-size:.92rem;font-weight:700}
.sc-card-head .sub{font-size:.76rem;color:var(--text-3);font-family:var(--font-mono)}
.sc-card-body{padding:18px}

/* career path timeline */
.career-path{display:flex;align-items:center;gap:0;padding:16px 18px;background:var(--content);position:relative;overflow-x:auto}
.cp-node{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;position:relative;z-index:1}
.cp-node::after{content:"";position:absolute;top:18px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
.cp-node:last-child::after{display:none}
.cp-circle{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-family:var(--font-mono);font-size:.74rem;font-weight:800;position:relative;z-index:2;transition:box-shadow .2s}
.cp-circle.done{background:var(--ok);color:#fff;box-shadow:0 0 12px rgba(74,222,128,.35)}
.cp-circle.current{background:var(--accent);color:#fff;box-shadow:0 0 16px rgba(59,91,219,.5);animation:cpulse 2s ease-in-out infinite}
.cp-circle.next{background:var(--content);color:var(--accent-ink);border:2px dashed var(--accent)}
.cp-circle.future{background:var(--content);color:var(--text-3);border:2px solid var(--border)}
@keyframes cpulse{0%,100%{box-shadow:0 0 16px rgba(59,91,219,.5)}50%{box-shadow:0 0 24px rgba(59,91,219,.8)}}
.cp-label{font-size:.72rem;font-weight:700;color:var(--text-2);white-space:nowrap;text-align:center}
.cp-label.current{color:var(--accent-ink)}
.cp-label.done{color:var(--ok)}
.cp-connector{flex:1;height:2px;background:var(--border);min-width:28px;position:relative;z-index:0}
.cp-connector.done{background:var(--ok)}
.cp-connector.active{background:linear-gradient(90deg,var(--ok),var(--accent))}

/* skill category */
.skill-cat{margin-bottom:20px}
.skill-cat-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.skill-cat-ico{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.skill-cat-ico svg{width:13px;height:13px}
.skill-cat-name{font-size:.8rem;font-weight:700;color:var(--text-2);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em}
.skill-cat-avg{margin-left:auto;font-family:var(--font-mono);font-size:.72rem;font-weight:700}

/* skill row */
.skill-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.skill-row:last-child{border-bottom:none}
.skill-name{font-size:.85rem;color:var(--text);display:flex;align-items:center;gap:8px}
.skill-name .snbadge{font-size:.65rem;padding:1px 6px;border-radius:99px;font-family:var(--font-mono);font-weight:700}
.skill-name .snbadge.new{background:rgba(74,222,128,.12);color:var(--ok)}
.skill-name .snbadge.hot{background:rgba(251,191,36,.12);color:var(--warn)}
.skill-dots{display:flex;gap:4px;align-items:center}
.skill-dot{width:16px;height:16px;border-radius:4px;cursor:pointer;transition:transform .12s,opacity .12s;border:1.5px solid var(--border-2)}
.skill-dot.filled{border-color:transparent}
.skill-dot:hover{transform:scale(1.15)}

/* level colors */
.lv1{background:rgba(255,107,107,.2);border-color:rgba(255,107,107,.4)}
.lv2{background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.4)}
.lv3{background:rgba(59,91,219,.25);border-color:rgba(59,91,219,.5)}
.lv4{background:rgba(74,222,128,.22);border-color:rgba(74,222,128,.45)}
.lv5{background:rgba(167,139,250,.25);border-color:rgba(167,139,250,.5)}

/* level legend */
.level-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;padding:10px 14px;background:var(--content);border-radius:8px;border:1px solid var(--border)}
.ll-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text-3)}
.ll-dot{width:12px;height:12px;border-radius:3px}

/* goals / development plan */
.goal-list{display:flex;flex-direction:column;gap:8px}
.goal-item{display:flex;gap:12px;padding:12px 14px;background:var(--content);border-radius:10px;border:1px solid var(--border);transition:border-color .15s;cursor:pointer}
.goal-item:hover{border-color:var(--border-2)}
.goal-item.done{opacity:.65}
.goal-check{width:20px;height:20px;border-radius:5px;flex-shrink:0;display:grid;place-items:center;margin-top:1px;cursor:pointer;transition:background .15s,border-color .15s;border:2px solid var(--border-2)}
.goal-check.done{background:var(--ok);border-color:var(--ok)}
.goal-check.done svg{display:block}
.goal-check svg{display:none;width:11px;height:11px;color:#fff}
.goal-body{flex:1;min-width:0}
.goal-title{font-size:.88rem;font-weight:600;color:var(--text);line-height:1.3}
.goal-item.done .goal-title{text-decoration:line-through;color:var(--text-3)}
.goal-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:5px}
.goal-tag{font-family:var(--font-mono);font-size:.66rem;padding:2px 7px;border-radius:99px;background:var(--elev);border:1px solid var(--border);color:var(--text-3)}
.goal-due{font-family:var(--font-mono);font-size:.68rem;color:var(--warn)}
.goal-progress{margin-top:7px;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.goal-progress i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:99px;transition:width .4s var(--ease)}

/* certifications */
.cert-list{display:flex;flex-direction:column;gap:8px}
.cert-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--content);border:1px solid var(--border);border-radius:10px}
.cert-ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.cert-ico svg{width:16px;height:16px}
.cert-name{font-size:.86rem;font-weight:600;color:var(--text);flex:1}
.cert-date{font-family:var(--font-mono);font-size:.72rem;color:var(--text-3)}
.cert-badge{font-family:var(--font-mono);font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:99px}
.cert-badge.verified{background:var(--ok-soft);color:var(--ok)}
.cert-badge.in-progress{background:var(--warn-soft);color:var(--warn)}

/* add goal modal */
.ag-modal{width:100%;max-width:480px;background:var(--elev);border:1px solid var(--border-2);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.6);overflow:hidden}
.ag-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--border)}
.ag-head .ico{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;flex-shrink:0}
.ag-head .ico svg{width:17px;height:17px;color:#fff}
.ag-head h3{font-size:1rem;font-weight:700}
.ag-head .x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none}
.ag-head .x:hover{background:var(--content);color:var(--text)}
.ag-head .x svg{width:17px;height:17px}
.ag-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.ag-field{display:flex;flex-direction:column;gap:5px}
.ag-field label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3)}
.ag-field input,.ag-field select,.ag-field textarea{font-family:inherit;font-size:.9rem;color:var(--text);background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:8px 11px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.ag-field input:focus,.ag-field select:focus,.ag-field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.ag-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border)}

/* right sidebar */
.sc-right{display:flex;flex-direction:column;gap:16px}
.summary-ring{display:flex;flex-direction:column;align-items:center;gap:12px;padding:22px 18px;background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);text-align:center}
.summary-ring .sr-name{font-size:1.02rem;font-weight:700;color:var(--text)}
.summary-ring .sr-role{font-size:.76rem;color:var(--text-3);font-family:var(--font-mono)}
.summary-ring .sr-level{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);padding:5px 14px;border-radius:99px;margin-top:4px}
.score-ring{width:80px;height:80px;position:relative;flex-shrink:0}
.score-ring svg{width:80px;height:80px;transform:rotate(-90deg)}
.score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring .ring-val{font-family:var(--font-mono);font-size:1.1rem;font-weight:800;color:var(--text)}
.score-ring .ring-lbl{font-size:.6rem;color:var(--text-3)}

.sc-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc-stat{background:var(--content);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.sc-stat .sv{font-family:var(--font-mono);font-size:1.1rem;font-weight:800;color:var(--text)}
.sc-stat .sl{font-size:.72rem;color:var(--text-3);margin-top:3px}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--elev);border:1px solid var(--border-2);border-radius:10px;padding:12px 22px;font-size:.86rem;font-weight:500;color:var(--text);box-shadow:var(--shadow-lg);z-index:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-left:3px solid var(--ok)}
.toast.warn{border-left:3px solid var(--warn)}
.toast.err{border-left:3px solid var(--danger)}
</style>

    goals:[
      {id:"g13",title:"Đảm nhận vai trò Tech Lead cho module Salary Q3",cat:"Leadership",due:"Q3/2026",progress:10,done:false},
      {id:"g14",title:"Viết 2 tech blog về Prisma multi-tenant",cat:"Writing",due:"Q4/2026",progress:50,done:false},
      {id:"g15",title:"Nghiên cứu Kubernetes cho production deployment",cat:"Tools",due:"Q4/2026",progress:30,done:false},
      {id:"g16",title:"Hoàn thành CI/CD pipeline cho toàn bộ project",cat:"Dự án",due:"Q2/2026",progress:100,done:true}
    ],
    certs:[
      {name:"AWS Solutions Architect Associate",date:"08/2024",status:"verified"},
      {name:"Prisma Certified Developer",date:"02/2025",status:"verified"},
      {name:"Certified Kubernetes Administrator",date:"đang học",status:"in-progress"}
    ],
    overallSkill:4.4
  }
};

/* ── STATE ── */
var selMember = "MA";

/* ── UTILS ── */
function mn(v){var m=MEMBERS_LIST.find(function(x){return x.v===v;});return m?m.l:v;}
function getProfile(){return PROFILES[selMember]||{};}
function getMember(){return MEMBERS_LIST.find(function(x){return x.v===selMember;})||{};}
function totalSkillCount(){
  return Object.values(PROFILES).reduce(function(a,p){
    return a+Object.values(p.skills).reduce(function(b,cat){return b+cat.length;},0);
  },0);
}

/* ── KPI CARDS ── */
function renderKPIs(){
  var total=totalSkillCount();
  var allProfiles=Object.values(PROFILES);
  var avgOverall=Math.round(allProfiles.reduce(function(a,p){return a+p.overallSkill;},0)/allProfiles.length*10)/10;
  var totalGoals=allProfiles.reduce(function(a,p){return a+p.goals.filter(function(g){return !g.done;}).length;},0);
  var totalCerts=allProfiles.reduce(function(a,p){return a+p.certs.filter(function(c){return c.status==="verified";}).length;},0);

  document.getElementById("totalSkills").textContent=total;

  var cards=[
    {ico:'<path d="M12 2l9 5-9 5-9-5z"/><path d="M3 12l9 5 9-5M3 17l9 5 9-5"/>',
     lab:"Kỹ năng đang track",val:total,chg:"4 thành viên",cls:"flat"},
    {ico:'<path d="M12 2l2.6 6.3L21 9l-5 4.3L17.5 20 12 16.5 6.5 20 8 13.3 3 9l6.4-.7z"/>',
     lab:"Mức kỹ năng TB",val:avgOverall+"/5",chg:"toàn team",cls:"up"},
    {ico:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
     lab:"Mục tiêu đang theo",val:totalGoals,chg:"đang tiến hành",cls:totalGoals>0?"warn":"flat"},
    {ico:'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round"/>',
     lab:"Chứng chỉ",val:totalCerts,chg:"đã xác nhận",cls:"up"}
  ];
  document.getElementById("kpiRow").innerHTML=cards.map(function(k){
    return '<div class="kpi"><div class="kt"><span class="ki"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+k.ico+'</svg></span>'+k.lab+'</div><div class="kv">'+k.val+'</div><div class="kc '+k.cls+'">'+k.chg+'</div></div>';
  }).join("");
}

/* ── MEMBER TABS ── */
function renderMemberTabs(){
  document.getElementById("memberTabs").innerHTML=MEMBERS_LIST.map(function(m){
    return '<button class="mtab'+(selMember===m.v?" on":"")+'" data-who="'+m.v+'">'+
      '<div class="mav">'+m.v+'</div>'+
      '<div><div class="mname">'+m.l+'</div><div class="mrole">'+m.dept+'</div></div>'+
      '<span class="mlevel">'+m.level+'</span>'+
    '</button>';
  }).join("");
}

/* ── SKILL DOTS ── */
function skillDotsHtml(who,catKey,skillIdx,level){
  return [1,2,3,4,5].map(function(i){
    var filled=i<=level;
    var cls=filled?"skill-dot filled lv"+i:"skill-dot";
    return '<div class="'+cls+'" data-who="'+who+'" data-cat="'+catKey+'" data-idx="'+skillIdx+'" data-lv="'+i+'" title="'+LEVEL_LABELS[i]+'" style="background:'+(filled?LEVEL_COLORS[i]:"")+'"></div>';
  }).join("");
}

/* ── LEFT CONTENT ── */
function renderLeft(){
  var m=getMember();
  var p=getProfile();
  var track=CAREER_TRACKS[m.dept]||CAREER_TRACKS["Backend"];
  var curIdx=track.indexOf(m.level);

  /* career path */
  var careerHtml='<div class="career-path">';
  track.forEach(function(lvl,i){
    var status=i<curIdx?"done":i===curIdx?"current":i===curIdx+1?"next":"future";
    careerHtml+='<div class="cp-node '+status+'">'+
      '<div class="cp-circle '+status+'">'+
        (status==="done"
          ?'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M5 12l5 5L20 6"/></svg>'
          :status==="current"?'▶':(i+1))+
      '</div>'+
      '<span class="cp-label '+status+'">'+lvl+'</span>'+
    '</div>'+
    (i<track.length-1?'<div class="cp-connector'+(i<curIdx?" done":i===curIdx-1?" active":"")+'"></div>':'');
  });
  careerHtml+='</div>';

  /* skills */
  var levelLegendHtml='<div class="level-legend">'+
    [1,2,3,4,5].map(function(i){return '<span class="ll-item"><span class="ll-dot" style="background:'+LEVEL_COLORS[i]+'"></span>'+LEVEL_LABELS[i]+'</span>';}).join("")+
  '</div>';

  var skillsHtml=SKILL_CATS.map(function(cat){
    var items=(p.skills[cat.k]||[]);
    var avgLv=items.length?Math.round(items.reduce(function(a,s){return a+s.lv;},0)/items.length*10)/10:0;
    return '<div class="skill-cat">'+
      '<div class="skill-cat-head">'+
        '<div class="skill-cat-ico" style="background:'+cat.bg+'"><svg viewBox="0 0 24 24" fill="none" stroke="'+cat.color+'" stroke-width="2" stroke-linecap="round">'+cat.ico+'</svg></div>'+
        '<span class="skill-cat-name">'+cat.l+'</span>'+
        '<span class="skill-cat-avg" style="color:'+cat.color+'">TB '+avgLv+'/5</span>'+
      '</div>'+
      '<div>'+
        items.map(function(s,si){
          var badge=s.badge?'<span class="snbadge '+s.badge+'">'+(s.badge==="new"?"NEW":"🔥")+'</span>':'';
          return '<div class="skill-row">'+
            '<span class="skill-name">'+s.n+badge+'</span>'+
            '<div class="skill-dots" id="dots-'+selMember+'-'+cat.k+'-'+si+'">'+
              skillDotsHtml(selMember,cat.k,si,s.lv)+
            '</div>'+
          '</div>';
        }).join("")+
      '</div>'+
    '</div>';
  }).join("");

  /* goals */
  var activeGoals=p.goals.filter(function(g){return !g.done;});
  var doneGoals=p.goals.filter(function(g){return g.done;});
  var goalsHtml='<div class="goal-list">'+
    activeGoals.map(function(g){
      return '<div class="goal-item" data-gid="'+g.id+'">'+
        '<div class="goal-check" data-gid="'+g.id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></div>'+
        '<div class="goal-body">'+
          '<div class="goal-title">'+g.title+'</div>'+
          '<div class="goal-meta">'+
            '<span class="goal-tag">'+g.cat+'</span>'+
            '<span class="goal-due">⏱ '+g.due+'</span>'+
          '</div>'+
          (g.progress>0?'<div class="goal-progress"><i style="width:'+g.progress+'%"></i></div>':'')+
        '</div>'+
        '<span style="font-family:var(--font-mono);font-size:.78rem;font-weight:700;color:var(--text-3)">'+g.progress+'%</span>'+
      '</div>';
    }).join("")+
    (doneGoals.length?'<div style="font-size:.72rem;font-weight:700;color:var(--text-3);font-family:var(--font-mono);letter-spacing:.06em;text-transform:uppercase;padding:6px 0">Đã hoàn thành ('+doneGoals.length+')</div>'+
      doneGoals.map(function(g){
        return '<div class="goal-item done" data-gid="'+g.id+'">'+
          '<div class="goal-check done" data-gid="'+g.id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></div>'+
          '<div class="goal-body"><div class="goal-title">'+g.title+'</div>'+
            '<div class="goal-meta"><span class="goal-tag">'+g.cat+'</span></div>'+
          '</div>'+
          '<span style="font-family:var(--font-mono);font-size:.7rem;color:var(--ok)">✓</span>'+
        '</div>';
      }).join(""):"")+
  '</div>';

  document.getElementById("leftContent").innerHTML=
    '<div class="sc-card">'+
      '<div class="sc-card-head"><h3>Lộ trình career · '+m.dept+'</h3><span class="sub">Cấp hiện tại: <b style="color:var(--accent-ink)">'+m.level+'</b> → Tiếp theo: <b>'+m.nextLevel+'</b></span></div>'+
      careerHtml+
    '</div>'+
    '<div class="sc-card">'+
      '<div class="sc-card-head"><h3>Bản đồ kỹ năng</h3><span class="sub">Click dot để cập nhật mức độ</span></div>'+
      '<div class="sc-card-body">'+levelLegendHtml+skillsHtml+'</div>'+
    '</div>'+
    '<div class="sc-card">'+
      '<div class="sc-card-head"><h3>Mục tiêu phát triển</h3>'+
        '<button class="abtn ghost" id="addGoalInlineBtn" style="height:28px;font-size:.78rem;gap:5px">'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="12" height="12"><path d="M12 5v14M5 12h14"/></svg>Thêm'+
        '</button>'+
      '</div>'+
      '<div class="sc-card-body">'+goalsHtml+'</div>'+
    '</div>';
}

/* ── RIGHT CONTENT ── */
function renderRight(){
  var m=getMember();
  var p=getProfile();
  var allSkills=Object.values(p.skills).flat();
  var expert=allSkills.filter(function(s){return s.lv>=5;}).length;
  var toImprove=allSkills.filter(function(s){return s.lv<=2;}).length;

  /* score ring */
  var score=p.overallSkill;
  var circ=2*Math.PI*34;
  var offset=circ*(1-(score/5));
  var ringColor=score>=4?"var(--ok)":score>=3?"var(--accent)":"var(--warn)";

  var certsHtml=p.certs.map(function(c){
    var ico=c.status==="verified"
      ?'<svg viewBox="0 0 24 24" fill="none" stroke="'+ringColor+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>'
      :'<svg viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
    return '<div class="cert-item">'+
      '<div class="cert-ico" style="background:'+(c.status==="verified"?"var(--ok-soft)":"var(--warn-soft)")+'">'+ico+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="cert-name">'+c.name+'</div>'+
        '<div class="cert-date">'+c.date+'</div>'+
      '</div>'+
      '<span class="cert-badge '+c.status+'">'+(c.status==="verified"?"✓ Verified":"Đang học")+'</span>'+
    '</div>';
  }).join("");

  document.getElementById("rightContent").innerHTML=
    '<div class="summary-ring">'+
      '<div class="score-ring">'+
        '<svg width="80" height="80" viewBox="0 0 80 80" style="transform:rotate(-90deg)">'+
          '<circle cx="40" cy="40" r="34" fill="none" stroke="var(--border)" stroke-width="6"/>'+
          '<circle cx="40" cy="40" r="34" fill="none" stroke="'+ringColor+'" stroke-width="6" stroke-linecap="round"'+
            ' stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'" style="transition:stroke-dashoffset .6s var(--ease)"/>'+
        '</svg>'+
        '<div class="ring-text"><span class="ring-val" style="color:'+ringColor+'">'+score+'</span><span class="ring-lbl">/5 avg</span></div>'+
      '</div>'+
      '<div class="sr-name">'+m.l+'</div>'+
      '<div class="sr-role">'+m.role+'</div>'+
      '<div class="sr-level">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><circle cx="12" cy="8" r="5"/><path d="M8.5 12.5L7 22l5-3 5 3-1.5-9.5"/></svg>'+
        m.level+' → '+m.nextLevel+
      '</div>'+
    '</div>'+
    '<div class="sc-card">'+
      '<div class="sc-card-head"><h3>Thống kê nhanh</h3></div>'+
      '<div class="sc-card-body" style="padding:12px">'+
        '<div class="sc-stat-grid">'+
          '<div class="sc-stat"><div class="sv">'+allSkills.length+'</div><div class="sl">Kỹ năng</div></div>'+
          '<div class="sc-stat"><div class="sv" style="color:var(--ok)">'+expert+'</div><div class="sl">Expert (5★)</div></div>'+
          '<div class="sc-stat"><div class="sv">'+p.certs.filter(function(c){return c.status==="verified";}).length+'</div><div class="sl">Chứng chỉ</div></div>'+
          '<div class="sc-stat"><div class="sv" style="color:var(--warn)">'+toImprove+'</div><div class="sl">Cần nâng cao</div></div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="sc-card">'+
      '<div class="sc-card-head"><h3>Chứng chỉ & Bằng cấp</h3></div>'+
      '<div class="sc-card-body"><div class="cert-list">'+certsHtml+'</div></div>'+
    '</div>';
}

/* ── ADD GOAL MODAL ── */
function openGoalModal(){
  if(document.getElementById("goalModal")) return;
  var back=document.createElement("div");back.className="modal-back";back.id="goalModal";
  back.innerHTML='<div class="ag-modal">'+
    '<div class="ag-head">'+
      '<div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke-linejoin="round"/></svg></div>'+
      '<h3>Thêm mục tiêu phát triển</h3>'+
      '<button class="x" id="goalClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>'+
    '</div>'+
    '<div class="ag-body">'+
      '<div class="ag-field"><label>Mục tiêu *</label><input type="text" id="gt" placeholder="Mô tả mục tiêu cụ thể…"/></div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
        '<div class="ag-field"><label>Danh mục</label><select id="gc"><option>Học tập</option><option>Dự án</option><option>Kỹ năng</option><option>Tools</option><option>Leadership</option><option>Writing</option></select></div>'+
        '<div class="ag-field"><label>Deadline</label><input type="text" id="gd" placeholder="Q3/2026"/></div>'+
      '</div>'+
    '</div>'+
    '<div class="ag-foot"><button class="abtn ghost" id="goalCancel">Hủy</button><button class="abtn primary" id="goalSave">Thêm mục tiêu</button></div>'+
  '</div>';
  document.body.appendChild(back);

  function close(){var m=document.getElementById("goalModal");if(m)m.remove();}
  back.addEventListener("click",function(e){if(e.target===back)close();});
  document.getElementById("goalClose").addEventListener("click",close);
  document.getElementById("goalCancel").addEventListener("click",close);
  document.getElementById("goalSave").addEventListener("click",function(){
    var title=document.getElementById("gt").value.trim();
    var cat=document.getElementById("gc").value;
    var due=document.getElementById("gd").value.trim()||"TBD";
    if(!title){showToast("Vui lòng nhập mục tiêu","err");return;}
    var id="g-"+(Date.now());
    PROFILES[selMember].goals.unshift({id:id,title:title,cat:cat,due:due,progress:0,done:false});
    close();renderLeft();renderRight();
    showToast("Đã thêm mục tiêu ✓","ok");
  });
  requestAnimationFrame(function(){document.getElementById("gt").focus();});
}

/* ── EVENTS ── */
document.getElementById("memberTabs").addEventListener("click",function(e){
  var b=e.target.closest(".mtab[data-who]");if(!b)return;
  selMember=b.dataset.who;renderMemberTabs();renderLeft();renderRight();
});

document.getElementById("addGoalBtn").addEventListener("click",openGoalModal);

/* skill dot click — update level */
document.getElementById("leftContent").addEventListener("click",function(e){
  var dot=e.target.closest(".skill-dot[data-who]");
  if(dot){
    var who=dot.dataset.who,cat=dot.dataset.cat,idx=+dot.dataset.idx,lv=+dot.dataset.lv;
    var cur=PROFILES[who].skills[cat][idx].lv;
    /* clicking same level = deselect (go to lv-1), else set to lv */
    PROFILES[who].skills[cat][idx].lv=cur===lv?lv-1:lv;
    /* update overall */
    var all=Object.values(PROFILES[who].skills).flat();
    PROFILES[who].overallSkill=Math.round(all.reduce(function(a,s){return a+s.lv;},0)/all.length*10)/10;
    /* re-render dots */
    var newLv=PROFILES[who].skills[cat][idx].lv;
    var dotsEl=document.getElementById("dots-"+who+"-"+cat+"-"+idx);
    if(dotsEl) dotsEl.innerHTML=skillDotsHtml(who,cat,idx,newLv);
    renderRight();renderKPIs();
    showToast(PROFILES[who].skills[cat][idx].n+" → "+LEVEL_LABELS[newLv],"ok");
    return;
  }
  /* goal checkbox */
  var check=e.target.closest(".goal-check[data-gid]");
  if(check){
    var gid=check.dataset.gid;
    var goals=PROFILES[selMember].goals;
    var g=goals.find(function(x){return x.id===gid;});
    if(g){g.done=!g.done;g.progress=g.done?100:g.progress;renderLeft();}
    return;
  }
  /* add goal inline */
  var ab=e.target.closest("#addGoalInlineBtn");
  if(ab) openGoalModal();
});

/* ── TOAST ── */
function showToast(msg,type){
  var t=document.getElementById("toast");
  t.textContent=msg;t.className="toast "+(type||"ok");
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2500);
}

/* ── RENDER ALL ── */
function renderAll(){renderKPIs();renderMemberTabs();renderLeft();renderRight();}
renderAll();

})();
</script>
<script src="js/admin.js"></script>
</body>
