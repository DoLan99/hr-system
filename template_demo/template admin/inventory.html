<style>
/* ── Inventory page ── */
.inv-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.inv-tabs{display:flex;gap:4px;flex-wrap:wrap}
.inv-tab{height:34px;padding:0 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--elev);font-size:.82rem;font-weight:600;color:var(--text-2);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.inv-tab:hover{border-color:var(--border-2);color:var(--text)}
.inv-tab.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink)}
.inv-tab .tcnt{font-family:var(--font-mono);font-size:.64rem;padding:1px 6px;border-radius:99px;background:rgba(255,255,255,.07)}
.inv-tab.on .tcnt{background:var(--accent-soft-2)}
.inv-search{display:flex;align-items:center;gap:8px;height:34px;padding:0 12px;background:var(--elev);border:1px solid var(--border);border-radius:9px;color:var(--text-3);min-width:200px}
.inv-search svg{width:14px;height:14px;flex-shrink:0}
.inv-search input{background:none;border:none;outline:none;font-family:inherit;font-size:.82rem;color:var(--text);width:100%}
.inv-search input::placeholder{color:var(--text-3)}

/* table */
.inv-table-wrap{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow-x:auto}
.inv-table{width:100%;border-collapse:collapse;min-width:880px}
.inv-table th{text-align:left;padding:11px 16px;font-family:var(--font-mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:600;background:var(--content);border-bottom:1px solid var(--border);white-space:nowrap}
.inv-table th.r,.inv-table td.r{text-align:right}
.inv-table th.c,.inv-table td.c{text-align:center}
.inv-table td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.inv-table tbody tr:last-child td{border-bottom:none}
.inv-table tbody tr{transition:background .12s;cursor:pointer}
.inv-table tbody tr:hover{background:var(--content)}
.prod-thumb{width:40px;height:40px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;font-size:1.05rem}
.prod-name{font-size:.87rem;font-weight:600;color:var(--text)}
.prod-sku{font-size:.72rem;color:var(--text-3);font-family:var(--font-mono);margin-top:1px}
.cat-tag{font-family:var(--font-mono);font-size:.66rem;font-weight:600;padding:3px 9px;border-radius:99px}
.stock-num{font-family:var(--font-mono);font-size:.92rem;font-weight:800}
.stock-unit{font-size:.7rem;color:var(--text-3);font-weight:400;margin-left:2px}
.price-cell{font-family:var(--font-mono);font-size:.84rem;color:var(--text-2)}

/* stock bar */
.stock-bar-wrap{display:flex;align-items:center;gap:8px;min-width:130px}
.stock-bar{flex:1;height:6px;border-radius:99px;background:var(--border);overflow:hidden}
.stock-bar i{display:block;height:100%;border-radius:99px;transition:width .5s var(--ease)}
/* status */
.stk-status{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:99px;white-space:nowrap}
.stk-status.in{background:var(--ok-soft);color:var(--ok)}
.stk-status.low{background:var(--warn-soft);color:var(--warn)}
.stk-status.out{background:var(--danger-soft);color:var(--danger)}

/* drawer */
.id-back{position:fixed;inset:0;background:rgba(4,8,18,.6);backdrop-filter:blur(3px);z-index:100;opacity:0;transition:opacity .22s;pointer-events:none}
.id-back.open{opacity:1;pointer-events:auto}
.id-drawer{position:fixed;top:0;right:0;height:100vh;width:540px;max-width:97vw;background:var(--elev);border-left:1px solid var(--border-2);box-shadow:-30px 0 60px rgba(0,0,0,.45);z-index:101;transform:translateX(100%);transition:transform .28s var(--ease);display:flex;flex-direction:column;overflow:hidden}
.id-drawer.open{transform:translateX(0)}
.id-head{display:flex;align-items:center;gap:14px;padding:20px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.id-close{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none;flex-shrink:0}
.id-close:hover{background:var(--content);color:var(--text)}
.id-close svg{width:17px;height:17px}
.id-body{flex:1;overflow-y:auto;padding:22px}
.id-foot{flex-shrink:0;border-top:1px solid var(--border);padding:16px 22px;display:flex;gap:10px}
.dsec{font-family:var(--font-mono);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;margin-top:6px}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.metric{background:var(--content);border:1px solid var(--border);border-radius:11px;padding:14px}
.metric .ml{font-size:.7rem;color:var(--text-3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em}
.metric .mv{font-family:var(--font-mono);font-size:1.15rem;font-weight:800;margin-top:5px;line-height:1}
.metric .mc{font-size:.7rem;margin-top:4px;font-weight:600}
.dcard{background:var(--content);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.drow{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none}
.drow .dl{font-size:.8rem;color:var(--text-3);min-width:120px;flex-shrink:0}
.drow .dv{font-size:.88rem;color:var(--text);flex:1;display:flex;align-items:center;gap:8px;font-weight:500}

/* movement history */
.mov-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.mov-row:last-child{border-bottom:none}
.mov-ic{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.mov-ic svg{width:15px;height:15px}
.mov-ic.in{background:var(--ok-soft);color:var(--ok)}
.mov-ic.out{background:var(--danger-soft);color:var(--danger)}
.mov-ic.adjust{background:var(--warn-soft);color:var(--warn)}
.mov-info{flex:1;min-width:0}
.mov-txt{font-size:.84rem;color:var(--text);font-weight:500}
.mov-meta{font-size:.72rem;color:var(--text-3);font-family:var(--font-mono);margin-top:1px}
.mov-qty{font-family:var(--font-mono);font-size:.88rem;font-weight:800;flex-shrink:0}
.mov-qty.in{color:var(--ok)}
.mov-qty.out{color:var(--danger)}

/* quick stock adjust */
.qadj{display:flex;gap:8px;align-items:stretch}
.qadj button{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px;border-radius:11px;border:1.5px solid var(--border-2);background:var(--content);cursor:pointer;font-family:inherit;transition:all .15s}
.qadj button svg{width:20px;height:20px}
.qadj button .ql{font-size:.78rem;font-weight:700}
.qadj button.in:hover{border-color:var(--ok);background:var(--ok-soft);color:var(--ok)}
.qadj button.out:hover{border-color:var(--danger);background:var(--danger-soft);color:var(--danger)}
.qadj button.adjust:hover{border-color:var(--warn);background:var(--warn-soft);color:var(--warn)}

/* modal */
.im-modal{width:100%;max-width:480px;max-height:92vh;background:var(--elev);border:1px solid var(--border-2);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden}
.im-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.im-head .ico{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;flex-shrink:0}
.im-head .ico svg{width:17px;height:17px;color:#fff}
.im-head h3{font-size:1rem;font-weight:700}
.im-head .x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none}
.im-head .x:hover{background:var(--content);color:var(--text)}
.im-head .x svg{width:17px;height:17px}
.im-body{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:16px}
.im-foot{flex-shrink:0;display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border)}
.im-field{display:flex;flex-direction:column;gap:6px}
.im-field label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3)}
.im-field input,.im-field select,.im-field textarea{font-family:inherit;font-size:.9rem;color:var(--text);background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:9px 12px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.im-field input:focus,.im-field select:focus,.im-field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.im-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.im-row{grid-template-columns:1fr}}
.dir-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.dir-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;border-radius:10px;border:2px solid var(--border);background:var(--content);cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:600;color:var(--text-2);transition:all .15s}
.dir-btn svg{width:18px;height:18px}
.dir-btn.on.in{border-color:var(--ok);background:var(--ok-soft);color:var(--ok)}
.dir-btn.on.out{border-color:var(--danger);background:var(--danger-soft);color:var(--danger)}
.dir-btn.on.adjust{border-color:var(--warn);background:var(--warn-soft);color:var(--warn)}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--elev);border:1px solid var(--border-2);border-radius:10px;padding:12px 22px;font-size:.86rem;font-weight:500;color:var(--text);box-shadow:var(--shadow-lg);z-index:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-left:3px solid var(--ok)}
.toast.warn{border-left:3px solid var(--warn)}
.toast.err{border-left:3px solid var(--danger)}
</style>
</head>

  {id:"P-010",name:"Webcam Logitech C920",sku:"DEV-CAM-C920",cat:"device",wh:"hn",stock:9,min:4,max:20,cost:1850000,emoji:"📷",
   moves:[{type:"in",qty:12,by:"DL",date:"05/06/2026",note:"Nhập kho HN"},{type:"out",qty:3,by:"HG",date:"13/06/2026",note:"Setup họp online"}]},
  {id:"P-011",name:"Sổ tay da jobihome",sku:"MER-NOTE-LX",cat:"merch",wh:"hn",stock:55,min:20,max:100,cost:95000,emoji:"📓",
   moves:[{type:"in",qty:60,by:"LN",date:"01/05/2026",note:"In sổ branding"},{type:"out",qty:5,by:"LN",date:"11/06/2026",note:"Tặng đối tác"}]},
  {id:"P-012",name:"Chuột Logitech MX Master 3",sku:"DEV-MOUSE-MX3",cat:"device",wh:"hcm",stock:7,min:5,max:20,cost:2400000,emoji:"🖱️",
   moves:[{type:"in",qty:10,by:"DL",date:"05/06/2026",note:"Nhập kho"},{type:"out",qty:3,by:"TU",date:"14/06/2026",note:"Cấp dev"}]}
];

/* ── STATE ── */
var selTab="all", search="", openId=null;

/* ── UTILS ── */
function fmt(n){if(n>=1000000)return (n/1000000).toFixed(n%1000000===0?0:1)+"tr";if(n>=1000)return Math.round(n/1000)+"k";return n.toLocaleString("vi-VN");}
function fmtFull(n){return n.toLocaleString("vi-VN")+"đ";}
function stockStatus(p){if(p.stock===0)return "out";if(p.stock<p.min)return "low";return "in";}
function statusLabel(s){return {in:"Còn hàng",low:"Sắp hết",out:"Hết hàng"}[s];}
function statusColor(s){return {in:"var(--ok)",low:"var(--warn)",out:"var(--danger)"}[s];}

function filtered(){
  return PRODUCTS.filter(function(p){
    var st=stockStatus(p);
    if(selTab==="low"&&st!=="low")return false;
    if(selTab==="out"&&st!=="out")return false;
    if(selTab!=="all"&&selTab!=="low"&&selTab!=="out"&&p.cat!==selTab)return false;
    if(search){var q=search.toLowerCase();return p.name.toLowerCase().indexOf(q)!==-1||p.sku.toLowerCase().indexOf(q)!==-1;}
    return true;
  });
}

/* ── KPIs ── */
function renderKPIs(){
  var totalVal=PRODUCTS.reduce(function(a,p){return a+p.stock*p.cost;},0);
  var low=PRODUCTS.filter(function(p){return stockStatus(p)==="low";}).length;
  var out=PRODUCTS.filter(function(p){return stockStatus(p)==="out";}).length;
  var totalUnits=PRODUCTS.reduce(function(a,p){return a+p.stock;},0);

  document.getElementById("skuCount").textContent=PRODUCTS.length;
  document.getElementById("totalValue").textContent=fmt(totalVal);
  document.getElementById("lowHead").textContent=low+out;

  var cards=[
    {ico:'<path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4" stroke-linecap="round"/>',
     lab:"Mã hàng (SKU)",val:PRODUCTS.length,chg:totalUnits+" đơn vị tồn",cls:"flat"},
    {ico:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
     lab:"Giá trị tồn kho",val:fmt(totalVal),chg:"theo giá nhập",cls:"flat"},
    {ico:'<path d="M10.3 3.9l-7 12A2 2 0 0 0 5 19h14a2 2 0 0 0 1.7-3l-7-12a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01" stroke-linecap="round"/>',
     lab:"Sắp hết hàng",val:low,chg:"dưới mức tồn tối thiểu",cls:low>0?"warn":"flat"},
    {ico:'<circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6" stroke-linecap="round"/>',
     lab:"Hết hàng",val:out,chg:"cần nhập gấp",cls:out>0?"down":"flat"}
  ];
  document.getElementById("kpiRow").innerHTML=cards.map(function(k){
    return '<div class="kpi"><div class="kt"><span class="ki"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+k.ico+'</svg></span>'+k.lab+'</div><div class="kv">'+k.val+'</div><div class="kc '+k.cls+'">'+k.chg+'</div></div>';
  }).join("");
}

/* ── TABS ── */
function renderTabs(){
  var counts={all:PRODUCTS.length,low:PRODUCTS.filter(function(p){return stockStatus(p)==="low";}).length,out:PRODUCTS.filter(function(p){return stockStatus(p)==="out";}).length};
  Object.keys(CATS).forEach(function(k){counts[k]=PRODUCTS.filter(function(p){return p.cat===k;}).length;});
  var tabs=[{k:"all",l:"Tất cả"},{k:"low",l:"⚠ Sắp hết"},{k:"out",l:"Hết hàng"}].concat(Object.keys(CATS).map(function(k){return {k:k,l:CATS[k].l};}));
  document.getElementById("invTabs").innerHTML=tabs.map(function(t){
    return '<button class="inv-tab'+(selTab===t.k?" on":"")+'" data-k="'+t.k+'">'+t.l+'<span class="tcnt">'+counts[t.k]+'</span></button>';
  }).join("");
}

/* ── TABLE ── */
function renderTable(){
  var list=filtered();
  var body=document.getElementById("invBody");
  if(!list.length){body.innerHTML='<tr><td colspan="8" style="text-align:center;padding:48px;color:var(--text-3)">Không có sản phẩm nào.</td></tr>';return;}
  body.innerHTML=list.map(function(p){
    var c=CATS[p.cat], st=stockStatus(p), sc=statusColor(st);
    var pct=Math.min(100,Math.round(p.stock/p.max*100));
    return '<tr data-id="'+p.id+'">'+
      '<td><div style="display:flex;align-items:center;gap:11px"><div class="prod-thumb" style="background:'+c.bg+'">'+p.emoji+'</div>'+
        '<div style="min-width:0"><div class="prod-name">'+p.name+'</div><div class="prod-sku">'+p.sku+'</div></div></div></td>'+
      '<td><span class="cat-tag" style="background:'+c.bg+';color:'+c.color+'">'+c.l+'</span></td>'+
      '<td style="font-size:.82rem;color:var(--text-2)">'+WAREHOUSES[p.wh]+'</td>'+
      '<td class="r"><span class="stock-num" style="color:'+sc+'">'+p.stock+'</span><span class="stock-unit">/'+p.max+'</span></td>'+
      '<td><div class="stock-bar-wrap"><div class="stock-bar"><i style="width:'+pct+'%;background:'+sc+'"></i></div></div></td>'+
      '<td class="r price-cell">'+fmtFull(p.cost)+'</td>'+
      '<td class="r" style="font-family:var(--font-mono);font-size:.84rem;font-weight:700;color:var(--text)">'+fmt(p.stock*p.cost)+'</td>'+
      '<td><span class="stk-status '+st+'">'+statusLabel(st)+'</span></td>'+
    '</tr>';
  }).join("");
}

/* ── DRAWER ── */
function openDrawer(id){
  var p=PRODUCTS.find(function(x){return x.id===id;});
  if(!p)return;openId=id;
  var c=CATS[p.cat], st=stockStatus(p), sc=statusColor(st);
  var thumb=document.getElementById("idThumb");
  thumb.style.background=c.bg;thumb.textContent=p.emoji;
  document.getElementById("idName").textContent=p.name;
  document.getElementById("idSku").textContent=p.sku+" · "+c.l;

  var movesHtml=p.moves.slice().reverse().map(function(m){
    var icCls=m.type==="in"?"in":m.type==="out"?"out":"adjust";
    var sign=m.type==="in"?"+":m.type==="out"?"−":"±";
    var arw=m.type==="in"?'<path d="M12 19V5M5 12l7-7 7 7"/>':m.type==="out"?'<path d="M12 5v14M5 12l7 7 7-7"/>':'<path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>';
    return '<div class="mov-row"><div class="mov-ic '+icCls+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+arw+'</svg></div>'+
      '<div class="mov-info"><div class="mov-txt">'+(m.type==="in"?"Nhập kho":m.type==="out"?"Xuất kho":"Điều chỉnh")+' · '+m.note+'</div>'+
        '<div class="mov-meta">'+m.date+' · '+(MEMBERS[m.by]||m.by)+'</div></div>'+
      '<div class="mov-qty '+icCls+'">'+sign+m.qty+'</div></div>';
  }).join("");

  document.getElementById("idBody").innerHTML=
    '<div class="metric-grid">'+
      '<div class="metric"><div class="ml">Tồn kho</div><div class="mv" style="color:'+sc+'">'+p.stock+'</div><div class="mc" style="color:'+sc+'">'+statusLabel(st)+'</div></div>'+
      '<div class="metric"><div class="ml">Giá trị</div><div class="mv">'+fmt(p.stock*p.cost)+'</div><div class="mc" style="color:var(--text-3)">@ '+fmt(p.cost)+'</div></div>'+
      '<div class="metric"><div class="ml">Mức tồn</div><div class="mv" style="font-size:.95rem">'+p.min+'–'+p.max+'</div><div class="mc" style="color:var(--text-3)">min–max</div></div>'+
    '</div>'+
    '<div class="dsec">Thao tác nhanh</div>'+
    '<div class="qadj" style="margin-bottom:20px">'+
      '<button class="in" data-q="in"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg><span class="ql">Nhập kho</span></button>'+
      '<button class="out" data-q="out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg><span class="ql">Xuất kho</span></button>'+
      '<button class="adjust" data-q="adjust"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg><span class="ql">Điều chỉnh</span></button>'+
    '</div>'+
    '<div class="dsec">Thông tin</div>'+
    '<div class="dcard">'+
      '<div class="drow"><span class="dl">SKU</span><span class="dv" style="font-family:var(--font-mono)">'+p.sku+'</span></div>'+
      '<div class="drow"><span class="dl">Danh mục</span><span class="dv"><span class="cat-tag" style="background:'+c.bg+';color:'+c.color+'">'+c.l+'</span></span></div>'+
      '<div class="drow"><span class="dl">Kho</span><span class="dv">'+WAREHOUSES[p.wh]+'</span></div>'+
      '<div class="drow"><span class="dl">Giá nhập</span><span class="dv" style="font-family:var(--font-mono)">'+fmtFull(p.cost)+'</span></div>'+
    '</div>'+
    '<div class="dsec">Lịch sử nhập xuất ('+p.moves.length+')</div>'+
    '<div>'+movesHtml+'</div>';

  /* quick adjust buttons */
  document.querySelectorAll("#idBody .qadj button").forEach(function(b){
    b.addEventListener("click",function(){openMoveModal(p,b.dataset.q);});
  });

  document.getElementById("idBack").classList.add("open");
  document.getElementById("idDrawer").classList.add("open");
}
function closeDrawer(){document.getElementById("idBack").classList.remove("open");document.getElementById("idDrawer").classList.remove("open");openId=null;}

/* ── MOVE MODAL ── */
function openMoveModal(prod,defaultDir){
  if(document.getElementById("moveModal"))return;
  var dir=defaultDir||"in";
  var back=document.createElement("div");back.className="modal-back";back.id="moveModal";
  var prodOpts=PRODUCTS.map(function(p){return '<option value="'+p.id+'"'+(prod&&prod.id===p.id?" selected":"")+'>'+p.name+' ('+p.sku+')</option>';}).join("");
  back.innerHTML='<div class="im-modal">'+
    '<div class="im-head"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3l4 4-4 4M3 7h18M7 21l-4-4 4-4M21 17H3"/></svg></div><h3>Nhập / Xuất kho</h3><button class="x" id="mmClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>'+
    '<div class="im-body">'+
      '<div class="im-field"><label>Loại giao dịch</label><div class="dir-row" id="dirRow">'+
        '<button class="dir-btn in'+(dir==="in"?" on":"")+'" data-dir="in"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>Nhập</button>'+
        '<button class="dir-btn out'+(dir==="out"?" on":"")+'" data-dir="out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>Xuất</button>'+
        '<button class="dir-btn adjust'+(dir==="adjust"?" on":"")+'" data-dir="adjust"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>Kiểm kê</button>'+
      '</div></div>'+
      '<div class="im-field"><label>Sản phẩm *</label><select id="mmProd">'+prodOpts+'</select></div>'+
      '<div class="im-row">'+
        '<div class="im-field"><label id="mmQtyLabel">Số lượng *</label><input type="number" id="mmQty" min="1" value="1"/></div>'+
        '<div class="im-field"><label>Ngày</label><input type="date" id="mmDate" value="2026-06-22"/></div>'+
      '</div>'+
      '<div class="im-field"><label>Ghi chú</label><input type="text" id="mmNote" placeholder="vd. Nhập lô mới, cấp nhân viên…"/></div>'+
    '</div>'+
    '<div class="im-foot"><button class="abtn ghost" id="mmCancel">Hủy</button><button class="abtn primary" id="mmSave">Xác nhận</button></div>'+
  '</div>';
  document.body.appendChild(back);

  document.getElementById("dirRow").addEventListener("click",function(e){
    var b=e.target.closest(".dir-btn");if(!b)return;dir=b.dataset.dir;
    document.querySelectorAll(".dir-btn").forEach(function(x){x.classList.remove("on");});
    b.classList.add("on");
    document.getElementById("mmQtyLabel").textContent=dir==="adjust"?"Số lượng thực tế *":"Số lượng *";
  });
  function close(){var m=document.getElementById("moveModal");if(m)m.remove();}
  back.addEventListener("click",function(e){if(e.target===back)close();});
  document.getElementById("mmClose").addEventListener("click",close);
  document.getElementById("mmCancel").addEventListener("click",close);
  document.getElementById("mmSave").addEventListener("click",function(){
    var pid=document.getElementById("mmProd").value;
    var qty=parseInt(document.getElementById("mmQty").value)||0;
    var note=document.getElementById("mmNote").value.trim()||(dir==="in"?"Nhập kho":dir==="out"?"Xuất kho":"Kiểm kê");
    var date=document.getElementById("mmDate").value.split("-").reverse().join("/");
    if(qty<1){showToast("Số lượng phải > 0","err");return;}
    var p=PRODUCTS.find(function(x){return x.id===pid;});if(!p)return;
    if(dir==="out"&&qty>p.stock){showToast("Không đủ tồn kho (còn "+p.stock+")","err");return;}
    if(dir==="in"){p.stock+=qty;p.moves.push({type:"in",qty:qty,by:"DL",date:date,note:note});}
    else if(dir==="out"){p.stock-=qty;p.moves.push({type:"out",qty:qty,by:"DL",date:date,note:note});}
    else{var diff=qty-p.stock;p.moves.push({type:"adjust",qty:Math.abs(diff),by:"DL",date:date,note:note+" (→"+qty+")"});p.stock=qty;}
    close();renderAll();
    if(openId)openDrawer(openId);
    showToast(dir==="in"?"Đã nhập "+qty+" "+p.name:dir==="out"?"Đã xuất "+qty+" "+p.name:"Đã cập nhật tồn kho","ok");
  });
  requestAnimationFrame(function(){document.getElementById("mmQty").focus();document.getElementById("mmQty").select();});
}

/* ── ADD PRODUCT MODAL ── */
function openProdModal(){
  if(document.getElementById("prodModal"))return;
  var back=document.createElement("div");back.className="modal-back";back.id="prodModal";
  back.innerHTML='<div class="im-modal">'+
    '<div class="im-head"><div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/></svg></div><h3>Thêm sản phẩm</h3><button class="x" id="pmClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>'+
    '<div class="im-body">'+
      '<div class="im-field"><label>Tên sản phẩm *</label><input type="text" id="pmName" placeholder="vd. MacBook Pro 14"/></div>'+
      '<div class="im-row">'+
        '<div class="im-field"><label>SKU *</label><input type="text" id="pmSku" placeholder="vd. DEV-MBP14"/></div>'+
        '<div class="im-field"><label>Danh mục</label><select id="pmCat">'+Object.keys(CATS).map(function(k){return '<option value="'+k+'">'+CATS[k].l+'</option>';}).join("")+'</select></div>'+
      '</div>'+
      '<div class="im-row">'+
        '<div class="im-field"><label>Kho</label><select id="pmWh">'+Object.keys(WAREHOUSES).map(function(k){return '<option value="'+k+'">'+WAREHOUSES[k]+'</option>';}).join("")+'</select></div>'+
        '<div class="im-field"><label>Giá nhập (đ)</label><input type="number" id="pmCost" min="0" step="1000" placeholder="vd. 500000"/></div>'+
      '</div>'+
      '<div class="im-row" style="grid-template-columns:1fr 1fr 1fr">'+
        '<div class="im-field"><label>Tồn ban đầu</label><input type="number" id="pmStock" min="0" value="0"/></div>'+
        '<div class="im-field"><label>Min</label><input type="number" id="pmMin" min="0" value="5"/></div>'+
        '<div class="im-field"><label>Max</label><input type="number" id="pmMax" min="1" value="20"/></div>'+
      '</div>'+
    '</div>'+
    '<div class="im-foot"><button class="abtn ghost" id="pmCancel">Hủy</button><button class="abtn primary" id="pmSave">Thêm sản phẩm</button></div>'+
  '</div>';
  document.body.appendChild(back);
  function close(){var m=document.getElementById("prodModal");if(m)m.remove();}
  back.addEventListener("click",function(e){if(e.target===back)close();});
  document.getElementById("pmClose").addEventListener("click",close);
  document.getElementById("pmCancel").addEventListener("click",close);
  document.getElementById("pmSave").addEventListener("click",function(){
    var name=document.getElementById("pmName").value.trim();
    var sku=document.getElementById("pmSku").value.trim().toUpperCase();
    if(!name||!sku){showToast("Nhập tên và SKU","err");return;}
    var cat=document.getElementById("pmCat").value;
    var stock=parseInt(document.getElementById("pmStock").value)||0;
    var id="P-"+String(nextId++).padStart(3,"0");
    PRODUCTS.unshift({id:id,name:name,sku:sku,cat:cat,wh:document.getElementById("pmWh").value,
      stock:stock,min:parseInt(document.getElementById("pmMin").value)||5,max:parseInt(document.getElementById("pmMax").value)||20,
      cost:parseInt(document.getElementById("pmCost").value)||0,emoji:CATS[cat].emoji,
      moves:stock>0?[{type:"in",qty:stock,by:"DL",date:"22/06/2026",note:"Tồn ban đầu"}]:[]});
    close();renderAll();showToast("Đã thêm "+name+" ✓","ok");
  });
  requestAnimationFrame(function(){document.getElementById("pmName").focus();});
}

/* ── EVENTS ── */
document.getElementById("invBody").addEventListener("click",function(e){var row=e.target.closest("tr[data-id]");if(row)openDrawer(row.dataset.id);});
document.getElementById("invTabs").addEventListener("click",function(e){var b=e.target.closest(".inv-tab");if(!b)return;selTab=b.dataset.k;renderTabs();renderTable();});
document.getElementById("invSearch").addEventListener("input",function(e){search=e.target.value.trim();renderTable();});
document.getElementById("idBack").addEventListener("click",closeDrawer);
document.getElementById("idClose").addEventListener("click",closeDrawer);
document.getElementById("idEditBtn").addEventListener("click",function(){showToast("Mở form chỉnh sửa…","ok");});
document.getElementById("idMoveBtn").addEventListener("click",function(){var p=PRODUCTS.find(function(x){return x.id===openId;});openMoveModal(p,"in");});
document.getElementById("moveBtn").addEventListener("click",function(){openMoveModal(null,"in");});
document.getElementById("newProdBtn").addEventListener("click",openProdModal);

/* ── TOAST ── */
function showToast(msg,type){var t=document.getElementById("toast");t.textContent=msg;t.className="toast "+(type||"ok");t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2800);}

/* ── RENDER ── */
function renderAll(){renderKPIs();renderTabs();renderTable();}
renderAll();

})();
</script>
<script src="js/admin.js"></script>
</body>
