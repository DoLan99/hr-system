<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đánh giá Hiệu suất — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── Performance page ── */

/* cycle selector */
.cycle-sel{display:inline-flex;align-items:center;gap:4px;background:var(--elev);border:1px solid var(--border);border-radius:9px;padding:3px}
.cycle-sel button{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--text-2);border:none;background:none;cursor:pointer;transition:background .15s,color .15s;font-family:inherit}
.cycle-sel button:hover{background:var(--accent-soft);color:var(--accent-ink)}
.cycle-sel .cval{padding:0 16px;font-size:.86rem;font-weight:700;color:var(--text);min-width:120px;text-align:center}

/* status chips */
.perf-status{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:.69rem;font-weight:700;padding:4px 10px;border-radius:99px;white-space:nowrap}
.perf-status.completed{background:var(--ok-soft);color:var(--ok)}
.perf-status.manager{background:rgba(59,91,219,.14);color:var(--accent-ink)}
.perf-status.self{background:var(--warn-soft);color:var(--warn)}
.perf-status.draft{background:var(--border);color:var(--text-3)}

/* review cards grid */
.perf-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:820px){.perf-grid{grid-template-columns:1fr}}

/* member review card */
.perf-card{background:var(--elev);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:22px;cursor:pointer;transition:border-color .18s var(--ease),transform .18s var(--ease),box-shadow .15s;position:relative;overflow:hidden}
.perf-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,50,.35)}
.perf-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity .2s}
.perf-card.completed::before{background:var(--ok);opacity:1}
.perf-card.manager::before{background:var(--accent);opacity:1}
.perf-card.self::before{background:var(--warn);opacity:1}
.perf-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
.pc-who{display:flex;align-items:center;gap:11px}
.pc-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#8b7bff,#4f7aff);display:grid;place-items:center;color:#fff;font-size:.9rem;font-weight:700;flex-shrink:0}
.pc-name{font-size:.96rem;font-weight:700;color:var(--text)}
.pc-role{font-size:.74rem;color:var(--text-3);font-family:var(--font-mono);margin-top:2px}

/* score donut (CSS only) */
.score-ring{width:52px;height:52px;position:relative;flex-shrink:0}
.score-ring svg{width:52px;height:52px;transform:rotate(-90deg)}
.score-ring .ring-bg{fill:none;stroke:var(--border);stroke-width:4}
.score-ring .ring-fill{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .6s var(--ease)}
.score-ring .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring .ring-val{font-family:var(--font-mono);font-size:.88rem;font-weight:800;color:var(--text);line-height:1}
.score-ring .ring-max{font-size:.58rem;color:var(--text-3)}

/* criteria bars */
.criteria-bars{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.cr-bar-row{display:grid;grid-template-columns:80px 1fr 30px;align-items:center;gap:8px}
.cr-bar-row .cr-lbl{font-size:.76rem;color:var(--text-2);white-space:nowrap}
.cr-bar-row .cr-track{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.cr-bar-row .cr-fill{height:100%;border-radius:99px;transition:width .5s var(--ease)}
.cr-bar-row .cr-val{font-family:var(--font-mono);font-size:.72rem;font-weight:700;color:var(--text);text-align:right}

/* score pill */
.score-pill{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:.78rem;font-weight:800;padding:3px 10px;border-radius:99px}
.score-pill.great{background:rgba(74,222,128,.12);color:#4ade80}
.score-pill.good{background:rgba(59,91,219,.13);color:var(--accent-ink)}
.score-pill.avg{background:var(--warn-soft);color:var(--warn)}
.score-pill.low{background:var(--danger-soft);color:var(--danger)}
.score-pill.none{background:var(--border);color:var(--text-3)}

/* review drawer */
.rd-back{position:fixed;inset:0;background:rgba(4,8,18,.6);backdrop-filter:blur(3px);z-index:100;opacity:0;transition:opacity .22s;pointer-events:none}
.rd-back.open{opacity:1;pointer-events:auto}
.rd-drawer{position:fixed;top:0;right:0;height:100vh;width:620px;max-width:97vw;background:var(--elev);border-left:1px solid var(--border-2);box-shadow:-30px 0 60px rgba(0,0,0,.45);z-index:101;transform:translateX(100%);transition:transform .28s var(--ease);display:flex;flex-direction:column}
.rd-drawer.open{transform:translateX(0)}
.rd-head{display:flex;align-items:center;gap:12px;padding:18px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.rd-close{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none;flex-shrink:0}
.rd-close:hover{background:var(--content);color:var(--text)}
.rd-close svg{width:17px;height:17px}
.rd-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rd-tab{flex:1;height:44px;display:flex;align-items:center;justify-content:center;font-size:.83rem;font-weight:600;color:var(--text-3);border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s;font-family:inherit;border-top:none;border-left:none;border-right:none;background:none}
.rd-tab:hover{color:var(--text-2)}
.rd-tab.on{color:var(--text);border-bottom-color:var(--accent)}
.rd-pane{display:none;padding:24px;overflow-y:auto}
.rd-pane.on{display:block}
.rd-body{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* drawer sections */
.dsec{font-family:var(--font-mono);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;margin-top:4px}
.drow{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none}
.drow .dl{font-size:.78rem;color:var(--text-3);min-width:100px;flex-shrink:0;padding-top:1px}
.drow .dv{font-size:.88rem;color:var(--text);flex:1}
.dcard{background:var(--content);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px}

/* score input sliders */
.sc-input-row{display:grid;grid-template-columns:110px 1fr 46px;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.sc-input-row:last-child{border-bottom:none}
.sc-input-row .sil{font-size:.82rem;color:var(--text-2);font-weight:500}
.sc-input-row .sil span{font-size:.7rem;color:var(--text-3);display:block;font-family:var(--font-mono)}
.sc-input-row input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--border);border-radius:99px;outline:none;cursor:pointer}
.sc-input-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px rgba(59,91,219,.5)}
.sc-input-row .sival{font-family:var(--font-mono);font-size:.9rem;font-weight:800;color:var(--accent-ink);text-align:right}

/* compare bars */
.compare-row{display:grid;grid-template-columns:80px 1fr 1fr 28px 28px;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border)}
.compare-row:last-child{border-bottom:none}
.compare-row.header{padding:6px 14px;background:var(--content)}
.compare-row.header span{font-family:var(--font-mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);text-align:center}
.compare-row.header span:first-child{text-align:left}
.cbar-wrap{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.cbar-fill{height:100%;border-radius:99px;transition:width .5s var(--ease)}
.cbar-fill.auto{background:linear-gradient(90deg,var(--accent),#5275e6)}
.cbar-fill.self{background:linear-gradient(90deg,#a78bfa,#8b5cf6)}
.cbar-fill.mgr{background:linear-gradient(90deg,var(--ok),#4ade80)}
.cnum{font-family:var(--font-mono);font-size:.78rem;font-weight:700;text-align:center}
.cnum.auto{color:var(--accent-ink)}
.cnum.mgr{color:var(--ok)}

/* AI suggestion */
.ai-suggestion{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:12px;padding:16px;margin-top:18px}
.ai-head{display:flex;align-items:center;gap:8px;font-size:.8rem;font-weight:700;color:#a78bfa;margin-bottom:10px}
.ai-head svg{width:16px;height:16px}
.ai-kpi-list{display:flex;flex-direction:column;gap:6px}
.ai-kpi{font-size:.84rem;color:var(--text-2);display:flex;gap:8px;align-items:flex-start}
.ai-kpi::before{content:"→";color:#a78bfa;flex-shrink:0;font-weight:700}

/* comment textarea */
.rv-ta{width:100%;font-family:inherit;font-size:.88rem;color:var(--text);background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:10px 12px;outline:none;resize:vertical;min-height:80px;transition:border-color .15s,box-shadow .15s}
.rv-ta:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.rv-ta::placeholder{color:var(--text-3)}

/* progress tracker */
.cycle-progress{display:flex;align-items:center;gap:0;margin-bottom:24px;background:var(--elev);border:1px solid var(--border);border-radius:12px;padding:16px 20px;overflow:hidden}
.cp-step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;position:relative}
.cp-step::after{content:"";position:absolute;top:14px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
.cp-step:last-child::after{display:none}
.cp-dot{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-family:var(--font-mono);font-size:.72rem;font-weight:700;position:relative;z-index:1;flex-shrink:0;transition:background .2s}
.cp-dot.done{background:var(--ok);color:#fff}
.cp-dot.active{background:var(--accent);color:#fff;box-shadow:0 0 12px rgba(59,91,219,.5)}
.cp-dot.todo{background:var(--border);color:var(--text-3)}
.cp-lbl{font-size:.72rem;color:var(--text-3);text-align:center;white-space:nowrap;font-family:var(--font-mono)}
.cp-step.done .cp-lbl{color:var(--ok)}
.cp-step.active .cp-lbl{color:var(--accent-ink);font-weight:700}
.cp-step.done::after{background:var(--ok)}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--elev);border:1px solid var(--border-2);border-radius:10px;padding:12px 22px;font-size:.86rem;font-weight:500;color:var(--text);box-shadow:var(--shadow-lg);z-index:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-left:3px solid var(--ok)}
.toast.warn{border-left:3px solid var(--warn)}
.toast.err{border-left:3px solid var(--danger)}
</style>
</head>
<body>
<div class="nav-scrim" id="navScrim"></div>
<div class="app">

<!-- SIDEBAR -->
<aside class="side">
  <div class="side-brand">
    <span class="lm">j</span>
    <div><div class="bt">jobihome</div><div class="bs">Workspace · Do thi Lan</div></div>
  </div>
  <nav class="side-nav scroll" id="sideNav"></nav>
  <div class="side-foot">
    <div class="side-user">
      <span class="av">DL</span>
      <div><div class="un">Do thi Lan</div><div class="ur">Super Admin</div></div>
      <span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg></span>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <header class="topbar">

    <div class="tb-search">

        <span class="icon-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>

        <span class="dot"></span>
      </button>
    </div>
  </header>

  <main class="content scroll">
    <div class="content-inner">

      <!-- Page head -->
      <div class="page-head" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px">
        <div>
          <h1>Đánh giá Hiệu suất</h1>
          <p>Performance review định kỳ · <b id="completedCount">—</b> hoàn thành · <b id="pendingCount">—</b> chờ đánh giá</p>

        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div class="cycle-sel">

          </div>
          <button class="abtn ghost" id="exportBtn" style="gap:7px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Xuất báo cáo
          </button>
        </div>
      </div>

      <!-- Cycle progress -->
      <div class="cycle-progress" id="cycleProgress"></div>

      <!-- KPIs -->
      <div class="kpis" id="kpiRow"></div>

      <!-- Cards grid -->
      <div style="font-family:var(--font-mono);font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px;display:flex;align-items:center;gap:10px">
        Đánh giá thành viên <span style="flex:1;height:1px;background:var(--border);display:block"></span>
      </div>
      <div class="perf-grid" id="perfGrid"></div>

    </div>
  </main>
</div>
</div>

<!-- Review Drawer -->
<div class="rd-back" id="rdBack"></div>
<div class="rd-drawer" id="rdDrawer">
  <div class="rd-head">
    <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#8b7bff,#4f7aff);display:grid;place-items:center;color:#fff;font-size:.9rem;font-weight:700;flex-shrink:0" id="drawerAv">—</div>
    <div style="flex:1;min-width:0">
      <div id="drawerName" style="font-size:1rem;font-weight:700;color:var(--text)"></div>
      <div id="drawerMeta" style="font-size:.74rem;color:var(--text-3);font-family:var(--font-mono);margin-top:2px"></div>
    </div>
    <button class="rd-close" id="rdClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>
  <div class="rd-tabs" id="rdTabBar">
    <button class="rd-tab on" data-pane="overview">Tổng quan</button>
    <button class="rd-tab" data-pane="self">Tự đánh giá</button>
    <button class="rd-tab" data-pane="manager">Manager review</button>
  </div>
  <div class="rd-body">
    <div class="rd-pane on" id="pane-overview" style="overflow-y:auto"></div>
    <div class="rd-pane" id="pane-self" style="overflow-y:auto"></div>
    <div class="rd-pane" id="pane-manager" style="overflow-y:auto"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

    status:"completed",
    autoKPI:{speed:8.8,quality:9.0,ontime:8.7,learning:9.1,initiative:8.5},
    selfReview:{speed:8.0,quality:9.0,ontime:8.5,learning:9.0,initiative:8.0,
      comment:"Q2 tôi đã hoàn thành tốt migration Prisma và Clerk integration — 2 task phức tạp nhất của sprint. Điểm tự cảm thấy có thể làm tốt hơn là initiative trong việc cải thiện quy trình team."},
    managerReview:{speed:8.8,quality:9.0,ontime:8.7,learning:9.1,initiative:8.5,
      comment:"Tú là contributor xuất sắc nhất Q2 — đặc biệt ở chất lượng code và tinh thần học hỏi liên tục. Recommend tăng trách nhiệm Tech Lead."},
    finalScore:8.9,
    nextKPIs:["Đảm nhận vai trò Tech Lead cho module Salary","Nghiên cứu và propose architecture cho Q4 roadmap","Viết tech blog chia sẻ kinh nghiệm Prisma multi-tenant"]
  }
};

var openMember = null;
var managerScores = {};

/* ── UTILS ── */
function mn(v){var m=MEMBERS.find(function(x){return x.v===v;});return m?m.l:v;}
function avgOf(sc){
  var vals=Object.values(sc).filter(function(v){return v>0;});
  if(!vals.length)return null;
  return Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length*10)/10;
}
function scoreClass(s){if(s===null||s===undefined)return "none";if(s>=8.5)return "great";if(s>=7)return "good";if(s>=5)return "avg";return "low";}
function scoreColor(s){if(!s)return "var(--border)";if(s>=8.5)return "var(--ok)";if(s>=7)return "var(--accent)";if(s>=5)return "var(--warn)";return "var(--danger)";}
function statusLabel(s){return {completed:"Hoàn thành",manager:"Chờ manager",self:"Chờ tự đánh giá",draft:"Chưa bắt đầu"}[s]||s;}

function scoreRing(score, size){
  size=size||52;
  var r=20, circ=2*Math.PI*r;
  var pct=score?score/10:0;
  var dash=circ*(1-pct);
  var color=scoreColor(score);
  return '<div class="score-ring" style="width:'+size+'px;height:'+size+'px">'+
    '<svg width="'+size+'" height="'+size+'" viewBox="0 0 48 48" style="transform:rotate(-90deg)">'+
      '<circle class="ring-bg" cx="24" cy="24" r="'+r+'" stroke-width="4"/>'+
      '<circle class="ring-fill" cx="24" cy="24" r="'+r+'" stroke="'+color+'"'+
        ' stroke-dasharray="'+circ+'" stroke-dashoffset="'+dash+'"'+
        ' fill="none" stroke-width="4" stroke-linecap="round"/>'+
    '</svg>'+
    '<div class="ring-text">'+
      '<span class="ring-val" style="color:'+color+'">'+(score||"—")+'</span>'+
      (score?'<span class="ring-max">/10</span>':'')+
    '</div>'+
  '</div>';
}

/* ── CYCLE PROGRESS ── */
function renderCycleProgress(){
  document.getElementById("cycleProgress").innerHTML=
    CYCLE_STEPS.map(function(s){
      var icon=s.status==="done"
        ?'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M5 12l5 5L20 6"/></svg>'
        :s.status==="active"
        ?'<span style="font-size:.72rem">▶</span>'
        :'<span style="font-family:var(--font-mono);font-size:.66rem">'+CYCLE_STEPS.indexOf(s)+1+'</span>';
      return '<div class="cp-step '+s.status+'">'+
        '<div class="cp-dot '+s.status+'">'+icon+'</div>'+
        '<span class="cp-lbl">'+s.l+'</span>'+
      '</div>';
    }).join("");
}

/* ── KPI CARDS ── */
function renderKPIs(){
  var all=Object.values(REVIEWS);
  var completed=all.filter(function(r){return r.status==="completed";}).length;
  var pending=all.filter(function(r){return r.status!=="completed";}).length;
  var scored=all.filter(function(r){return r.finalScore;});
  var avgScore=scored.length?Math.round(scored.reduce(function(a,r){return a+r.finalScore;},0)/scored.length*10)/10:null;
  var topPerformer=scored.length?scored.reduce(function(a,b){return a.finalScore>b.finalScore?a:b;}):null;

  document.getElementById("completedCount").textContent=completed;
  document.getElementById("pendingCount").textContent=pending;

  var cards=[
    {ico:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
     lab:"Hoàn thành",val:completed+"/"+all.length,chg:CYCLES[curCycle],cls:"up"},
    {ico:'<path d="M12 2l2.6 6.3L21 9l-5 4.3L17.5 20 12 16.5 6.5 20 8 13.3 3 9l6.4-.7z"/>',
     lab:"Điểm TB",val:avgScore!==null?avgScore+"/10":"—",chg:scored.length+" đã chấm",cls:"up"},
    {ico:'<circle cx="12" cy="8" r="5"/><path d="M8.5 12.5L7 22l5-3 5 3-1.5-9.5" stroke-linecap="round" stroke-linejoin="round"/>',
     lab:"Top performer",val:topPerformer?MEMBERS.find(function(m){return REVIEWS[m.v]===topPerformer;}).l.split(" ").pop():"—",chg:topPerformer?topPerformer.finalScore+"/10":"",cls:"up"},
    {ico:'<path d="M10.3 3.9l-7 12A2 2 0 0 0 5 19h14a2 2 0 0 0 1.7-3l-7-12a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01" stroke-linecap="round"/>',
     lab:"Chờ đánh giá",val:pending,chg:all.filter(function(r){return r.status==="self";}).length+" tự đánh giá",cls:pending>0?"warn":"flat"}
  ];
  document.getElementById("kpiRow").innerHTML=cards.map(function(k){
    return '<div class="kpi"><div class="kt"><span class="ki"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+k.ico+'</svg></span>'+k.lab+'</div><div class="kv">'+k.val+'</div><div class="kc '+k.cls+'">'+k.chg+'</div></div>';
  }).join("");
}

/* ── MEMBER CARDS ── */
function renderCards(){
  document.getElementById("perfGrid").innerHTML=MEMBERS.map(function(m){
    var r=REVIEWS[m.v];
    var auto=avgOf(r.autoKPI);
    var self=r.selfReview?avgOf(r.selfReview):null;
    var mgr=r.managerReview?avgOf(r.managerReview):null;
    var display=r.finalScore||mgr||auto;
    var sc=scoreClass(display);

    var bars=CRITERIA.map(function(c){
      var av=r.autoKPI[c.k]||0;
      return '<div class="cr-bar-row">'+
        '<span class="cr-lbl">'+c.l+'</span>'+
        '<div class="cr-track"><div class="cr-fill" style="width:'+av*10+'%;background:'+scoreColor(av)+'"></div></div>'+
        '<span class="cr-val" style="color:'+scoreColor(av)+'">'+av+'</span>'+
      '</div>';
    }).join("");

    return '<div class="perf-card '+r.status+'" data-who="'+m.v+'">'+
      '<div class="perf-card-top">'+
        '<div class="pc-who">'+
          '<div class="pc-av">'+m.v+'</div>'+
          '<div><div class="pc-name">'+m.l+'</div><div class="pc-role">'+m.role+' · '+m.dept+'</div></div>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">'+
          scoreRing(display,52)+
          '<span class="perf-status '+r.status+'">'+statusLabel(r.status)+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="criteria-bars">'+bars+'</div>'+
      '<div style="display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)">'+
        '<div style="display:flex;gap:8px;align-items:center">'+
          '<span style="font-size:.74rem;color:var(--text-3)">Auto-KPI</span>'+
          '<span class="score-pill '+scoreClass(auto)+'">'+(auto||"—")+'</span>'+
          (self&&self>0?'<span style="font-size:.74rem;color:var(--text-3)">Tự</span><span class="score-pill '+scoreClass(self)+'">'+self+'</span>':'')+
          (mgr&&mgr>0?'<span style="font-size:.74rem;color:var(--text-3)">Mgr</span><span class="score-pill '+scoreClass(mgr)+'">'+mgr+'</span>':'')+
        '</div>'+
        '<span style="font-size:.78rem;color:var(--accent-ink);font-weight:600">Xem chi tiết →</span>'+
      '</div>'+
    '</div>';
  }).join("");
}

/* ── DRAWER ── */
function openDrawer(who){
  var m=MEMBERS.find(function(x){return x.v===who;});
  var r=REVIEWS[who];
  if(!m||!r) return;
  openMember=who;
  managerScores=Object.assign({},r.managerReview);

  document.getElementById("drawerAv").textContent=m.v;
  document.getElementById("drawerName").textContent=m.l;
  document.getElementById("drawerMeta").textContent=m.role+" · "+m.dept+" · "+CYCLES[curCycle];

  buildOverviewPane(m,r);
  buildSelfPane(m,r);
  buildManagerPane(m,r);

  document.querySelectorAll(".rd-tab").forEach(function(t){t.classList.remove("on");});
  document.querySelectorAll(".rd-pane").forEach(function(p){p.classList.remove("on");});
  document.querySelector(".rd-tab[data-pane='overview']").classList.add("on");
  document.getElementById("pane-overview").classList.add("on");

  document.getElementById("rdBack").classList.add("open");
  document.getElementById("rdDrawer").classList.add("open");
}

function buildOverviewPane(m,r){
  var auto=avgOf(r.autoKPI);
  var self=avgOf(r.selfReview);
  var mgr=avgOf(r.managerReview);
  var display=r.finalScore||mgr||auto;

  /* compare table */
  var compareRows=CRITERIA.map(function(c){
    var av=r.autoKPI[c.k]||0;
    var sv=(r.selfReview&&r.selfReview[c.k])||0;
    var mv=(r.managerReview&&r.managerReview[c.k])||0;
    return '<div class="compare-row">'+
      '<span style="font-size:.8rem;color:var(--text-2)">'+c.l+'</span>'+
      '<div style="display:flex;align-items:center;gap:6px"><div class="cbar-wrap" style="flex:1"><div class="cbar-fill auto" style="width:'+av*10+'%"></div></div><span class="cnum auto">'+av+'</span></div>'+
      (sv?'<div style="display:flex;align-items:center;gap:6px"><div class="cbar-wrap" style="flex:1"><div class="cbar-fill self" style="width:'+sv*10+'%"></div></div><span class="cnum" style="color:#a78bfa">'+sv+'</span></div>':'<span style="text-align:center;color:var(--text-3);font-size:.74rem">—</span>')+
      (mv?'<span class="cnum mgr">'+mv+'</span>':'<span style="text-align:center;color:var(--text-3);font-size:.74rem">—</span>')+
    '</div>';
  }).join("");

  var nextKpiHtml=r.nextKPIs&&r.nextKPIs.length?r.nextKPIs.map(function(k){return '<div class="ai-kpi">'+k+'</div>';}).join(""):'<div style="font-size:.83rem;color:var(--text-3)">Chưa xác định KPI.</div>';

  document.getElementById("pane-overview").innerHTML=
    '<div style="display:flex;align-items:center;gap:20px;padding:20px;background:var(--content);border-radius:14px;margin-bottom:20px;border:1px solid var(--border)">'+
      scoreRing(display,68)+
      '<div>'+
        '<div style="font-size:1.6rem;font-weight:800;letter-spacing:-.03em;color:var(--text)">'+(display||"—")+(display?'<span style="font-size:.9rem;color:var(--text-3);font-weight:400">/10</span>':"")+
        '</div>'+
        '<div style="font-size:.82rem;color:var(--text-3);margin-top:4px">'+CYCLES[curCycle]+' · '+m.role+'</div>'+
        '<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">'+
          '<span style="font-size:.74rem;color:var(--text-3)">Auto</span><span class="score-pill '+scoreClass(auto)+'">'+(auto||"—")+'</span>'+
          (self&&self>0?'<span style="font-size:.74rem;color:var(--text-3)">Tự</span><span class="score-pill '+scoreClass(self)+'">'+self+'</span>':'')+
          (mgr&&mgr>0?'<span style="font-size:.74rem;color:var(--text-3)">Mgr</span><span class="score-pill '+scoreClass(mgr)+'">'+mgr+'</span>':'')+
        '</div>'+
      '</div>'+
      '<span class="perf-status '+r.status+'" style="margin-left:auto;align-self:flex-start">'+statusLabel(r.status)+'</span>'+
    '</div>'+
    '<div class="dsec">So sánh điểm 3 nguồn</div>'+
    '<div class="dcard">'+
      '<div class="compare-row header">'+
        '<span>Tiêu chí</span><span style="text-align:center">Auto-KPI</span><span style="text-align:center">Tự đánh giá</span><span style="text-align:center;font-size:.58rem">Mgr</span>'+
      '</div>'+compareRows+
    '</div>'+
    '<div class="dsec">Gợi ý KPI quý tiếp theo</div>'+
    '<div class="ai-suggestion">'+
      '<div class="ai-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.6 6.3L21 9l-5 4.3L17.5 20 12 16.5 6.5 20 8 13.3 3 9l6.4-.7z"/></svg>AI Suggest · Dựa trên xu hướng Q2</div>'+
      '<div class="ai-kpi-list">'+nextKpiHtml+'</div>'+
    '</div>';
}

function buildSelfPane(m,r){
  var hasData=r.selfReview&&Object.values(r.selfReview).some(function(v){return v>0;});
  if(!hasData){
    document.getElementById("pane-self").innerHTML=
      '<div style="text-align:center;padding:48px 20px;color:var(--text-3)">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" style="margin:0 auto 16px;opacity:.3"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-linecap="round"/></svg>'+
        '<p style="font-size:.92rem;font-weight:600;color:var(--text-2)">'+m.l+' chưa tự đánh giá</p>'+
        '<span style="font-size:.82rem">Nhân viên cần hoàn thành phần tự đánh giá trước.</span>'+
      '</div>';
    return;
  }
  var rows=CRITERIA.map(function(c){
    var v=r.selfReview[c.k]||0;
    var av=r.autoKPI[c.k]||0;
    var diff=Math.round((v-av)*10)/10;
    var diffHtml=diff!==0?'<span style="font-size:.72rem;color:'+(diff>0?"var(--ok)":"var(--danger)")+';">'+(diff>0?"+":"")+diff+'</span>':'';
    return '<div style="display:grid;grid-template-columns:90px 1fr 32px 32px;gap:8px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)">'+
      '<span style="font-size:.82rem;color:var(--text-2)">'+c.l+'</span>'+
      '<div class="cr-track"><div class="cr-fill" style="width:'+v*10+'%;background:#a78bfa"></div></div>'+
      '<span style="font-family:var(--font-mono);font-size:.82rem;font-weight:700;color:#a78bfa;text-align:center">'+v+'</span>'+
      diffHtml+
    '</div>';
  }).join("");
  var self=avgOf(r.selfReview);
  document.getElementById("pane-self").innerHTML=
    '<div style="display:flex;align-items:center;gap:14px;padding:16px;background:var(--content);border-radius:12px;border:1px solid var(--border);margin-bottom:18px">'+
      scoreRing(self,48)+
      '<div><div style="font-size:1.1rem;font-weight:800;color:var(--text)">'+(self||"—")+'/10</div><div style="font-size:.78rem;color:var(--text-3)">Điểm tự đánh giá · '+m.l+'</div></div>'+
    '</div>'+
    '<div class="dsec">Điểm từng tiêu chí</div>'+
    '<div class="dcard" style="margin-bottom:18px">'+rows+'</div>'+
    (r.selfReview.comment?
      '<div class="dsec">Nhận xét của '+m.l+'</div>'+
      '<div style="font-size:.88rem;color:var(--text-2);line-height:1.65;padding:14px;background:var(--content);border-radius:10px;border:1px solid var(--border);border-left:3px solid #a78bfa">'+r.selfReview.comment+'</div>':
      "");
}

function buildManagerPane(m,r){
  var isCompleted=r.status==="completed";
  var rows=CRITERIA.map(function(c){
    var mv=(managerScores&&managerScores[c.k])||0;
    return '<div class="sc-input-row">'+
      '<div class="sil">'+c.l+'<span>'+c.desc+'</span></div>'+
      '<input type="range" min="0" max="10" step="0.5" value="'+mv+'" data-key="'+c.k+'" '+(isCompleted?"disabled":"")+' style="'+(isCompleted?"opacity:.5":"")+'" id="mgr-range-'+c.k+'"/>'+
      '<span class="sival" id="mgr-val-'+c.k+'">'+(mv||0)+'</span>'+
    '</div>';
  }).join("");
  var mgr=isCompleted?avgOf(r.managerReview):null;

  document.getElementById("pane-manager").innerHTML=
    (isCompleted?
      '<div style="padding:10px 14px;background:var(--ok-soft);border:1px solid rgba(74,222,128,.2);border-radius:10px;font-size:.84rem;color:var(--ok);margin-bottom:18px">'+
        '✓ Manager đã hoàn thành đánh giá · Điểm: '+avgOf(r.managerReview)+'/10'+
      '</div>':
      '<div style="padding:10px 14px;background:var(--warn-soft);border:1px solid rgba(251,191,36,.2);border-radius:10px;font-size:.84rem;color:var(--warn);margin-bottom:18px">'+
        '⏳ Chưa hoàn thành — Di chuyển thanh để chấm điểm'+
      '</div>')+
    '<div class="dsec">Chấm điểm từng tiêu chí</div>'+
    '<div class="dcard" style="margin-bottom:16px">'+rows+'</div>'+
    '<div style="margin-bottom:16px">'+
      '<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:8px">Nhận xét manager</div>'+
      '<textarea class="rv-ta" id="mgrComment" placeholder="Đánh giá tổng thể, điểm mạnh, điểm cần cải thiện…" '+(isCompleted?"readonly":"")+' style="'+(isCompleted?"opacity:.75":"")+'">'+(r.managerReview.comment||"")+'</textarea>'+
    '</div>'+
    (!isCompleted?'<button class="abtn primary" id="submitMgrBtn" style="width:100%;height:44px">Lưu đánh giá manager</button>':'');

  if(isCompleted) return;

  /* live range updates */
  CRITERIA.forEach(function(c){
    var range=document.getElementById("mgr-range-"+c.k);
    var valEl=document.getElementById("mgr-val-"+c.k);
    if(!range) return;
    range.addEventListener("input",function(){
      managerScores[c.k]=parseFloat(range.value);
      valEl.textContent=range.value;
      valEl.style.color=scoreColor(parseFloat(range.value));
    });
  });

  document.getElementById("submitMgrBtn").addEventListener("click",function(){
    var comment=document.getElementById("mgrComment").value.trim();
    if(!comment){showToast("Vui lòng nhập nhận xét","err");return;}
    var nonZero=Object.values(managerScores).filter(function(v){return v>0;}).length;
    if(nonZero<CRITERIA.length){showToast("Chấm điểm đủ "+CRITERIA.length+" tiêu chí","err");return;}
    var avg=avgOf(managerScores);
    var r=REVIEWS[openMember];
    r.managerReview=Object.assign({},managerScores,{comment:comment});
    r.status="completed";
    r.finalScore=Math.round((avg+(avgOf(r.autoKPI)||0))/2*10)/10;
    closeDrawer();
    renderAll();
    showToast("Đánh giá manager đã lưu ✓ · Điểm: "+r.finalScore+"/10","ok");
  });
}

function closeDrawer(){
  document.getElementById("rdBack").classList.remove("open");
  document.getElementById("rdDrawer").classList.remove("open");
  openMember=null;
}

/* ── EVENTS ── */
document.getElementById("perfGrid").addEventListener("click",function(e){
  var card=e.target.closest(".perf-card[data-who]");
  if(card) openDrawer(card.dataset.who);
});
document.getElementById("rdTabBar").addEventListener("click",function(e){
  var b=e.target.closest(".rd-tab");if(!b)return;
  var pane=b.dataset.pane;
  document.querySelectorAll(".rd-tab").forEach(function(t){t.classList.remove("on");});
  document.querySelectorAll(".rd-pane").forEach(function(p){p.classList.remove("on");});
  b.classList.add("on");
  document.getElementById("pane-"+pane).classList.add("on");
});
document.getElementById("rdBack").addEventListener("click",closeDrawer);
document.getElementById("rdClose").addEventListener("click",closeDrawer);
document.getElementById("prevCycle").addEventListener("click",function(){
  if(curCycle>0){curCycle--;document.getElementById("cycleLabel").textContent=CYCLES[curCycle];renderAll();}
});
document.getElementById("nextCycle").addEventListener("click",function(){
  if(curCycle<CYCLES.length-1){curCycle++;document.getElementById("cycleLabel").textContent=CYCLES[curCycle];renderAll();}
  else showToast("Chưa có dữ liệu Q3/2026","warn");
});
document.getElementById("exportBtn").addEventListener("click",function(){
  showToast("Đang tạo báo cáo PDF…","ok");
});

/* ── TOAST ── */
function showToast(msg,type){
  var t=document.getElementById("toast");
  t.textContent=msg;t.className="toast "+(type||"ok");
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2800);
}

/* ── RENDER ALL ── */
function renderAll(){renderCycleProgress();renderKPIs();renderCards();}
renderAll();

})();
</script>
<script src="js/admin.js"></script>
</body>
</html>
