<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anomaly Alerts — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── Anomaly Alerts ── */
.an-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.an-stat{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:12px}
.an-stat .ani{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.an-stat .ani svg{width:17px;height:17px}
.an-stat .anv{font-size:1.5rem;font-weight:800;letter-spacing:-.02em}
.an-stat .anl{font-size:0.78rem;color:var(--text-3);margin-top:1px}

/* filter bar */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 14px;background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:16px}
.fb-sel{background:var(--content);border:1px solid var(--border-2);border-radius:9px;padding:7px 12px;font-family:inherit;font-size:0.83rem;color:var(--text);outline:none;transition:border-color .15s;cursor:pointer;height:38px}
.fb-sel:focus{border-color:var(--accent)}
.fb-search{display:flex;align-items:center;gap:8px;background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:0 12px;height:38px;flex:1;min-width:180px;transition:border-color .15s,box-shadow .15s}
.fb-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.fb-search svg{width:14px;height:14px;color:var(--text-3);flex-shrink:0}
.fb-search input{background:none;border:none;outline:none;font-family:inherit;font-size:0.84rem;color:var(--text);width:100%}
.fb-search input::placeholder{color:var(--text-3)}

/* severity pills */
.sev{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:0.7rem;font-weight:700;padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.sev-critical{background:rgba(239,68,68,.14);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
.sev-high{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.22)}
.sev-medium{background:var(--warn-soft);color:var(--warn);border:1px solid rgba(217,119,6,.22)}
.sev-low{background:rgba(100,116,139,.12);color:#64748b;border:1px solid rgba(100,116,139,.2)}
.sev-info{background:var(--accent-soft);color:var(--accent-ink);border:1px solid var(--accent-soft-2)}

/* alert cards */
.alert-section{margin-bottom:20px}
.alert-section-h{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:0.78rem;font-family:var(--font-mono);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3)}
.alert-section-h span{padding:2px 8px;border-radius:99px;font-size:0.68rem}

.alert-card{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:10px;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:start;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .15s;position:relative}
.alert-card:hover{border-color:var(--border-2);box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.alert-card.resolved{opacity:.55}
.alert-card.selected{border-color:var(--accent);background:var(--accent-soft)}

/* severity bar (left) */
.sev-bar{width:4px;height:100%;border-radius:99px;position:absolute;left:0;top:0;bottom:0}
.alert-card{padding-left:22px}
.sev-bar.critical{background:#ef4444}
.sev-bar.high{background:#f97316}
.sev-bar.medium{background:var(--warn)}
.sev-bar.low{background:#64748b}
.sev-bar.info{background:var(--accent)}

.ac-ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex-shrink:0;margin-top:1px}
.ac-ico svg{width:18px;height:18px}
.ac-body{min-width:0}
.ac-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:5px}
.ac-title{font-weight:700;font-size:0.92rem;color:var(--text)}
.ac-desc{font-size:0.84rem;color:var(--text-2);line-height:1.45;margin-bottom:8px}
.ac-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:0.76rem;color:var(--text-3);font-family:var(--font-mono)}
.ac-meta .av-xs{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:700;color:#fff;flex-shrink:0}
.ac-meta-item{display:flex;align-items:center;gap:5px}
.ac-meta-item svg{width:12px;height:12px}
.ac-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.ac-time{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-3);white-space:nowrap}
.ac-status{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:0.68rem;font-weight:600;padding:3px 9px;border-radius:99px}
.st-open{background:var(--danger-soft);color:var(--danger)}
.st-investigating{background:var(--warn-soft);color:var(--warn)}
.st-resolved{background:var(--ok-soft);color:var(--ok)}
.st-ignored{background:var(--border);color:var(--text-3)}
.ac-actions{display:flex;gap:4px;margin-top:4px}
.ac-btn{height:26px;padding:0 10px;border-radius:7px;font-size:0.74rem;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:background .12s,color .12s}
.ac-btn.resolve{background:var(--ok-soft);color:var(--ok);border:1px solid rgba(34,197,94,.2)}
.ac-btn.resolve:hover{background:rgba(34,197,94,.2)}
.ac-btn.inv{background:var(--warn-soft);color:var(--warn);border:1px solid rgba(217,119,6,.2)}
.ac-btn.inv:hover{background:rgba(217,119,6,.2)}
.ac-btn.ignore{background:var(--border);color:var(--text-3);border:1px solid var(--border-2)}
.ac-btn.ignore:hover{background:var(--border-2)}
.ac-btn svg{width:11px;height:11px}

/* detail panel */
.an-detail{position:fixed;top:0;right:0;bottom:0;width:440px;max-width:94vw;background:var(--elev);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:60;transform:translateX(110%);transition:transform .32s cubic-bezier(.22,1,.36,1);box-shadow:-20px 0 60px rgba(0,0,0,.35)}
.an-detail.open{transform:translateX(0)}
.and-head{display:flex;align-items:center;gap:12px;padding:15px 17px;border-bottom:1px solid var(--border);flex-shrink:0}
.and-close{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);margin-left:auto}
.and-close:hover{background:var(--content);color:var(--text)}
.and-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:18px}
.ad-sect-h{font-family:var(--font-mono);font-size:0.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.ad-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);font-size:0.85rem;gap:16px}
.ad-row:last-child{border-bottom:none}
.ad-row .lbl{color:var(--text-3);flex-shrink:0;width:110px}
.ad-row .val{color:var(--text);font-weight:500;text-align:right;word-break:break-all}
.ad-row .val.mono{font-family:var(--font-mono);font-size:0.8rem}

/* timeline inside detail */
.inv-timeline{display:flex;flex-direction:column;gap:0}
.it-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px dashed var(--border);align-items:flex-start}
.it-item:last-child{border-bottom:none}
.it-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.it-content .it-title{font-size:0.84rem;font-weight:500;color:var(--text)}
.it-content .it-sub{font-size:0.74rem;color:var(--text-3);margin-top:2px}
.it-time{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-3);margin-left:auto;white-space:nowrap}

/* pulse indicator */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);display:inline-block;animation:pulse 1.6s ease-in-out infinite}

/* comment box */
.comment-box{background:var(--content);border:1.5px solid var(--border-2);border-radius:10px;padding:10px 12px}
.comment-box textarea{width:100%;background:none;border:none;outline:none;font-family:inherit;font-size:0.84rem;color:var(--text);resize:none;min-height:58px}
.comment-box textarea::placeholder{color:var(--text-3)}
.comment-box .cb-foot{display:flex;justify-content:flex-end;margin-top:6px}

.scrim{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:59;opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.on{opacity:1;pointer-events:auto}

@media(max-width:900px){.an-stats{grid-template-columns:1fr 1fr}.an-detail{width:100vw}.alert-card{grid-template-columns:auto 1fr}}
</style>
</head>

  {id:"AL005",sev:"medium",type:"ip",title:"Đăng nhập từ IP chưa từng truy cập",desc:"Phạm Văn Tú đăng nhập từ IP 103.x.x.x — địa chỉ mới chưa xuất hiện trong lịch sử 90 ngày. Thiết bị: iPhone (Mobile).",uid:"M4",ip:"103.21.x.x",loc:"Hồ Chí Minh",time:"2026-06-13 09:14:05",status:"ignored",score:42,rule:"New IP detection",timeline:[{d:"2026-06-13 09:14",t:"Phát hiện IP mới",c:"warn"},{d:"2026-06-13 09:20",t:"Admin bỏ qua — di chuyển làm việc",c:"info"}]},
  {id:"AL006",sev:"low",type:"access",title:"Truy cập trang lương liên tục trong 1 giờ",desc:"Lê Thị Lan xem trang Salary 14 lần trong 60 phút — tần suất cao bất thường so với mức trung bình (1-2 lần/ngày).",uid:"M3",ip:"116.x.x.x",loc:"TP.HCM",time:"2026-06-12 15:08:44",status:"resolved",score:28,rule:"High-frequency page access",timeline:[{d:"2026-06-12 15:08",t:"Phát hiện tần suất cao",c:"warn"},{d:"2026-06-12 16:00",t:"Admin xác nhận đang làm báo cáo",c:"ok"},{d:"2026-06-12 16:01",t:"Đã giải quyết",c:"ok"}]},
  {id:"AL007",sev:"info",type:"login",title:"Phiên đăng nhập kéo dài bất thường",desc:"Trần Quốc Hoàng có phiên đăng nhập liên tục 14 giờ không ngắt (07:30–21:30). Hệ thống tự động đóng phiên theo work rules.",uid:"M2",ip:"103.x.x.x",loc:"Hà Nội",time:"2026-06-11 21:30:00",status:"resolved",score:18,rule:"Session duration exceeded",timeline:[{d:"2026-06-11 21:30",t:"Session tự động đóng",c:"info"},{d:"2026-06-11 21:31",t:"Ghi nhận sự kiện",c:"info"}]}
];

var selectedId=null, searchQ="", fSev="", fStatus="", fType="";

/* ── Stats ── */
function renderStats(){
  var open=ALERTS.filter(function(a){return a.status==="open";}).length;
  var crit=ALERTS.filter(function(a){return a.sev==="critical";}).length;
  var inv=ALERTS.filter(function(a){return a.status==="investigating";}).length;
  var res=ALERTS.filter(function(a){return a.status==="resolved";}).length;
  document.getElementById("anStats").innerHTML=[
    {c:"#dc2626",sv:'<path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/><path d="M12 8v4M12 16h.01" stroke-linecap="round"/>',v:open,l:"Đang mở"},
    {c:"#ef4444",sv:'<path d="M10.3 3.9l-7 12A2 2 0 0 0 5 19h14a2 2 0 0 0 1.7-3l-7-12a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01" stroke-linecap="round"/>',v:crit,l:"Critical"},
    {c:"#f59e0b",sv:'<circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01" stroke-linecap="round"/>',v:inv,l:"Đang điều tra"},
    {c:"#22c55e",sv:'<path d="M5 12l5 5L20 6"/>',v:res,l:"Đã giải quyết"}
  ].map(function(s){
    return '<div class="an-stat"><span class="ani" style="background:'+s.c+'22;color:'+s.c+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">'+s.sv+'</svg></span><div><div class="anv">'+s.v+'</div><div class="anl">'+s.l+'</div></div></div>';
  }).join("");
}

/* ── Render list ── */
function filtered(){
  return ALERTS.filter(function(a){
    if(searchQ&&a.title.toLowerCase().indexOf(searchQ)===-1&&a.desc.toLowerCase().indexOf(searchQ)===-1&&emp(a.uid).name.toLowerCase().indexOf(searchQ)===-1) return false;
    if(fSev&&a.sev!==fSev) return false;
    if(fStatus&&a.status!==fStatus) return false;
    if(fType&&a.type!==fType) return false;
    return true;
  });
}

function renderList(){
  var list=filtered();
  document.getElementById("alertCount").textContent=list.length+" cảnh báo";
  /* group by status: open first, investigating, then resolved/ignored */
  var order=["open","investigating","resolved","ignored"];
  var grouped={};
  order.forEach(function(s){grouped[s]=list.filter(function(a){return a.status===s;});});
  var html="";
  var secLabel={open:"Đang mở",investigating:"Đang điều tra",resolved:"Đã giải quyết",ignored:"Đã bỏ qua"};
  var secColor={open:"var(--danger)","investigating":"var(--warn)",resolved:"var(--ok)",ignored:"var(--text-3)"};
  order.forEach(function(s){
    var g=grouped[s]; if(!g.length) return;
    html+='<div class="alert-section"><div class="alert-section-h"><span class="ac-status st-'+s+'">'+secLabel[s]+'</span><span style="color:var(--text-3)">'+g.length+'</span></div>'+
      g.map(function(a){return buildCard(a);}).join("")+
    '</div>';
  });
  if(!html) html='<div style="text-align:center;padding:48px;color:var(--text-3);font-size:.88rem">Không có cảnh báo nào phù hợp</div>';
  document.getElementById("alertList").innerHTML=html;

  /* wire clicks */
  document.querySelectorAll(".alert-card[data-id]").forEach(function(c){
    c.addEventListener("click",function(e){
      if(e.target.closest(".ac-btn")) return;
      openDetail(c.getAttribute("data-id"));
    });
  });
  document.querySelectorAll(".ac-btn[data-action]").forEach(function(b){
    b.addEventListener("click",function(e){e.stopPropagation();
      var id=b.closest("[data-id]").getAttribute("data-id");
      var act=b.getAttribute("data-action");
      var a=ALERTS.find(function(x){return x.id===id;});
      if(!a) return;
      if(act==="resolve"){a.status="resolved";a.timeline.push({d:nowStr(),t:"Admin đánh dấu Đã giải quyết",c:"ok"});}
      else if(act==="investigate"){a.status="investigating";a.timeline.push({d:nowStr(),t:"Admin bắt đầu điều tra",c:"warn"});}
      else if(act==="ignore"){a.status="ignored";a.timeline.push({d:nowStr(),t:"Admin bỏ qua cảnh báo",c:"info"});}
      renderStats(); renderList();
      if(selectedId===id) openDetail(id);
    });
  });
}

function nowStr(){var d=new Date();return d.toISOString().slice(0,16).replace("T"," ");}

function buildCard(a){
  var m=emp(a.uid); var sc=SEV_COLOR[a.sev];
  var actionBtns="";
  if(a.status==="open") actionBtns='<button class="ac-btn investigate" data-action="investigate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Điều tra</button><button class="ac-btn resolve" data-action="resolve"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>Giải quyết</button><button class="ac-btn ignore" data-action="ignore">Bỏ qua</button>';
  else if(a.status==="investigating") actionBtns='<button class="ac-btn resolve" data-action="resolve"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>Đánh dấu giải quyết</button>';

  return '<div class="alert-card'+(a.id===selectedId?" selected":"")+(a.status==="resolved"||a.status==="ignored"?" resolved":"")+'" data-id="'+a.id+'">'+
    '<div class="sev-bar '+a.sev+'"></div>'+
    '<div class="ac-ico" style="background:'+sc+'18;color:'+sc+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">'+SEV_ICO[a.sev]+'</svg></div>'+
    '<div class="ac-body">'+
      '<div class="ac-top"><span class="sev sev-'+a.sev+'">'+a.sev+'</span><span class="ac-title">'+a.title+'</span></div>'+
      '<div class="ac-desc">'+a.desc+'</div>'+
      '<div class="ac-meta">'+
        '<span class="ac-meta-item"><span class="av-xs" style="background:'+AVCOLORS[m.col%AVCOLORS.length]+'">'+m.init+'</span>'+m.name+'</span>'+
        '<span class="ac-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>'+a.ip+'</span>'+
        '<span class="ac-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>'+a.time.split(" ")[1].slice(0,5)+'</span>'+
        '<span style="font-size:.7rem;padding:2px 7px;background:var(--content);border:1px solid var(--border);border-radius:99px">Risk: <b style="color:'+sc+'">'+a.score+'</b></span>'+
      '</div>'+
      (actionBtns?'<div class="ac-actions">'+actionBtns+'</div>':'')+
    '</div>'+
    '<div class="ac-right">'+
      '<span class="ac-time">'+a.time.split(" ")[0]+'<br>'+a.time.split(" ")[1].slice(0,5)+'</span>'+
      '<span class="ac-status st-'+a.status+'">'+STATUS_LBL[a.status]+'</span>'+
    '</div>'+
  '</div>';
}

/* ── Detail panel ── */
function openDetail(id){
  selectedId=id;
  var a=ALERTS.find(function(x){return x.id===id;}); if(!a)return;
  var m=emp(a.uid); var sc=SEV_COLOR[a.sev];
  document.getElementById("andHead").innerHTML=
    '<div class="ac-ico" style="width:36px;height:36px;border-radius:10px;background:'+sc+'18;color:'+sc+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">'+SEV_ICO[a.sev]+'</svg></div>'+
    '<div><div style="font-weight:700;font-size:.95rem">'+a.title+'</div><div style="display:flex;gap:7px;margin-top:4px"><span class="sev sev-'+a.sev+'">'+a.sev+'</span><span class="ac-status st-'+a.status+'">'+STATUS_LBL[a.status]+'</span></div></div>'+
    '<button class="and-close" id="andClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><path d="M18 6L6 18M6 6l12 12"/></svg></button>';
  document.getElementById("andClose").addEventListener("click",closeDetail);

  var tlHTML=a.timeline.map(function(t){
    var dotC=t.c==="danger"?"#ef4444":t.c==="warn"?"#f59e0b":t.c==="ok"?"#22c55e":"var(--accent)";
    return '<div class="it-item"><div class="it-dot" style="background:'+dotC+'"></div><div class="it-content"><div class="it-title">'+t.t+'</div></div><div class="it-time">'+t.d.split(" ")[1]||t.d+'</div></div>';
  }).join("");

  document.getElementById("andBody").innerHTML=
    '<div><div class="ad-sect-h">Chi tiết cảnh báo</div>'+
      '<div class="ad-row"><span class="lbl">ID</span><span class="val mono">'+a.id+'</span></div>'+
      '<div class="ad-row"><span class="lbl">Quy tắc</span><span class="val" style="font-size:.82rem">'+a.rule+'</span></div>'+
      '<div class="ad-row"><span class="lbl">Risk score</span><span class="val" style="color:'+sc+';font-weight:800;font-size:1.1rem">'+a.score+'/100</span></div>'+
      '<div class="ad-row"><span class="lbl">Thời gian</span><span class="val mono">'+a.time+'</span></div>'+
    '</div>'+
    '<div><div class="ad-sect-h">Người liên quan</div>'+
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">'+
        '<span style="width:40px;height:40px;border-radius:12px;background:'+AVCOLORS[m.col%AVCOLORS.length]+';display:grid;place-items:center;font-size:.88rem;font-weight:700;color:#fff">'+m.init+'</span>'+
        '<div><div style="font-weight:700;font-size:.92rem">'+m.name+'</div><div style="font-size:.76rem;color:var(--text-3)">'+m.name.split(" ")[0]+'@jh.vn</div></div>'+
      '</div>'+
      '<div class="ad-row"><span class="lbl">Địa chỉ IP</span><span class="val mono">'+a.ip+'</span></div>'+
      '<div class="ad-row"><span class="lbl">Vị trí</span><span class="val">'+a.loc+'</span></div>'+
    '</div>'+
    '<div><div class="ad-sect-h">Timeline điều tra</div><div class="inv-timeline">'+tlHTML+'</div></div>'+
    '<div><div class="ad-sect-h">Ghi chú điều tra</div>'+
      '<div class="comment-box"><textarea id="andNote" placeholder="Thêm ghi chú về sự kiện này…"></textarea>'+
        '<div class="cb-foot"><button class="abtn primary" style="height:30px;font-size:0.8rem" id="andNoteSave"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="12" height="12"><path d="M5 12l5 5L20 6"/></svg>Lưu</button></div>'+
      '</div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
      (a.status==="open"?'<button class="abtn primary" style="height:32px;font-size:.8rem" data-action="investigate" data-id="'+a.id+'">Bắt đầu điều tra</button>':'')+
      (a.status!=="resolved"?'<button class="abtn ghost" style="height:32px;font-size:.8rem;color:var(--ok);border-color:rgba(34,197,94,.3)" data-action="resolve" data-id="'+a.id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="12" height="12"><path d="M5 12l5 5L20 6"/></svg>Đánh dấu giải quyết</button>':'')+
      (a.status!=="ignored"?'<button class="abtn ghost" style="height:32px;font-size:.8rem" data-action="ignore" data-id="'+a.id+'">Bỏ qua</button>':'')+
    '</div>';

  document.querySelectorAll(".and-body button[data-action]").forEach(function(b){
    b.addEventListener("click",function(){
      var act=b.getAttribute("data-action"), id2=b.getAttribute("data-id");
      var al=ALERTS.find(function(x){return x.id===id2;}); if(!al) return;
      if(act==="resolve"){al.status="resolved";al.timeline.push({d:nowStr(),t:"Admin đánh dấu Đã giải quyết",c:"ok"});}
      else if(act==="investigate"){al.status="investigating";al.timeline.push({d:nowStr(),t:"Admin bắt đầu điều tra",c:"warn"});}
      else if(act==="ignore"){al.status="ignored";al.timeline.push({d:nowStr(),t:"Admin bỏ qua",c:"info"});}
      renderStats(); renderList(); openDetail(id2);
    });
  });
  var ns=document.getElementById("andNoteSave");
  if(ns) ns.addEventListener("click",function(){
    var n=document.getElementById("andNote").value.trim(); if(!n)return;
    a.timeline.push({d:nowStr(),t:"Ghi chú: "+n,c:"info"});
    document.getElementById("andNote").value="";
    openDetail(a.id);
  });

  document.getElementById("anDetail").classList.add("open");
  document.getElementById("scrim").classList.add("on");
  renderList();
}
function closeDetail(){
  selectedId=null;
  document.getElementById("anDetail").classList.remove("open");
  document.getElementById("scrim").classList.remove("on");
  renderList();
}
document.getElementById("scrim").addEventListener("click",closeDetail);

/* ── Filters ── */
document.getElementById("searchAlert").addEventListener("input",function(){searchQ=this.value.toLowerCase();renderList();});
document.getElementById("globalSearch").addEventListener("input",function(){document.getElementById("searchAlert").value=this.value;searchQ=this.value.toLowerCase();renderList();});
document.getElementById("fSev").addEventListener("change",function(){fSev=this.value;renderList();});
document.getElementById("fStatus").addEventListener("change",function(){fStatus=this.value;renderList();});
document.getElementById("fType").addEventListener("change",function(){fType=this.value;renderList();});
document.getElementById("fDate").addEventListener("change",function(){renderList();});
document.getElementById("clearFilter").addEventListener("click",function(){
  ["searchAlert","fSev","fStatus","fType"].forEach(function(id){document.getElementById(id).value="";});
  searchQ="";fSev="";fStatus="";fType="";renderList();
});

/* ── Bulk resolve ── */
document.getElementById("resolveAllBtn").addEventListener("click",function(){
  if(!confirm("Giải quyết tất cả cảnh báo đang mở?")) return;
  ALERTS.forEach(function(a){if(a.status==="open"){a.status="resolved";a.timeline.push({d:nowStr(),t:"Admin giải quyết hàng loạt",c:"ok"});}});
  renderStats();renderList();
});

/* ── Init ── */
renderStats();
renderList();
</script>
<script src="js/admin.js"></script>
</body>
</html>
