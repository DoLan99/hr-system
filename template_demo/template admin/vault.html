<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vault — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── Vault page ── */
.vault-layout{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}

/* customer list (left) */
.cust-list{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.cust-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--border)}
.cust-head h3{font-size:0.86rem;font-weight:700}
.cust-search{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--content)}
.cust-search svg{width:14px;height:14px;color:var(--text-3);flex-shrink:0}
.cust-search input{background:none;border:none;outline:none;font-family:inherit;font-size:0.84rem;color:var(--text);width:100%}
.cust-search input::placeholder{color:var(--text-3)}
.cust-item{display:flex;align-items:center;gap:11px;padding:11px 15px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border);position:relative}
.cust-item:last-child{border-bottom:none}
.cust-item:hover{background:var(--content)}
.cust-item.active{background:var(--accent-soft)}
.cust-item.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.cust-ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;font-size:0.88rem;font-weight:800;color:#fff}
.cust-name{font-weight:600;font-size:0.86rem}
.cust-sub{font-size:0.72rem;color:var(--text-3);margin-top:1px}
.cust-ct{margin-left:auto;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-3);background:var(--content);border:1px solid var(--border);border-radius:99px;padding:2px 7px;white-space:nowrap}
.cust-item.active .cust-ct{background:var(--accent-soft-2);color:var(--accent-ink);border-color:var(--accent-soft-2)}

/* vault right panel */
.vault-panel{display:flex;flex-direction:column;gap:16px}
.vp-head{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;display:flex;align-items:center;gap:14px}
.vp-ico{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:1.1rem;font-weight:800;color:#fff;flex-shrink:0}
.vp-name{font-size:1.1rem;font-weight:800;letter-spacing:-.02em}
.vp-meta{font-size:0.82rem;color:var(--text-3);margin-top:3px}
.vp-actions{margin-left:auto;display:flex;gap:8px}

/* category tabs */
.cat-tabs{display:flex;gap:4px;flex-wrap:wrap;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--content)}
.cat-tab{font-size:0.8rem;font-weight:500;padding:5px 13px;border-radius:100px;color:var(--text-2);border:1px solid transparent;transition:all .15s;cursor:pointer}
.cat-tab:hover{color:var(--text);background:var(--elev)}
.cat-tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* credential cards */
.cred-grid{display:flex;flex-direction:column;gap:10px}
.cred-card{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:border-color .15s}
.cred-card:hover{border-color:var(--border-2)}
.cred-top{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.cred-type-ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.cred-type-ico svg{width:17px;height:17px}
.cred-label{font-weight:600;font-size:0.9rem}
.cred-username{font-size:0.78rem;color:var(--text-3);margin-top:2px;font-family:var(--font-mono)}
.cred-top .cc-chev{margin-left:auto;color:var(--text-3);transition:transform .18s}
.cred-card.open .cc-chev{transform:rotate(180deg)}
.cred-body{display:none;border-top:1px solid var(--border)}
.cred-card.open .cred-body{display:block}

/* field row */
.cf-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.cf-row:last-child{border-bottom:none}
.cf-label{font-size:0.74rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;font-family:var(--font-mono);width:110px;flex-shrink:0}
.cf-val{flex:1;font-size:0.88rem;font-family:var(--font-mono);color:var(--text);word-break:break-all}
.cf-val.masked{letter-spacing:.12em;color:var(--text-3)}
.cf-actions{display:flex;gap:4px;flex-shrink:0}
.cf-btn{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--text-3);transition:background .12s,color .12s}
.cf-btn:hover{background:var(--content);color:var(--text)}
.cf-btn svg{width:14px;height:14px}
.cf-btn.copied{background:var(--ok-soft);color:var(--ok)}

/* strength bar */
.str-row{display:flex;align-items:center;gap:10px;padding:6px 16px 12px}
.str-bars{display:flex;gap:3px;flex:1}
.str-bar{flex:1;height:4px;border-radius:99px;background:var(--border)}
.str-bar.on.weak{background:#ef4444}.str-bar.on.fair{background:#f59e0b}.str-bar.on.good{background:#22c55e}.str-bar.on.strong{background:#3B5BDB}
.str-label{font-size:0.72rem;font-family:var(--font-mono);font-weight:600}
.str-label.weak{color:#ef4444}.str-label.fair{color:#f59e0b}.str-label.good{color:#22c55e}.str-label.strong{color:#3B5BDB}

/* tag badges */
.cred-tags{display:flex;gap:6px;padding:0 16px 12px;flex-wrap:wrap}
.cred-tag{font-size:0.7rem;padding:2px 8px;border-radius:99px;background:var(--content);color:var(--text-2);border:1px solid var(--border)}

/* notes */
.cred-note{padding:10px 16px 14px;font-size:0.82rem;color:var(--text-2);background:var(--content);border-top:1px solid var(--border)}

/* empty state */
.vault-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text-3);text-align:center}
.vault-empty svg{width:40px;height:40px;opacity:.5}
.vault-empty p{font-size:0.88rem}

/* password generator */
.pwgen{background:var(--content);border:1px solid var(--border);border-radius:10px;padding:14px}
.pwgen-out{display:flex;align-items:center;gap:10px;background:var(--elev);border:1.5px solid var(--border-2);border-radius:9px;padding:10px 14px;font-family:var(--font-mono);font-size:0.9rem;color:var(--text);margin-bottom:12px;word-break:break-all}
.pwgen-out .pw-val{flex:1}
.pwgen-opts{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.pwgen-opt{display:flex;align-items:center;gap:7px;font-size:0.82rem;color:var(--text-2);cursor:pointer}
.pwgen-opt input{accent-color:var(--accent)}
.pwgen-len{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:0.82rem;color:var(--text-2)}
.pwgen-len input[type=range]{flex:1;accent-color:var(--accent)}
.pwgen-len span{font-family:var(--font-mono);font-size:0.82rem;width:24px;text-align:right;color:var(--text)}

/* modal */
.cv-modal{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.cv-modal.open{opacity:1;pointer-events:auto}
.cv-scrim{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.cv-card{position:relative;z-index:1;background:var(--elev);border:1px solid var(--border-2);border-radius:var(--r-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:26px;display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow-lg)}
.cv-card h2{font-size:1.05rem;font-weight:800}
.cv-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--text-3)}
.cv-close:hover{background:var(--content);color:var(--text)}
.cv-f{display:flex;flex-direction:column;gap:5px}
.cv-f label{font-size:0.8rem;font-weight:600;color:var(--text-2)}
.cv-f input,.cv-f select,.cv-f textarea{background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:9px 12px;font-family:inherit;font-size:0.88rem;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.cv-f input::placeholder{color:var(--text-3)}
.cv-f input:focus,.cv-f select:focus,.cv-f textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.cv-f .pw-wrap{position:relative}
.cv-f .pw-wrap input{padding-right:36px}
.cv-f .pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-3);cursor:pointer}
.cv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cv-foot{display:flex;justify-content:flex-end;gap:8px;padding-top:6px;border-top:1px solid var(--border)}

/* lock overlay (security check) */
.lock-overlay{position:absolute;inset:0;background:color-mix(in srgb,var(--elev) 96%,transparent);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;border-radius:var(--r-lg)}
.lock-icon{width:54px;height:54px;border-radius:50%;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center}
.lock-icon svg{width:26px;height:26px}

@media(max-width:960px){.vault-layout{grid-template-columns:1fr}.cust-list{display:none}}
</style>
</head>
<body>
<div class="nav-scrim" id="navScrim"></div>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="side">
    <div class="side-brand"><span class="lm">j</span><div><div class="bt">jobihome</div><div class="bs">Workspace · Do thi Lan</div></div></div>
    <nav class="side-nav scroll" id="sideNav"></nav>
    <div class="side-foot"><div class="side-user"><span class="av">DL</span><div><div class="un">Do thi Lan</div><div class="ur">Super Admin</div></div><span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg></span></div></div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <button class="tb-icon menu-btn" id="menuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      <div><div class="tb-title">Vault · Mật khẩu</div></div>
      <div class="tb-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input type="text" id="globalSearch" placeholder="Tìm mật khẩu, tên khách hàng…"/>
        <kbd>⌘K</kbd>
      </div>
      <div class="tb-right">
        <button class="tb-icon" id="themeToggle">
          <span class="icon-moon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
          <span class="icon-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
        </button>
        <button class="tb-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="dot"></span></button>
      </div>
    </header>

    <main class="content scroll">
      <div class="content-inner">

        <div class="page-head" style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;">
          <div>
            <h1>Vault · Mật khẩu</h1>
            <p>Lưu trữ credentials khách hàng được mã hóa an toàn.</p>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="abtn ghost" id="genBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M12 2l3.6 7.3L23 10.5l-5.5 5.4 1.3 7.6L12 20l-6.8 3.5 1.3-7.6L1 10.5l7.4-1.2z"/></svg>Tạo mật khẩu</button>
            <button class="abtn primary" id="addCredBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>Thêm credential</button>
          </div>
        </div>

        <!-- stats bar -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px" id="vaultStats"></div>

        <div class="vault-layout">
          <!-- Left -->
          <div>
            <div class="cust-list">
              <div class="cust-head"><h3>Khách hàng</h3><button class="abtn ghost" style="height:26px;font-size:0.78rem;padding:0 10px" id="addCustBtn">+ Thêm</button></div>
              <div class="cust-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input type="text" id="custSearch" placeholder="Tìm khách hàng…"/></div>
              <div id="custListEl"></div>
            </div>
          </div>

          <!-- Right -->
          <div class="vault-panel" id="vaultPanel"></div>
        </div>

      </div>
    </main>
  </div>
</div>

<!-- Add customer modal -->
<div class="cv-modal" id="addCustModal">
  <div class="cv-scrim" id="custScrim"></div>
  <div class="cv-card" style="max-width:440px">
    <h2 id="acTitle">Thêm khách hàng</h2>
    <button class="cv-close" id="acClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <div class="cv-f"><label>Tên công ty / khách hàng *</label><input type="text" id="acName" placeholder="Công ty ABC"/></div>
    <div class="cv-grid">
      <div class="cv-f"><label>Tên viết tắt *</label><input type="text" id="acShort" placeholder="ABC" maxlength="4" style="text-transform:uppercase"/></div>
      <div class="cv-f"><label>Domain</label><input type="text" id="acDomain" placeholder="abc.vn"/></div>
    </div>
    <div class="cv-f"><label>Màu nhận diện</label>
      <div style="display:flex;gap:7px;flex-wrap:wrap" id="acColorRow"></div>
    </div>
    <div class="cv-foot">
      <button class="abtn ghost" id="acCancel">Hủy</button>
      <button class="abtn primary" id="acSave"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="14" height="14"><path d="M5 12l5 5L20 6"/></svg>Lưu</button>
    </div>
  </div>
</div>

<!-- Add credential modal -->
<div class="cv-modal" id="credModal">
  <div class="cv-scrim" id="credScrim"></div>
  <div class="cv-card">
    <h2 id="cvTitle">Thêm credential</h2>
    <button class="cv-close" id="cvClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <div class="cv-grid">
      <div class="cv-f"><label>Tên / nhãn *</label><input type="text" id="cvLabel" placeholder="cPanel, FTP, DB Admin…"/></div>
      <div class="cv-f"><label>Loại</label>
        <select id="cvType">
          <option value="web">Website / cPanel</option>
          <option value="db">Database</option>
          <option value="ssh">SSH / Server</option>
          <option value="email">Email / SMTP</option>
          <option value="api">API Key</option>
          <option value="ftp">FTP / SFTP</option>
          <option value="other">Khác</option>
        </select>
      </div>
    </div>
    <div class="cv-f"><label>URL / Host</label><input type="text" id="cvUrl" placeholder="https://example.com hoặc 192.168.1.1"/></div>
    <div class="cv-f"><label>Username / Email</label><input type="text" id="cvUser" placeholder="admin@example.com"/></div>
    <div class="cv-f"><label>Mật khẩu *</label>
      <div class="pw-wrap">
        <input type="password" id="cvPass" placeholder="Nhập hoặc tạo mật khẩu"/>
        <span class="pw-eye" id="cvEye"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
      </div>
    </div>
    <div id="cvStrengthBar" style="margin-top:-4px"></div>
    <div class="cv-f"><label>Ghi chú</label><textarea id="cvNote" rows="2" placeholder="Thông tin thêm…" style="height:auto;resize:none"></textarea></div>
    <div class="cv-f"><label>Tags (cách nhau bằng dấu phẩy)</label><input type="text" id="cvTags" placeholder="production, staging, wordpress…"/></div>
    <div class="cv-foot">
      <button class="abtn ghost" id="cvCancel">Hủy</button>
      <button class="abtn primary" id="cvSave">Lưu credential</button>
    </div>
  </div>
</div>

<!-- Password generator modal -->
<div class="cv-modal" id="genModal">
  <div class="cv-scrim" id="genScrim"></div>
  <div class="cv-card">
    <h2>Tạo mật khẩu ngẫu nhiên</h2>
    <button class="cv-close" id="genClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <div class="pwgen">
      <div class="pwgen-out"><span class="pw-val" id="genOut">Click tạo mật khẩu →</span><button class="cf-btn" id="genCopy" title="Copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div>
      <div class="pwgen-len"><span>Độ dài</span><input type="range" id="genLen" min="8" max="64" value="20"/><span id="genLenVal">20</span></div>
      <div class="pwgen-opts">
        <label class="pwgen-opt"><input type="checkbox" id="genUpper" checked/> A–Z</label>
        <label class="pwgen-opt"><input type="checkbox" id="genLower" checked/> a–z</label>
        <label class="pwgen-opt"><input type="checkbox" id="genNum" checked/> 0–9</label>
        <label class="pwgen-opt"><input type="checkbox" id="genSym"/> !@#$%</label>
      </div>
      <div id="genStrRow"></div>
    </div>
    <div class="cv-foot"><button class="abtn ghost" id="genClose2">Đóng</button><button class="abtn primary" id="genRegen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9A9 9 0 0 1 20.5 15M20.5 15A9 9 0 0 1 3.5 9"/></svg>Tạo lại</button></div>
  </div>
</div>

<script>
/* ── helpers ── */
var CUST_COLORS=["#3B5BDB","#7c3aed","#0891b2","#059669","#d97706","#dc2626","#be185d","#0f766e"];
var TYPE_META={
  web: {label:"Website",color:"#3B5BDB",svg:'<circle cx="12" cy="12" r="9"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 0 20M12 2a15.3 15.3 0 0 0 0 20" stroke-linecap="round"/>'},
  db:  {label:"Database",color:"#059669",svg:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" stroke-linecap="round"/>'},
  ssh: {label:"SSH",color:"#64748b",svg:'<rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>'},
  email:{label:"Email",color:"#7c3aed",svg:'<path d="M4 4h16v16H4z" fill="none"/><path d="M4 6l8 6 8-6"/>'},

/* ── password strength ── */
function strength(pw){
  if(!pw) return {score:0,label:"",cls:""};
  var s=0; if(pw.length>=8)s++; if(pw.length>=14)s++; if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))s++; if(/\d/.test(pw))s++; if(/[^A-Za-z0-9]/.test(pw))s++;
  var levels=[{score:0,label:"",cls:""},{score:1,label:"Rất yếu",cls:"weak"},{score:2,label:"Yếu",cls:"weak"},{score:3,label:"Trung bình",cls:"fair"},{score:4,label:"Tốt",cls:"good"},{score:5,label:"Mạnh",cls:"strong"}];
  return levels[Math.min(s,5)];
}
function strBar(pw,container){
  var st=strength(pw); if(!container) return;
  var on=st.score, bars="";
  for(var i=1;i<=4;i++) bars+='<div class="str-bar'+(i<=Math.ceil(on/1.25)?" on "+st.cls:"")+'" ></div>';
  container.innerHTML='<div class="str-row"><div class="str-bars">'+bars+'</div><span class="str-label '+(st.cls||"")+'">'+st.label+'</span></div>';
}

/* ── Copy to clipboard ── */
function copyToClipboard(text,btn){
  if(!text) return;
  if(navigator.clipboard){navigator.clipboard.writeText(text).catch(function(){});}
  else{var ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
  if(btn){btn.classList.add("copied");setTimeout(function(){btn.classList.remove("copied");},1200);}
}

/* ── Password generator ── */
function generatePassword(){
  var len=parseInt(document.getElementById("genLen").value)||20;
  var upper=document.getElementById("genUpper").checked;
  var lower=document.getElementById("genLower").checked;
  var num=document.getElementById("genNum").checked;
  var sym=document.getElementById("genSym").checked;
  var chars="";
  if(upper)chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  if(lower)chars+="abcdefghijklmnopqrstuvwxyz";
  if(num)chars+="0123456789";
  if(sym)chars+="!@#$%^&*()-_=+[]{}";
  if(!chars)chars="abcdefghijklmnopqrstuvwxyz0123456789";
  var pw="";
  for(var i=0;i<len;i++)pw+=chars[Math.floor(Math.random()*chars.length)];
  document.getElementById("genOut").textContent=pw;
  var st=strength(pw);
  document.getElementById("genStrRow").innerHTML='<div class="str-row"><div class="str-bars">'+strBars(st)+'</div><span class="str-label '+st.cls+'">'+st.label+'</span></div>';
  return pw;
}

/* ── Add customer modal ── */
var acPickedColor = CUST_COLORS[0];
(function buildAcColorPicker(){
  var row = document.getElementById('acColorRow');
  row.innerHTML = CUST_COLORS.map(function(c){
    return '<span style="width:26px;height:26px;border-radius:7px;background:'+c+';cursor:pointer;border:2px solid '+(c===acPickedColor?'var(--text)':'transparent')+';transition:transform .15s;display:inline-block" data-c="'+c+'"></span>';
  }).join('');
  row.querySelectorAll('span[data-c]').forEach(function(s){
    s.addEventListener('click', function(){
      acPickedColor = s.getAttribute('data-c');
      row.querySelectorAll('span[data-c]').forEach(function(x){ x.style.borderColor = x.getAttribute('data-c')===acPickedColor?'var(--text)':'transparent'; });
    });
  });
})();

document.getElementById('acSave').addEventListener('click', function(){
  var name = document.getElementById('acName').value.trim();
  var short = document.getElementById('acShort').value.trim().toUpperCase();
  if(!name || !short){ alert('Vui lòng nhập tên và tên viết tắt.'); return; }
  var newCust = { id:'C'+(CUSTOMERS.length+1), name:name, short:short.slice(0,4), color:acPickedColor, domain:document.getElementById('acDomain').value.trim(), creds:[] };
  CUSTOMERS.push(newCust);
  activeCustId = newCust.id; activeCategory = 'all';
  document.getElementById('addCustModal').classList.remove('open');
  document.getElementById('acName').value=''; document.getElementById('acShort').value=''; document.getElementById('acDomain').value='';
  renderStats(); renderCustList(); renderVaultPanel();
});
