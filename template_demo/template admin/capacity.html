<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Capacity Planning — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── Capacity Planning ── */
.cp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.cp-stat{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px 17px;display:flex;align-items:center;gap:13px}
.cp-stat .csi{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex-shrink:0}
.cp-stat .csi svg{width:18px;height:18px}
.cp-stat .csv{font-size:1.5rem;font-weight:800;letter-spacing:-.02em}
.cp-stat .csl{font-size:.78rem;color:var(--text-3);margin-top:1px}
.cp-stat .csd{font-size:.74rem;font-weight:600;margin-top:2px}
.csd.ok{color:var(--ok)}.csd.warn{color:var(--warn)}.csd.danger{color:var(--danger)}

/* layout */
.cp-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
.cp-main{display:flex;flex-direction:column;gap:16px}
.cp-side{display:flex;flex-direction:column;gap:16px}

/* panel */
.cp{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.cp-head{display:flex;align-items:center;justify-content:space-between;padding:13px 17px;border-bottom:1px solid var(--border)}
.cp-head h3{font-size:.9rem;font-weight:700;display:flex;align-items:center;gap:8px}
.cp-head h3 svg{width:15px;height:15px;color:var(--accent-ink)}
.cp-body{padding:18px}

/* skill utilisation bars */
.skill-list{display:flex;flex-direction:column;gap:0}
.skill-row{display:grid;grid-template-columns:150px 1fr 120px 90px;gap:14px;align-items:center;padding:11px 18px;border-bottom:1px solid var(--border)}
.skill-row:last-child{border-bottom:none}
.skill-row:hover{background:var(--content)}
.sk-name{font-weight:600;font-size:.86rem;display:flex;align-items:center;gap:7px}
.sk-name .sk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sk-bar-wrap{display:flex;flex-direction:column;gap:4px}
.sk-bar{height:8px;border-radius:99px;background:var(--border);overflow:hidden;position:relative}
.sk-bar .sf{height:100%;border-radius:99px;transition:width .6s var(--ease)}
.sk-bar .st{position:absolute;top:0;height:100%;border-right:2px dashed rgba(255,255,255,.4);opacity:.8}
.sk-members{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-2)}
.sk-pct{font-family:var(--font-mono);font-size:.82rem;font-weight:700;text-align:right}
.sk-header{display:grid;grid-template-columns:150px 1fr 120px 90px;gap:14px;padding:8px 18px;border-bottom:1px solid var(--border);background:var(--content)}
.sk-header span{font-family:var(--font-mono);font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3)}

/* member capacity table */
.mem-table{width:100%;border-collapse:collapse;font-size:.84rem}
.mem-table th{text-align:left;padding:9px 14px;font-family:var(--font-mono);font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border);background:var(--content)}
.mem-table td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text-2);vertical-align:middle}
.mem-table tbody tr:last-child td{border-bottom:none}
.mem-table tbody tr:hover{background:var(--content)}
.mem-av{display:flex;align-items:center;gap:9px}
.mem-av .av-s{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:.64rem;font-weight:700;color:#fff;flex-shrink:0}
.mem-bar{height:7px;border-radius:99px;background:var(--border);overflow:hidden;width:100px}
.mem-bar i{display:block;height:100%;border-radius:99px}
.cap-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:99px}
.cap-over{background:var(--danger-soft);color:var(--danger)}
.cap-high{background:var(--warn-soft);color:var(--warn)}
.cap-ok{background:var(--ok-soft);color:var(--ok)}
.cap-low{background:var(--border);color:var(--text-3)}

/* timeline / sprint view */
.sprint-grid{display:grid;gap:0;overflow-x:auto}
.sg-head{display:flex;border-bottom:1px solid var(--border);background:var(--content)}
.sg-name-col{width:160px;min-width:160px;padding:9px 14px;font-family:var(--font-mono);font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3);border-right:1px solid var(--border)}
.sg-week{flex:1;text-align:center;padding:9px 4px;font-family:var(--font-mono);font-size:.68rem;color:var(--text-3);border-right:1px solid var(--border)}
.sg-week:last-child{border-right:none}
.sg-row{display:flex;border-bottom:1px solid var(--border)}
.sg-row:last-child{border-bottom:none}
.sg-row:hover{background:var(--content)}
.sg-person{width:160px;min-width:160px;padding:10px 14px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:600;color:var(--text)}
.sg-cells{display:flex;flex:1}
.sg-cell{flex:1;padding:5px 4px;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.sg-cell:last-child{border-right:none}
.sg-block{width:100%;border-radius:5px;height:26px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.64rem;font-weight:700;transition:transform .12s}
.sg-block:hover{transform:scaleY(1.08)}

/* forecast panel */
.fc-chart{display:flex;align-items:flex-end;gap:6px;height:140px;padding:0 0 10px}
.fc-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.fc-bar{width:100%;border-radius:5px 5px 2px 2px;transition:height .5s var(--ease);position:relative;min-height:4px}
.fc-bar .fc-tip{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-family:var(--font-mono);font-size:.64rem;white-space:nowrap;color:var(--text-2)}
.fc-lbl{font-family:var(--font-mono);font-size:.64rem;color:var(--text-3);text-align:center}
.fc-bar.actual{background:var(--accent)}
.fc-bar.forecast{background:rgba(59,91,219,.35);border:1.5px dashed var(--accent)}

/* recommendation cards */
.rec-list{display:flex;flex-direction:column;gap:10px}
.rec-card{display:flex;gap:11px;padding:12px 14px;border-radius:10px;border:1px solid;align-items:flex-start}
.rec-card.hire{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2)}
.rec-card.balance{background:rgba(59,91,219,.06);border-color:var(--accent-soft-2)}
.rec-card.risk{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2)}
.rec-ico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.rec-ico svg{width:14px;height:14px}
.rec-card.hire .rec-ico{background:rgba(34,197,94,.12);color:var(--ok)}
.rec-card.balance .rec-ico{background:var(--accent-soft);color:var(--accent-ink)}
.rec-card.risk .rec-ico{background:rgba(239,68,68,.12);color:var(--danger)}
.rec-t{font-size:.84rem;font-weight:600;color:var(--text)}
.rec-s{font-size:.76rem;color:var(--text-2);margin-top:3px;line-height:1.45}

/* skill gap badge */
.gap-badge{display:inline-flex;align-items:center;gap:5px;font-size:.74rem;font-weight:500;padding:3px 9px;border-radius:99px;background:var(--danger-soft);color:var(--danger);font-family:var(--font-mono)}

/* filter chips */
.cp-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.cp-chip{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 13px;border-radius:100px;font-size:.82rem;font-weight:500;color:var(--text-2);background:var(--elev);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.cp-chip:hover{border-color:var(--accent);color:var(--accent-ink)}
.cp-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

@media(max-width:1050px){.cp-layout{grid-template-columns:1fr}.cp-side{display:grid;grid-template-columns:1fr 1fr}}
@media(max-width:700px){.cp-stats{grid-template-columns:1fr 1fr}.skill-row{grid-template-columns:120px 1fr 80px 60px}.cp-side{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="nav-scrim" id="navScrim"></div>
<div class="app">

  <aside class="side">
    <div class="side-brand"><span class="lm">j</span><div><div class="bt">jobihome</div><div class="bs">Workspace · Do thi Lan</div></div></div>
    <nav class="side-nav scroll" id="sideNav"></nav>
    <div class="side-foot"><div class="side-user"><span class="av">DL</span><div><div class="un">Do thi Lan</div><div class="ur">Super Admin</div></div><span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg></span></div></div>

  <div class="main">
    <header class="topbar">
      <button class="tb-icon menu-btn" id="menuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      <div><div class="tb-title">Capacity Planning</div></div>
      <div class="tb-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input type="text" placeholder="Tìm thành viên, kỹ năng…"/><kbd>⌘K</kbd></div>
      <div class="tb-right">

          <span class="icon-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
        </button>

    <main class="content scroll">

        <div class="page-head" style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;">
          <div><h1>Capacity Planning</h1><p>Phân tích workload, dự báo năng lực và gợi ý tuyển dụng / tái phân công.</p></div>
          <div style="display:flex;gap:8px;">
            <select class="fb-select" id="sprintSel" style="background:var(--elev);border:1px solid var(--border-2);border-radius:9px;padding:8px 12px;font-family:inherit;font-size:.84rem;color:var(--text);outline:none;height:40px;">
              <option>Sprint 14 (hiện tại)</option>
              <option>Sprint 15 (tiếp theo)</option>

            </select>
            <button class="abtn ghost"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button>
          </div>

        <!-- stats -->

<script>
var AVCOLORS=["#3B5BDB","#2196f3","#7c3aed","#0891b2","#059669","#d97706","#dc2626","#be185d","#0f766e","#b45309","#1d4ed8","#6d28d9"];
var MEMBERS=[
  {id:"M1",name:"Nguyễn Minh Anh",init:"MA",col:0,role:"Frontend Lead",dept:"Engineering",skills:["React","TypeScript","Figma"],capacity:100,allocated:95,tasks:8,hours:42},
  {id:"M2",name:"Trần Quốc Hoàng",init:"HG",col:1,role:"Backend Developer",dept:"Engineering",skills:["Node.js","PostgreSQL","TypeScript"],capacity:100,allocated:82,tasks:7,hours:38},
  {id:"M3",name:"Lê Thị Lan",init:"LN",col:2,role:"UI/UX Designer",dept:"Design",skills:["Figma","React","CSS"],capacity:80,allocated:60,tasks:5,hours:28},
  {id:"M4",name:"Phạm Văn Tú",init:"TU",col:3,role:"DevOps Engineer",dept:"Engineering",skills:["DevOps","Node.js","Linux"],capacity:100,allocated:110,tasks:9,hours:44},
  {id:"M5",name:"Đỗ Thị Lan",init:"DL",col:4,role:"HR Manager",dept:"HR",skills:["HR","Excel"],capacity:100,allocated:55,tasks:4,hours:24},
  {id:"M6",name:"Vũ Thanh Hà",init:"TH",col:5,role:"Product Manager",dept:"Product",skills:["Product","Figma","Excel"],capacity:100,allocated:78,tasks:6,hours:35},
  {id:"M7",name:"Nguyễn Đức Nam",init:"DN",col:6,role:"QA Engineer",dept:"Engineering",skills:["Testing","TypeScript","Node.js"],capacity:80,allocated:70,tasks:5,hours:30},
  {id:"M8",name:"Trần Thị Mai",init:"TM",col:7,role:"Marketing Lead",dept:"Marketing",skills:["Marketing","Design"],capacity:100,allocated:45,tasks:3,hours:20},
  {id:"M9",name:"Lê Hoàng Phúc",init:"HP",col:8,role:"Full-stack Dev",dept:"Engineering",skills:["React","Node.js","PostgreSQL"],capacity:100,allocated:88,tasks:7,hours:40}
];

var SKILLS=[
  {name:"React",color:"#0891b2",members:["M1","M3","M9"],demand:90,supply:70},
  {name:"Node.js",color:"#059669",members:["M2","M4","M7","M9"],demand:85,supply:88},
  {name:"TypeScript",color:"#3B5BDB",members:["M1","M2","M7","M9"],demand:92,supply:80},
  {name:"PostgreSQL",color:"#1d4ed8",members:["M2","M9"],demand:70,supply:55},
  {name:"Figma",color:"#be185d",members:["M1","M3","M6"],demand:60,supply:72},
  {name:"DevOps",color:"#0f766e",members:["M4"],demand:88,supply:40},
  {name:"Testing",color:"#d97706",members:["M7"],demand:65,supply:38},
  {name:"Product",color:"#7c3aed",members:["M6"],demand:55,supply:60},
  {name:"Marketing",color:"#dc2626",members:["M8"],demand:45,supply:50}
];

var WEEKS=["W24","W25","W26","W27","W28","W29"];
var SPRINT_DATA=[
  {uid:"M1",weeks:[90,95,100,85,70,60]},
  {uid:"M2",weeks:[80,85,82,88,75,65]},
  {uid:"M3",weeks:[60,65,55,50,45,40]},
  {uid:"M4",weeks:[110,108,105,100,90,85]},
  {uid:"M6",weeks:[78,80,75,70,65,60]},
  {uid:"M9",weeks:[88,90,85,80,78,70]}
];

var activeView="skills";

/* ── Stats ── */
(function(){
  var overloaded=MEMBERS.filter(function(m){return m.allocated>100;}).length;
  var avgCap=Math.round(MEMBERS.reduce(function(s,m){return s+m.allocated;},0)/MEMBERS.length);
  var gapSkills=SKILLS.filter(function(s){return s.demand>s.supply+10;}).length;
  document.getElementById("cpStats").innerHTML=[
    {c:"#3B5BDB",sv:'<circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke-linecap="round"/><path d="M16 4a3 3 0 0 1 0 6M21 20a5 5 0 0 0-4-5" stroke-linecap="round"/>',v:MEMBERS.length,l:"Thành viên đang hoạt động",d:"+1 so tháng trước",dc:"ok"},
    {c:avgCap>90?"#dc2626":"#d97706",sv:'<path d="M3 12h4l3 8 4-16 3 8h4" stroke-linecap="round" stroke-linejoin="round"/>',v:avgCap+"%",l:"Trung bình workload",d:avgCap>90?"⚠ Cần cân bằng":"Mức ổn định",dc:avgCap>90?"danger":"warn"},
    {c:"#dc2626",sv:'<path d="M10.3 3.9l-7 12A2 2 0 0 0 5 19h14a2 2 0 0 0 1.7-3l-7-12a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01" stroke-linecap="round"/>',v:overloaded,l:"Thành viên bị quá tải",d:"Cần phân công lại",dc:overloaded>0?"danger":"ok"},
    {c:"#f97316",sv:'<circle cx="12" cy="8" r="5"/><path d="M8.5 12.5L7 22l5-3 5 3-1.5-9.5" stroke-linecap="round" stroke-linejoin="round"/>',v:gapSkills,l:"Kỹ năng thiếu hụt",d:"Xem chi tiết bên dưới",dc:gapSkills>0?"warn":"ok"}
  ].map(function(s){
    return '<div class="cp-stat"><span class="csi" style="background:'+s.c+'22;color:'+s.c+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">'+s.sv+'</svg></span><div><div class="csv">'+s.v+'</div><div class="csl">'+s.l+'</div><div class="csd '+s.dc+'">'+s.d+'</div></div></div>';
  }).join("");
})();

function capColor(pct){if(pct>100)return"#ef4444";if(pct>85)return"#f97316";if(pct>60)return"#3B5BDB";return"#22c55e";}
function capBadge(pct){if(pct>100)return'<span class="cap-badge cap-over">'+pct+'% Quá tải</span>';if(pct>85)return'<span class="cap-badge cap-high">'+pct+'% Cao</span>';if(pct>50)return'<span class="cap-badge cap-ok">'+pct+'% Bình thường</span>';return'<span class="cap-badge cap-low">'+pct+'% Nhẹ</span>';}
function av(m,sz,r){sz=sz||28;r=r||8;return '<span class="av-s" style="width:'+sz+'px;height:'+sz+'px;border-radius:'+r+'px;background:'+AVCOLORS[m.col%AVCOLORS.length]+'">'+m.init+'</span>';}

/* ── Views ── */
function renderSkills(){
  var html='<div class="cp"><div class="cp-head"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M8.5 12.5L7 22l5-3 5 3-1.5-9.5"/></svg>Workload theo kỹ năng</h3><div style="display:flex;gap:8px;align-items:center;font-size:.78rem;color:var(--text-3);font-family:var(--font-mono)"><span>■ Cung</span><span style="opacity:.45">■ Cầu</span></div></div>'+
    '<div class="skill-list">'+
      '<div class="sk-header"><span>Kỹ năng</span><span>Cung / Cầu</span><span>Thành viên</span><span>Trạng thái</span></div>'+
      SKILLS.map(function(sk){
        var gap=sk.demand>sk.supply+10;
        var supplyW=Math.min(sk.supply,100), demandW=Math.min(sk.demand,100);
        var mems=sk.members.map(function(id){var m=MEMBERS.find(function(x){return x.id===id;}); return m?av(m,22,50):"";}).join("");
        return '<div class="skill-row">'+
          '<div class="sk-name"><span class="sk-dot" style="background:'+sk.color+'"></span>'+sk.name+(gap?'<span class="gap-badge">Thiếu</span>':'')+'</div>'+
          '<div class="sk-bar-wrap">'+
            '<div class="sk-bar"><div class="sf" style="width:'+supplyW+'%;background:'+sk.color+'"></div><div class="st" style="left:'+demandW+'%"></div></div>'+
            '<div style="display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:.64rem;color:var(--text-3)"><span>Cung: '+sk.supply+'%</span><span>Cầu: '+sk.demand+'%</span></div>'+
          '</div>'+
          '<div class="sk-members"><div style="display:flex">'+mems+'</div><span>'+sk.members.length+'</span></div>'+
          '<div class="sk-pct" style="color:'+(gap?"var(--danger)":"var(--ok)")+'">'+(!gap?"✓ Đủ":"−"+(sk.demand-sk.supply)+"%")+'</div>'+
        '</div>';
      }).join("")+
    '</div></div>';
  return html;
}

function renderMembers(){
  return '<div class="cp"><div class="cp-head"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 4a3 3 0 0 1 0 6M21 20a5 5 0 0 0-4-5" stroke-linecap="round"/></svg>Workload từng thành viên</h3></div>'+
    '<table class="mem-table"><thead><tr><th>Thành viên</th><th>Phòng ban</th><th>Kỹ năng</th><th>Tasks</th><th>Giờ / tuần</th><th>Workload</th><th>Trạng thái</th></tr></thead><tbody>'+
    MEMBERS.map(function(m){
      var c=capColor(m.allocated);
      return '<tr>'+
        '<td><div class="mem-av">'+av(m,28,8)+'<div><div style="font-weight:600;font-size:.86rem;color:var(--text)">'+m.name+'</div><div style="font-size:.74rem;color:var(--text-3)">'+m.role+'</div></div></div></td>'+
        '<td>'+m.dept+'</td>'+
        '<td><div style="display:flex;flex-wrap:wrap;gap:4px">'+m.skills.slice(0,2).map(function(s){return '<span style="font-size:.7rem;padding:1px 6px;border-radius:99px;background:var(--accent-soft);color:var(--accent-ink);font-family:var(--font-mono)">'+s+'</span>';}).join("")+'</div></td>'+
        '<td style="font-family:var(--font-mono);font-weight:700;color:var(--text)">'+m.tasks+'</td>'+
        '<td style="font-family:var(--font-mono);font-weight:700;color:var(--text)">'+m.hours+'h</td>'+
        '<td><div style="display:flex;align-items:center;gap:8px"><div class="mem-bar"><i style="width:'+Math.min(m.allocated,100)+'%;background:'+c+'"></i></div><span style="font-family:var(--font-mono);font-size:.76rem;font-weight:700;color:'+c+'">'+m.allocated+'%</span></div></td>'+
        '<td>'+capBadge(m.allocated)+'</td>'+
      '</tr>';
    }).join("")+
    '</tbody></table></div>';
}

function renderTimeline(){
  var rows=SPRINT_DATA.map(function(sd){
    var m=MEMBERS.find(function(x){return x.id===sd.uid;});
    if(!m) return "";
    var cells=sd.weeks.map(function(pct){
      var c=capColor(pct);
      return '<div class="sg-cell"><div class="sg-block" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44" title="'+pct+'%">'+pct+'%</div></div>';
    }).join("");
    return '<div class="sg-row">'+
      '<div class="sg-person">'+av(m,22,8)+'<span>'+m.name.split(" ").slice(-1)[0]+'</span></div>'+
      '<div class="sg-cells">'+cells+'</div>'+
    '</div>';
  }).join("");
  return '<div class="cp"><div class="cp-head"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>Timeline workload theo tuần</h3><div style="display:flex;gap:6px;font-family:var(--font-mono);font-size:.7rem"><span style="color:#22c55e">■ &lt;60%</span><span style="color:#3B5BDB">■ 60-85%</span><span style="color:#f97316">■ 86-100%</span><span style="color:#ef4444">■ &gt;100%</span></div></div>'+
    '<div class="sprint-grid">'+
      '<div class="sg-head"><div class="sg-name-col">Thành viên</div>'+WEEKS.map(function(w){return '<div class="sg-week">'+w+'</div>';}).join("")+'</div>'+
      rows+
    '</div></div>';
}

function renderForecast(){
  var MONTHS=["T4","T5","T6","T7*","T8*","T9*"];
  var ACTUAL=[72,78,81,null,null,null];
  var FORECAST=[null,null,81,87,93,98];
  var MAX=105;
  return '<div class="cp"><div class="cp-head"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6" stroke-linecap="round"/></svg>Dự báo workload 6 tháng</h3></div><div class="cp-body">'+
    '<div style="display:flex;align-items:flex-end;gap:0">'+
      '<div style="width:32px;flex-shrink:0;padding-bottom:10px;display:flex;flex-direction:column;justify-content:space-between;height:150px;align-items:flex-end;font-family:var(--font-mono);font-size:.62rem;color:var(--text-3);padding-right:4px"><span>100%</span><span>75%</span><span>50%</span><span>25%</span></div>'+
      '<div style="flex:1;position:relative">'+
        '<div style="position:absolute;inset:0 0 10px 0;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none">'+
          [100,75,50,25].map(function(v){return '<div style="border-top:1px dashed var(--border);width:100%"></div>';}).join("")+
        '</div>'+
        '<div class="fc-chart">'+
          MONTHS.map(function(m,i){
            var aH=ACTUAL[i]!==null?Math.round(ACTUAL[i]/MAX*130):0;
            var fH=FORECAST[i]!==null?Math.round(FORECAST[i]/MAX*130):0;
            return '<div class="fc-bar-wrap">'+
              (ACTUAL[i]!==null?'<div class="fc-bar actual" style="height:'+aH+'px"><span class="fc-tip">'+ACTUAL[i]+'%</span></div>':'')+
              (FORECAST[i]!==null&&ACTUAL[i]===null?'<div class="fc-bar forecast" style="height:'+fH+'px"><span class="fc-tip">'+FORECAST[i]+'%</span></div>':'')+
              '<span class="fc-lbl">'+m+'</span>'+
            '</div>';
          }).join("")+
        '</div>'+
      '</div>'+
    '</div>'+
    '<p style="font-size:.78rem;color:var(--text-3);margin-top:10px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="12" height="12" style="vertical-align:middle;margin-right:4px"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/></svg>Dự báo dựa trên tăng trưởng trung bình 8%/tháng. Đến T9/2026 workload sẽ đạt ~98% — cần tuyển thêm ít nhất 1-2 người kỹ thuật.</p>'+
  '</div></div>';
}

/* ── Side panel (always visible) ── */
function renderSide(){
  var recs=[
    {type:"risk",title:"Phạm Văn Tú đang quá tải",sub:"110% workload trong Sprint 14. Xem xét chuyển task DevOps CI/CD sang sprint sau hoặc chia sẻ với Lê Hoàng Phúc."},
    {type:"hire",title:"Thiếu hụt kỹ năng DevOps",sub:"Cầu 88% nhưng chỉ có 1 người (Phạm Văn Tú). Cân nhắc tuyển thêm DevOps Engineer hoặc đào tạo Lê Hoàng Phúc."},
    {type:"balance",title:"Tái phân công để cân bằng",sub:"Lê Thị Lan (60%) và Trần Thị Mai (45%) còn capacity trống. Có thể nhận thêm task thiết kế và nội dung."}
  ];
  var topWL=MEMBERS.slice().sort(function(a,b){return b.allocated-a.allocated;}).slice(0,5);
  return [
    '<div class="cp"><div class="cp-head"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>Gợi ý từ hệ thống</h3></div>'+
    '<div class="cp-body"><div class="rec-list">'+
      recs.map(function(r){
        return '<div class="rec-card '+r.type+'">'+
          '<div class="rec-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+
            (r.type==="hire"?'<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>':
            r.type==="risk"?'<path d="M10.3 3.9l-7 12A2 2 0 0 0 5 19h14a2 2 0 0 0 1.7-3l-7-12a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/>':
            '<path d="M3 12h4l3 8 4-16 3 8h4" stroke-linecap="round" stroke-linejoin="round"/>')+
          '</svg></div>'+
          '<div><div class="rec-t">'+r.title+'</div><div class="rec-s">'+r.sub+'</div></div>'+
        '</div>';
      }).join("")+
    '</div></div></div>',

    '<div class="cp"><div class="cp-head"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/></svg>Workload top 5</h3></div>'+
    '<div class="cp-body" style="display:flex;flex-direction:column;gap:12px">'+
      topWL.map(function(m,i){
        var c=capColor(m.allocated);
        return '<div style="display:flex;align-items:center;gap:10px">'+
          '<span style="font-family:var(--font-mono);font-size:.7rem;color:var(--text-3);width:14px;text-align:right">'+(i+1)+'</span>'+
          av(m,26,8)+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+m.name.split(" ").slice(-1)[0]+'</div>'+
            '<div class="mem-bar" style="width:100%;margin-top:4px"><i style="width:'+Math.min(m.allocated,100)+'%;background:'+c+'"></i></div>'+
          '</div>'+
          '<span style="font-family:var(--font-mono);font-size:.78rem;font-weight:700;color:'+c+'">'+m.allocated+'%</span>'+
        '</div>';
      }).join("")+
    '</div></div>'
  ].join("");
}

/* ── Render ── */
function render(){
  var main="";
  if(activeView==="skills") main=renderSkills();
  else if(activeView==="members") main=renderMembers();
  else if(activeView==="timeline") main=renderTimeline();
  else if(activeView==="forecast") main=renderForecast();
  document.getElementById("cpMain").innerHTML=main;
  document.getElementById("cpSide").innerHTML=renderSide();
}

document.getElementById("cpChips").querySelectorAll(".cp-chip").forEach(function(c){
  c.addEventListener("click",function(){
    document.querySelectorAll(".cp-chip").forEach(function(x){x.classList.remove("on");});
    c.classList.add("on"); activeView=c.getAttribute("data-v"); render();
  });
});

render();
</script>
<script src="js/admin.js"></script>
