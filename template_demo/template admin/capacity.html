<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Capacity — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── Capacity page ── */

/* sprint selector */
.sprint-sel{display:inline-flex;align-items:center;gap:4px;background:var(--elev);border:1px solid var(--border);border-radius:9px;padding:3px}
.sprint-sel button{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--text-2);font-family:inherit;border:none;background:none;cursor:pointer;transition:background .15s,color .15s}
.sprint-sel button:hover{background:var(--accent-soft);color:var(--accent-ink)}
.sprint-sel .sval{padding:0 14px;font-size:.86rem;font-weight:700;color:var(--text);min-width:110px;text-align:center}

/* view toggle */
.view-seg{display:inline-flex;background:var(--elev);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px}
.view-seg button{height:30px;padding:0 13px;border-radius:7px;font-family:inherit;font-size:.82rem;font-weight:600;color:var(--text-3);background:none;border:none;cursor:pointer;transition:background .15s,color .15s;display:flex;align-items:center;gap:6px}
.view-seg button svg{width:14px;height:14px}
.view-seg button.on{background:var(--accent-soft);color:var(--accent-ink)}

/* capacity summary strip */
.cap-summary{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.cap-member-row{background:var(--elev);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:border-color .15s var(--ease),transform .15s var(--ease);position:relative}
.cap-member-row:hover{border-color:var(--border-2);transform:translateX(2px)}
.cap-member-row.expanded{border-color:var(--accent);background:color-mix(in srgb,var(--elev) 96%,var(--accent))}
.cmr-top{display:grid;grid-template-columns:200px 1fr auto auto;align-items:center;gap:16px}
@media(max-width:900px){.cmr-top{grid-template-columns:160px 1fr auto}}
.cmr-who{display:flex;align-items:center;gap:10px}
.cmr-who .av-sm{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#8b7bff,#4f7aff);display:grid;place-items:center;color:#fff;font-size:.76rem;font-weight:700}
.cmr-who .cn{font-size:.9rem;font-weight:700;color:var(--text)}
.cmr-who .cr{font-size:.74rem;color:var(--text-3);font-family:var(--font-mono)}
.cmr-bar-wrap{display:flex;flex-direction:column;gap:4px}
.cmr-bar-labels{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:.66rem;color:var(--text-3)}
.cmr-bar{height:8px;background:var(--border);border-radius:99px;overflow:visible;position:relative}
.cmr-bar-fill{height:100%;border-radius:99px;transition:width .4s var(--ease);position:relative}
.cmr-bar-fill.ok{background:linear-gradient(90deg,var(--accent),#5275e6)}
.cmr-bar-fill.warn{background:linear-gradient(90deg,var(--warn),#f59e0b)}
.cmr-bar-fill.over{background:linear-gradient(90deg,var(--danger),#f87171)}
/* capacity line marker */
.cmr-bar-cap{position:absolute;top:-3px;bottom:-3px;width:2px;background:#fff;border-radius:2px;opacity:.6;pointer-events:none}
.cmr-hrs{text-align:right;white-space:nowrap}
.cmr-hrs .ch{font-family:var(--font-mono);font-size:1rem;font-weight:800;color:var(--text)}
.cmr-hrs .cs{font-size:.72rem;color:var(--text-3);display:block}
.cmr-status{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.cmr-status.ok{background:var(--ok-soft);color:var(--ok)}
.cmr-status.warn{background:var(--warn-soft);color:var(--warn)}
.cmr-status.over{background:var(--danger-soft);color:var(--danger)}
.cmr-status.low{background:var(--border);color:var(--text-3)}

/* expanded task list */
.cmr-expand{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.cap-member-row.expanded .cmr-expand{display:block}
.cmr-tasks{display:flex;flex-direction:column;gap:6px}
.cmr-task{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--content);border-radius:9px;border:1px solid var(--border);transition:border-color .15s}
.cmr-task:hover{border-color:var(--border-2)}
.cmr-task-id{font-family:var(--font-mono);font-size:.72rem;color:var(--accent-ink);flex-shrink:0;min-width:58px}
.cmr-task-name{font-size:.84rem;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmr-task-hrs{font-family:var(--font-mono);font-size:.78rem;font-weight:700;color:var(--text-2);flex-shrink:0}
.cmr-task-prio{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* heatmap */
.heatmap-grid{display:grid;grid-template-columns:160px repeat(5,1fr);gap:4px;min-width:560px}
#viewHeatmap{overflow-x:auto}
.hm-header{display:contents}
.hm-cell-label{display:flex;align-items:center;justify-content:flex-end;padding-right:12px;font-size:.78rem;color:var(--text-3);font-family:var(--font-mono);height:44px}
.hm-day-head{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;background:var(--content);border-radius:8px;font-size:.74rem;font-family:var(--font-mono)}
.hm-day-head .dn{font-weight:700;color:var(--text-2)}
.hm-day-head .dd{font-size:.68rem;color:var(--text-3)}
.hm-day-head.today{background:var(--accent-soft);border:1px solid var(--accent-soft-2)}
.hm-day-head.today .dn{color:var(--accent-ink)}
.hm-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;height:44px;border-radius:8px;cursor:pointer;transition:transform .12s,opacity .12s;position:relative}
.hm-cell:hover{transform:scale(1.05);z-index:2}
.hm-cell .hc-val{font-family:var(--font-mono);font-size:.72rem;font-weight:700;color:#fff}
.hm-cell .hc-lbl{font-size:.6rem;color:rgba(255,255,255,.7)}
.hm-cell.off{background:var(--content);opacity:.4;cursor:default}
.hm-cell.off:hover{transform:none}
.hm-cell.low{background:rgba(74,222,128,.25)}
.hm-cell.low .hc-val{color:var(--ok)}
.hm-cell.low .hc-lbl{color:rgba(74,222,128,.7)}
.hm-cell.med{background:rgba(59,91,219,.3)}
.hm-cell.med .hc-val{color:var(--accent-ink)}
.hm-cell.med .hc-lbl{color:rgba(139,164,255,.7)}
.hm-cell.high{background:rgba(251,191,36,.25)}
.hm-cell.high .hc-val{color:var(--warn)}
.hm-cell.high .hc-lbl{color:rgba(251,191,36,.7)}
.hm-cell.over{background:rgba(255,107,107,.25)}
.hm-cell.over .hc-val{color:var(--danger)}
.hm-cell.over .hc-lbl{color:rgba(255,107,107,.7)}
.hm-member-label{display:flex;align-items:center;gap:8px;justify-content:flex-end;padding-right:12px;height:44px}
.hm-member-label .av-sm{width:22px;height:22px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#8b7bff,#4f7aff);display:grid;place-items:center;color:#fff;font-size:.58rem;font-weight:700}
.hm-member-label span{font-size:.78rem;color:var(--text-2);font-weight:500}

/* legend */
.hm-legend{display:flex;align-items:center;gap:16px;margin-top:12px;flex-wrap:wrap}
.hm-legend-item{display:flex;align-items:center;gap:6px;font-size:.76rem;color:var(--text-3)}
.hm-legend-dot{width:12px;height:12px;border-radius:3px}

/* allocation modal */
.alloc-modal{width:100%;max-width:520px;background:var(--elev);border:1px solid var(--border-2);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.6);overflow:hidden}
.alloc-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--border)}
.alloc-head .ico{width:32px;height:32px;border-radius:8px;background:var(--accent);display:grid;place-items:center;flex-shrink:0}
.alloc-head .ico svg{width:17px;height:17px;color:#fff}
.alloc-head h3{font-size:1rem;font-weight:700}
.alloc-head .x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none}
.alloc-head .x:hover{background:var(--content);color:var(--text)}
.alloc-head .x svg{width:17px;height:17px}
.alloc-body{padding:22px;display:flex;flex-direction:column;gap:14px}
.alloc-field{display:flex;flex-direction:column;gap:6px}
.alloc-field label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3)}
.alloc-field input,.alloc-field select{font-family:inherit;font-size:.9rem;color:var(--text);background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:9px 12px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.alloc-field input:focus,.alloc-field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.alloc-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border)}

/* section title */
.sec-title{font-family:var(--font-mono);font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:"";flex:1;height:1px;background:var(--border)}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--elev);border:1px solid var(--border-2);border-radius:10px;padding:12px 22px;font-size:.86rem;font-weight:500;color:var(--text);box-shadow:var(--shadow-lg);z-index:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-left:3px solid var(--ok)}
.toast.warn{border-left:3px solid var(--warn)}
.toast.err{border-left:3px solid var(--danger)}
</style>
</head>
<body>
<div class="nav-scrim" id="navScrim"></div>
<div class="app">

<!-- SIDEBAR -->
<aside class="side">
  <div class="side-brand">
    <span class="lm">j</span>
    <div><div class="bt">jobihome</div><div class="bs">Workspace · Do thi Lan</div></div>
  </div>
  <nav class="side-nav scroll" id="sideNav"></nav>
  <div class="side-foot">
    <div class="side-user">
      <span class="av">DL</span>
      <div><div class="un">Do thi Lan</div><div class="ur">Super Admin</div></div>
      <span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg></span>
    </div>

<!-- MAIN -->
<div class="main">
  <header class="topbar">
    <button class="tb-icon menu-btn" id="menuBtn" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>

    <div class="tb-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input type="text" placeholder="Tìm thành viên…"/>
      <kbd>⌘K</kbd>
    </div>
    <div class="tb-right">
      <button class="tb-icon" id="themeToggle" aria-label="Sáng/Tối">
        <span class="icon-moon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
        <span class="icon-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
      </button>
      <button class="tb-icon" aria-label="Thông báo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        <span class="dot"></span>
      </button>
    </div>
  </header>

  <main class="content scroll">
    <div class="content-inner">

      <!-- Page head -->
      <div class="page-head" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px">
        <div>
          <h1>Capacity Planning</h1>
          <p>Phân bổ nhân lực · <b id="teamUtil">—</b> utilization · <b id="freeHrs">—</b> giờ khả dụng</p>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div class="sprint-sel">
            <button id="prevSprint" title="Sprint trước"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
            <span class="sval" id="sprintLabel">Sprint 14</span>
            <button id="nextSprint" title="Sprint sau"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>

          <div class="view-seg" id="viewSeg">
            <button class="on" data-v="workload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>Workload</button>
            <button data-v="heatmap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>Heatmap</button>
          </div>
          <button class="abtn primary" id="addAllocBtn" style="gap:7px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>
            Phân công

      <!-- KPIs -->
      <div class="kpis" id="kpiRow"></div>

      <!-- Content -->
      <div id="viewWorkload">
        <div class="sec-title">Phân bổ theo thành viên</div>
        <div class="cap-summary" id="capSummary"></div>
      </div>

      <div id="viewHeatmap" style="display:none">
        <div class="sec-title">Workload heatmap · Tuần 09–15/06/2026</div>
        <div class="heatmap-grid" id="heatmapGrid"></div>
        <div class="hm-legend">
          <span class="hm-legend-item"><span class="hm-legend-dot" style="background:var(--content);border:1px solid var(--border)"></span>Nghỉ / Chưa có task</span>
          <span class="hm-legend-item"><span class="hm-legend-dot" style="background:rgba(74,222,128,.35)"></span>&lt; 4h (Nhẹ)</span>
          <span class="hm-legend-item"><span class="hm-legend-dot" style="background:rgba(59,91,219,.4)"></span>4–6h (Bình thường)</span>
          <span class="hm-legend-item"><span class="hm-legend-dot" style="background:rgba(251,191,36,.35)"></span>6–8h (Cao)</span>
          <span class="hm-legend-item"><span class="hm-legend-dot" style="background:rgba(255,107,107,.35)"></span>&gt; 8h (Quá tải)</span>
        </div>
      </div>

    </div>
  </main>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";

/* ── DATA ── */
var SPRINTS = ["Sprint 12","Sprint 13","Sprint 14","Sprint 15"];
var curSprint = 2; /* index into SPRINTS */

var MEMBERS = [
  {v:"MA",l:"Minh Anh",role:"Frontend Lead",dept:"Frontend",cap:40},
  {v:"HG",l:"Hoàng",role:"Backend Dev",dept:"Backend",cap:40},
  {v:"LN",l:"Lan",role:"UI/UX Designer",dept:"Design",cap:32},
  {v:"TU",l:"Tú",role:"Backend Dev",dept:"Backend",cap:40},
  {v:"DL",l:"Do thi Lan",role:"GM / Super Admin",dept:"GM",cap:20}
];
var PRIO_C = {hi:"var(--danger)",md:"var(--warn)",lo:"var(--ok)"};

var ALLOCATIONS = {
  "MA":[
    {taskId:"JH-242",title:"Dashboard KPI cards + biểu đồ",prio:"md",estHrs:6},
    {taskId:"JH-250",title:"Audit log UI — bộ lọc",prio:"md",estHrs:4},
    {taskId:"JH-219",title:"Review PR #284 — auth",prio:"md",estHrs:1},
    {taskId:"JH-241",title:"Review onboarding design",prio:"lo",estHrs:2},
    {taskId:"MTG-01",title:"Sprint planning meeting",prio:"lo",estHrs:2},
    {taskId:"MTG-02",title:"Daily standups (×5)",prio:"lo",estHrs:2.5}
  ],
  "HG":[
    {taskId:"JH-233",title:"API endpoint chấm công",prio:"hi",estHrs:8},
    {taskId:"JH-253",title:"Tích hợp Slack notification",prio:"lo",estHrs:3},
    {taskId:"JH-226",title:"Viết test salary module",prio:"lo",estHrs:2},
    {taskId:"MTG-01",title:"Sprint planning meeting",prio:"lo",estHrs:2},
    {taskId:"MTG-02",title:"Daily standups (×5)",prio:"lo",estHrs:2.5}
  ],
  "LN":[
    {taskId:"JH-241",title:"Thiết kế onboarding flow",prio:"md",estHrs:10},
    {taskId:"JH-245",title:"Review API docs structure",prio:"lo",estHrs:2},
    {taskId:"MTG-01",title:"Sprint planning meeting",prio:"lo",estHrs:2},
    {taskId:"MTG-02",title:"Daily standups (×5)",prio:"lo",estHrs:2.5}
  ],
  "TU":[
    {taskId:"JH-238",title:"Migrate Prisma schema",prio:"hi",estHrs:10},
    {taskId:"JH-245",title:"Viết tài liệu API webhook",prio:"lo",estHrs:3},
    {taskId:"JH-224",title:"Setup CI/CD Vercel",prio:"md",estHrs:3},
    {taskId:"JH-236",title:"Clerk auth + tenant context",prio:"hi",estHrs:6},
    {taskId:"MTG-01",title:"Sprint planning meeting",prio:"lo",estHrs:2},
    {taskId:"MTG-02",title:"Daily standups (×5)",prio:"lo",estHrs:2.5}
  ],
  "DL":[
    {taskId:"REV-01",title:"Task reviews (×6)",prio:"md",estHrs:4},
    {taskId:"REV-02",title:"1-on-1 meetings (×4)",prio:"lo",estHrs:4},
    {taskId:"MTG-01",title:"Sprint planning meeting",prio:"lo",estHrs:2},
    {taskId:"MTG-02",title:"Daily standups (×5)",prio:"lo",estHrs:2.5}
  ]
};

/* heatmap data: member → day (Mon-Fri) → logged hours */
var HEATMAP = {
  "MA":{"Mon":7.5,"Tue":8.0,"Wed":6.0,"Thu":8.5,"Fri":7.5},
  "HG":{"Mon":9.5,"Tue":8.5,"Wed":10.0,"Thu":8.0,"Fri":6.5},
  "LN":{"Mon":6.5,"Tue":7.0,"Wed":6.5,"Thu":6.0,"Fri":5.5},
  "TU":{"Mon":8.5,"Tue":9.5,"Wed":9.0,"Thu":9.5,"Fri":8.0},
  "DL":{"Mon":4.5,"Tue":5.0,"Wed":4.0,"Thu":5.5,"Fri":4.0}
};
var DAYS = [{k:"Mon",l:"T2",d:"09/06"},{k:"Tue",l:"T3",d:"10/06"},{k:"Wed",l:"T4",d:"11/06"},{k:"Thu",l:"T5",d:"12/06"},{k:"Fri",l:"T6",d:"13/06"}];
/* Today is Mon Jun 15 — so the heatmap shows LAST week */

var expanded = {};

/* ── UTILS ── */
function allocated(v){
  return (ALLOCATIONS[v]||[]).reduce(function(a,t){return a+t.estHrs;},0);
}
function utilPct(v){
  var m=MEMBERS.find(function(x){return x.v===v;});
  return m?Math.round(allocated(v)/m.cap*100):0;
}
function statusOf(pct){
  if(pct>100)return "over";
  if(pct>=85)return "warn";
  if(pct<40)return "low";
  return "ok";
}
function statusLabel(s){return {ok:"Cân bằng",warn:"Gần đầy",over:"Quá tải",low:"Còn trống"}[s]||s;}
function heatClass(hrs){
  if(!hrs||hrs===0)return "off";
  if(hrs<4)return "low";
  if(hrs<6)return "med";
  if(hrs<8)return "high";
  return "over";
}

/* ── KPI CARDS ── */
function renderKPIs(){
  var totalCap=MEMBERS.reduce(function(a,m){return a+m.cap;},0);
  var totalAlloc=MEMBERS.reduce(function(a,m){return a+allocated(m.v);},0);
  var avgUtil=Math.round(totalAlloc/totalCap*100);
  var overloaded=MEMBERS.filter(function(m){return utilPct(m.v)>100;}).length;
  var freePct=100-avgUtil;
  var freeHrs=totalCap-totalAlloc;

  document.getElementById("teamUtil").textContent=avgUtil+"%";
  document.getElementById("freeHrs").textContent=Math.max(0,Math.round(freeHrs))+"h";

  var cards=[
    {ico:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2" stroke-linecap="round" stroke-linejoin="round"/>',
     lab:"Tổng capacity",val:totalCap+"h",chg:MEMBERS.length+" thành viên",cls:"flat"},
    {ico:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/>',
     lab:"Đã phân bổ",val:Math.round(totalAlloc)+"h",chg:avgUtil+"% utilization",cls:avgUtil>90?"warn":"up"},
    {ico:'<path d="M10.3 3.9l-7 12A2 2 0 0 0 5 19h14a2 2 0 0 0 1.7-3l-7-12a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01" stroke-linecap="round"/>',
     lab:"Quá tải",val:overloaded,chg:overloaded?"cần điều chỉnh":"Tốt",cls:overloaded>0?"warn":"flat"},
    {ico:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
     lab:"Còn trống",val:Math.max(0,Math.round(freeHrs))+"h",chg:freePct+"% chưa dùng",cls:"flat"}
  ];
  document.getElementById("kpiRow").innerHTML=cards.map(function(k){
    return '<div class="kpi"><div class="kt"><span class="ki"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+k.ico+'</svg></span>'+k.lab+'</div><div class="kv">'+k.val+'</div><div class="kc '+k.cls+'">'+k.chg+'</div></div>';
  }).join("");
}

/* ── WORKLOAD VIEW ── */
function renderWorkload(){
  document.getElementById("capSummary").innerHTML=MEMBERS.map(function(m){
    var alloc=allocated(m.v);
    var pct=utilPct(m.v);
    var status=statusOf(pct);
    var barW=Math.min(pct,120); /* can overflow for visual */
    var capW=Math.round(100/Math.max(pct/100,1)*100)/100;
    var tasks=ALLOCATIONS[m.v]||[];
    var taskRows=tasks.map(function(t){
      return '<div class="cmr-task">'+
        '<span class="cmr-task-prio" style="background:'+PRIO_C[t.prio||"lo"]+'"></span>'+
        '<span class="cmr-task-id">'+t.taskId+'</span>'+
        '<span class="cmr-task-name">'+t.title+'</span>'+
        '<span class="cmr-task-hrs">'+t.estHrs+'h</span>'+
        '<button class="tl-act-btn del" data-who="'+m.v+'" data-tid="'+t.taskId+'" title="Bỏ phân công" style="opacity:.6;flex-shrink:0">'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>'+
        '</button>'+
      '</div>';
    }).join("");

    return '<div class="cap-member-row'+(expanded[m.v]?" expanded":"")+'" data-who="'+m.v+'">'+
      '<div class="cmr-top">'+
        '<div class="cmr-who">'+
          '<span class="av-sm">'+m.v+'</span>'+
          '<div><div class="cn">'+m.l+'</div><div class="cr">'+m.role+'</div></div>'+
        '</div>'+
        '<div class="cmr-bar-wrap">'+
          '<div class="cmr-bar-labels">'+
            '<span>'+Math.round(alloc)+'h / '+m.cap+'h</span>'+
            '<span style="color:'+(status==="over"?"var(--danger)":status==="warn"?"var(--warn)":"var(--text-3)")+'">'+pct+'%</span>'+
          '</div>'+
          '<div class="cmr-bar">'+
            '<div class="cmr-bar-fill '+status+'" style="width:'+Math.min(barW,100)+'%"></div>'+
            (pct>100?'<div class="cmr-bar-cap" style="left:'+Math.round(100/pct*100)+'%"></div>':'')+
          '</div>'+
        '</div>'+
        '<div class="cmr-hrs"><span class="ch">'+Math.max(0,Math.round(m.cap-alloc))+'h</span><span class="cs">còn trống</span></div>'+
        '<span class="cmr-status '+status+'">'+statusLabel(status)+'</span>'+
      '</div>'+
      '<div class="cmr-expand">'+
        '<div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:8px">'+tasks.length+' task được phân công · '+Math.round(alloc)+'h est</div>'+
        '<div class="cmr-tasks">'+taskRows+'</div>'+
        '<button class="abtn ghost" style="margin-top:10px;height:32px;font-size:.8rem;gap:7px" data-add-who="'+m.v+'">'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="13" height="13"><path d="M12 5v14M5 12h14"/></svg>'+
          'Thêm task cho '+m.l+
        '</button>'+
      '</div>'+
    '</div>';
  }).join("");
}

/* ── HEATMAP VIEW ── */
function renderHeatmap(){
  var grid=document.getElementById("heatmapGrid");
  /* header row */
  var html='<div></div>'+DAYS.map(function(d){
    return '<div class="hm-day-head'+(d.k==="Mon"?" today":"")+'"><span class="dn">'+d.l+'</span><span class="dd">'+d.d+'</span></div>';
  }).join("");
  /* member rows */
  MEMBERS.forEach(function(m){
    html+='<div class="hm-member-label"><span class="av-sm">'+m.v+'</span><span>'+m.l+'</span></div>';
    DAYS.forEach(function(d){
      var hrs=HEATMAP[m.v]?HEATMAP[m.v][d.k]||0:0;
      var cls=heatClass(hrs);
      html+='<div class="hm-cell '+cls+'" title="'+m.l+' · '+d.l+' '+d.d+' · '+hrs+'h">'+
        (hrs>0?'<span class="hc-val">'+hrs+'h</span><span class="hc-lbl">'+d.l+'</span>':'')+
      '</div>';
    });
  });
  grid.innerHTML=html;
}

/* ── ALLOCATION MODAL ── */
function openAllocModal(who){
  if(document.getElementById("allocModal"))return;
  var back=document.createElement("div");back.className="modal-back";back.id="allocModal";
  var memberOpts=MEMBERS.map(function(m){
    return '<option value="'+m.v+'"'+(who===m.v?" selected":"")+'>'+m.l+' ('+m.cap+'h cap)</option>';
  }).join("");
  back.innerHTML='<div class="alloc-modal">'+
    '<div class="alloc-head">'+
      '<div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></div>'+
      '<h3>Phân công task</h3>'+
      '<button class="x" id="allocClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>'+
    '</div>'+
    '<div class="alloc-body">'+
      '<div class="alloc-field"><label>Thành viên *</label><select id="allocWho">'+memberOpts+'</select></div>'+
      '<div class="alloc-field"><label>Task ID *</label><input type="text" id="allocTaskId" placeholder="vd. JH-255"/></div>'+
      '<div class="alloc-field"><label>Tên task *</label><input type="text" id="allocTaskName" placeholder="Mô tả ngắn gọn…"/></div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
        '<div class="alloc-field"><label>Ước tính (giờ) *</label><input type="number" id="allocHrs" min="0.5" step="0.5" placeholder="vd. 4" value="4"/></div>'+
        '<div class="alloc-field"><label>Ưu tiên</label><select id="allocPrio"><option value="hi">Cao</option><option value="md" selected>Vừa</option><option value="lo">Thấp</option></select></div>'+
      '</div>'+
    '</div>'+
    '<div class="alloc-foot">'+
      '<button class="abtn ghost" id="allocCancel">Hủy</button>'+
      '<button class="abtn primary" id="allocSave">Phân công</button>'+
    '</div>'+
  '</div>';
  document.body.appendChild(back);

  function close(){var m=document.getElementById("allocModal");if(m)m.remove();}
  back.addEventListener("click",function(e){if(e.target===back)close();});
  document.getElementById("allocClose").addEventListener("click",close);
  document.getElementById("allocCancel").addEventListener("click",close);
  document.getElementById("allocSave").addEventListener("click",function(){
    var w=document.getElementById("allocWho").value;
    var tid=document.getElementById("allocTaskId").value.trim().toUpperCase();
    var tname=document.getElementById("allocTaskName").value.trim();
    var hrs=parseFloat(document.getElementById("allocHrs").value)||0;
    var prio=document.getElementById("allocPrio").value;
    if(!tid||!tname||!hrs){showToast("Vui lòng điền đầy đủ *","err");return;}
    if(!ALLOCATIONS[w])ALLOCATIONS[w]=[];
    ALLOCATIONS[w].push({taskId:tid,title:tname,prio:prio,estHrs:hrs});
    if(!expanded[w])expanded[w]=true;
    close();renderAll();showToast("Đã phân công "+tid+" cho "+MEMBERS.find(function(m){return m.v===w;}).l+" ✓","ok");
  });
}

/* ── EVENTS ── */
document.getElementById("prevSprint").addEventListener("click",function(){
  if(curSprint>0){curSprint--;document.getElementById("sprintLabel").textContent=SPRINTS[curSprint];showToast("Đang xem "+SPRINTS[curSprint],"warn");}
});
document.getElementById("nextSprint").addEventListener("click",function(){
  if(curSprint<SPRINTS.length-1){curSprint++;document.getElementById("sprintLabel").textContent=SPRINTS[curSprint];showToast("Đang xem "+SPRINTS[curSprint],"warn");}
  else showToast("Chưa có dữ liệu Sprint 15","warn");
});

document.getElementById("viewSeg").addEventListener("click",function(e){
  var b=e.target.closest("button[data-v]");if(!b)return;
  var v=b.dataset.v;
  document.querySelectorAll("#viewSeg button").forEach(function(x){x.classList.remove("on");});
  b.classList.add("on");
  document.getElementById("viewWorkload").style.display=v==="workload"?"block":"none";
  document.getElementById("viewHeatmap").style.display=v==="heatmap"?"block":"none";
});

document.getElementById("addAllocBtn").addEventListener("click",function(){openAllocModal("");});

document.getElementById("capSummary").addEventListener("click",function(e){
  /* remove allocation */
  var delBtn=e.target.closest(".tl-act-btn.del[data-who]");
  if(delBtn){
    e.stopPropagation();
    var who=delBtn.dataset.who,tid=delBtn.dataset.tid;
    var arr=ALLOCATIONS[who]||[];
    var idx=arr.findIndex(function(x){return x.taskId===tid;});
    if(idx!==-1){arr.splice(idx,1);renderAll();showToast("Đã bỏ phân công "+tid,"ok");}
    return;
  }
  /* add task for member */
  var addBtn=e.target.closest("[data-add-who]");
  if(addBtn){e.stopPropagation();openAllocModal(addBtn.dataset.addWho);return;}
  /* expand row — accordion: chỉ mở 1 lúc */
  var row=e.target.closest(".cap-member-row[data-who]");
  if(row&&!e.target.closest("button")){
    var who=row.dataset.who;
    var isOpen=expanded[who];
    /* đóng tất cả */
    Object.keys(expanded).forEach(function(k){expanded[k]=false;});
    /* toggle: nếu chưa mở thì mở, nếu đang mở thì đóng */
    expanded[who]=!isOpen;
    renderWorkload();
  }
});

/* ── TOAST ── */
function showToast(msg,type){
  var t=document.getElementById("toast");
  t.textContent=msg;t.className="toast "+(type||"ok");
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2800);
}

/* ── RENDER ALL ── */
function renderAll(){renderKPIs();renderWorkload();renderHeatmap();}

/* ── INIT ── */
renderAll();
/* expand TU by default to show overloaded */
expanded["TU"]=true;
renderWorkload();

})();
</script>
<script src="js/admin.js"></script>
</body>
