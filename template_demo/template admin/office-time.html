<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Office Time — jobihome.vn</title>
<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="css/app.css"/>
<style>
/* ── Office Time page ── */
.ot-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:22px}
.month-nav{display:inline-flex;align-items:center;gap:4px;background:var(--elev);border:1px solid var(--border);border-radius:9px;padding:3px}
.month-nav button{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--text-2);font-family:inherit;border:none;background:none;cursor:pointer;transition:background .15s,color .15s}
.month-nav button:hover{background:var(--accent-soft);color:var(--accent-ink)}
.month-nav .month-label{padding:0 14px;font-size:.85rem;font-weight:700;color:var(--text);white-space:nowrap;min-width:120px;text-align:center}
.mf-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mf-chip{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--elev);font-size:0.8rem;font-weight:500;color:var(--text-2);transition:border-color .15s,background .15s,color .15s;cursor:pointer;font-family:inherit}
.mf-chip:hover{border-color:var(--border-2);color:var(--text)}
.mf-chip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
.mf-av{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#8b7bff,#4f7aff);display:grid;place-items:center;color:#fff;font-size:.58rem;font-weight:700;flex-shrink:0}

/* status chips */
.ot-status{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:.7rem;font-weight:600;padding:4px 10px;border-radius:99px;white-space:nowrap}
.ot-status.approved{background:var(--ok-soft);color:var(--ok)}
.ot-status.pending{background:var(--warn-soft);color:var(--warn)}
.ot-status.rejected{background:var(--danger-soft);color:var(--danger)}
.ot-status.draft{background:var(--border);color:var(--text-3)}
.ot-status.working{background:rgba(59,91,219,.13);color:var(--accent-ink);animation:wpulse 2s ease-in-out infinite}
@keyframes wpulse{0%,100%{opacity:1}50%{opacity:.65}}
.ot-late{font-family:var(--font-mono);font-size:.64rem;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--danger-soft);color:var(--danger)}

/* main table */
.ot-table-wrap{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow-x:auto}
.ot-table{width:100%;border-collapse:collapse;min-width:760px}
.ot-table th{text-align:left;padding:10px 16px;font-family:var(--font-mono);font-size:.67rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:600;background:var(--content);border-bottom:1px solid var(--border);white-space:nowrap}
.ot-table td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
.ot-table tbody tr:last-child td{border-bottom:none}
.ot-table tbody tr:hover{background:var(--content);cursor:pointer}
.ot-table tbody tr{transition:background .12s}
.ot-time{font-family:var(--font-mono);font-size:.84rem;color:var(--text-2)}
.ot-time.missing{color:var(--border-2);font-style:italic}
.ot-hours{font-family:var(--font-mono);font-size:.86rem;font-weight:700;color:var(--text)}
.ot-hours.low{color:var(--warn)}

/* action buttons inline */
.ot-btns{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
.ot-btn{height:28px;padding:0 10px;border-radius:7px;font-size:.76rem;font-weight:600;white-space:nowrap;cursor:pointer;font-family:inherit;transition:background .15s,transform .12s,color .15s;border:none}
.ot-btn.approve{background:var(--ok-soft);color:var(--ok);border:1px solid rgba(74,222,128,.25)}
.ot-btn.approve:hover{background:rgba(74,222,128,.22);transform:translateY(-1px)}
.ot-btn.reject{background:var(--danger-soft);color:var(--danger);border:1px solid rgba(255,107,107,.2)}
.ot-btn.reject:hover{background:rgba(255,107,107,.2);transform:translateY(-1px)}
.ot-btn.view{background:var(--accent-soft);color:var(--accent-ink);border:1px solid rgba(59,91,219,.2)}
.ot-btn.view:hover{background:var(--accent-soft-2);transform:translateY(-1px)}
.ot-btn.submit{background:var(--border);color:var(--text-2);border:1px solid var(--border-2)}
.ot-btn.submit:hover{border-color:var(--accent);color:var(--accent-ink)}

/* detail drawer */
.od-back{position:fixed;inset:0;background:rgba(4,8,18,.55);backdrop-filter:blur(3px);z-index:100;opacity:0;transition:opacity .22s;pointer-events:none}
.od-back.open{opacity:1;pointer-events:auto}
.od-drawer{position:fixed;top:0;right:0;height:100vh;width:520px;max-width:94vw;background:var(--elev);border-left:1px solid var(--border-2);box-shadow:-30px 0 60px rgba(0,0,0,.4);z-index:101;transform:translateX(100%);transition:transform .28s var(--ease);display:flex;flex-direction:column;overflow:hidden}
.od-drawer.open{transform:translateX(0)}
.od-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.od-head .od-type{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.od-head .od-type svg{width:15px;height:15px;color:#fff}
.od-head h3{font-size:1.02rem;font-weight:700;min-width:0}
.od-close{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none;flex-shrink:0}
.od-close:hover{background:var(--content);color:var(--text)}
.od-close svg{width:17px;height:17px}
.od-body{flex:1;overflow-y:auto;padding:22px}

/* detail sections */
.od-sec{font-family:var(--font-mono);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px}
.od-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.od-row:last-child{border-bottom:none}
.od-row .orl{font-size:.78rem;color:var(--text-3);min-width:110px;flex-shrink:0}
.od-row .orv{font-size:.88rem;color:var(--text);display:flex;align-items:center;gap:8px;flex:1;font-weight:500}
.od-meta{background:var(--content);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px}

/* time log list in drawer */
.od-logs{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.od-log-item{background:var(--content);border:1px solid var(--border);border-radius:10px;padding:12px 14px;transition:border-color .15s}
.od-log-item:hover{border-color:var(--border-2)}
.od-log-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.od-log-id{font-family:var(--font-mono);font-size:.72rem;color:var(--accent-ink)}
.od-log-title{font-size:.86rem;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.od-log-dur{font-family:var(--font-mono);font-size:.8rem;font-weight:700;color:var(--text);flex-shrink:0}
.od-log-time{font-size:.78rem;color:var(--text-3);font-family:var(--font-mono)}
.od-log-note{font-size:.8rem;color:var(--text-2);margin-top:4px;line-height:1.45}

/* approve/reject modal */
.ar-modal{width:100%;max-width:420px;background:var(--elev);border:1px solid var(--border-2);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.6);overflow:hidden}
.ar-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--border)}
.ar-ico{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;flex-shrink:0}
.ar-ico svg{width:17px;height:17px}
.ar-head h3{font-size:1rem;font-weight:700}
.ar-head .x{margin-left:auto;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;font-family:inherit;border:none;background:none}
.ar-head .x:hover{background:var(--content);color:var(--text)}
.ar-head .x svg{width:17px;height:17px}
.ar-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.ar-info{background:var(--content);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px}
.ar-field{display:flex;flex-direction:column;gap:5px}
.ar-field label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3)}
.ar-field textarea{font-family:inherit;font-size:.9rem;color:var(--text);background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:9px 12px;outline:none;transition:border-color .15s,box-shadow .15s;resize:vertical;min-height:80px;width:100%}
.ar-field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.ar-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border)}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--elev);border:1px solid var(--border-2);border-radius:10px;padding:12px 22px;font-size:.86rem;font-weight:500;color:var(--text);box-shadow:var(--shadow-lg);z-index:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-left:3px solid var(--ok)}
.toast.err{border-left:3px solid var(--danger)}
.toast.warn{border-left:3px solid var(--warn)}

/* calendar mini strip */
.cal-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.cal-day{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:9px;cursor:pointer;transition:background .15s;border:1px solid transparent}
.cal-day:hover{background:var(--elev)}
.cal-day.today{background:var(--accent-soft);border-color:var(--accent)}
.cal-day .cd-num{font-size:.82rem;font-weight:700;color:var(--text)}
.cal-day .cd-lbl{font-family:var(--font-mono);font-size:.62rem;color:var(--text-3)}
.cal-day .cd-dots{display:flex;gap:2px;justify-content:center}
.cal-day .cd-dot{width:5px;height:5px;border-radius:50%}
</style>
</head>

/* ── STATE ── */
var selMember="ALL", selStatus="all", currentMonth="2026-06";

/* ── UTILS ── */
function fmtMins(m){
  if(!m&&m!==0) return "—";
  var h=Math.floor(m/60),min=m%60;
  return h+"h"+(min?" "+min+"ph":"");
}
function memberName(v){var m=MEMBERS.find(function(x){return x.v===v;});return m?m.l:v;}
function viDate(d){var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function dayOfWeek(d){var days=["CN","T2","T3","T4","T5","T6","T7"];return days[new Date(d).getDay()];}

function filtered(){
  return RECORDS.filter(function(r){
    if(!r.date.startsWith(currentMonth)) return false;
    if(selMember!=="ALL"&&r.who!==selMember) return false;
    if(selStatus==="pending"&&r.status!=="pending") return false;
    if(selStatus==="approved"&&r.status!=="approved") return false;
    return true;
  });
}

/* ── KPI CARDS ── */
function renderKPIs(){
  var month=RECORDS.filter(function(r){return r.date.startsWith("2026-06");});
  var approved=month.filter(function(r){return r.status==="approved";});
  var pending=month.filter(function(r){return r.status==="pending";});
  var late=month.filter(function(r){return r.late;});
  var totalMins=approved.reduce(function(a,r){return a+(r.workMins||0);},0);
  var avgMins=approved.length?Math.round(totalMins/approved.length):0;
  var onTimeRate=approved.length?Math.round((approved.filter(function(r){return !r.late;}).length/approved.length)*100):0;
  
  document.getElementById("pendingCount").textContent=pending.length;
  
  var cards=[
    {ico:'<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke-linecap="round"/>',
     lab:"Ngày đi làm",val:approved.length,chg:"tháng 6/2026",cls:"flat"},
    {ico:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
     lab:"Đúng giờ",val:onTimeRate+"%",chg:approved.filter(function(r){return !r.late;}).length+" / "+approved.length+" ngày",cls:"up"},
    {ico:'<path d="M10.3 3.9l-7 12A2 2 0 0 0 5 19h14a2 2 0 0 0 1.7-3l-7-12a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01" stroke-linecap="round"/>',
     lab:"Đi trễ",val:late.length,chg:"lần trong tháng",cls:late.length>0?"warn":"flat"},
    {ico:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2" stroke-linecap="round" stroke-linejoin="round"/>',
     lab:"TB giờ / ngày",val:fmtMins(avgMins),chg:"mỗi thành viên",cls:"flat"}
  ];
  document.getElementById("kpiRow").innerHTML=cards.map(function(k){
    return '<div class="kpi"><div class="kt"><span class="ki"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+k.ico+'</svg></span>'+k.lab+'</div><div class="kv">'+k.val+'</div><div class="kc '+k.cls+'">'+k.chg+'</div></div>';
  }).join("");
}

/* ── MEMBER CHIPS ── */
function renderMemberFilter(){
  var opts=[{v:"ALL",l:"Tất cả"}].concat(MEMBERS);
  document.getElementById("memberFilter").innerHTML=opts.map(function(m){

/* status label */
function statusChip(s){
  var map={approved:"✓ Đã duyệt",pending:"● Chờ duyệt",rejected:"✗ Từ chối",draft:"— Nháp",working:"▶ Đang làm"};
  return '<span class="ot-status '+s+'">'+(map[s]||s)+'</span>';
}

/* ── RENDER TABLE ── */
function renderTable(){
  var rows=filtered().sort(function(a,b){
    var dc=b.date.localeCompare(a.date);
    if(dc!==0)return dc;
    return memberName(a.who).localeCompare(memberName(b.who));
  });

  if(!rows.length){
    document.getElementById("otTableBody").innerHTML='<tr><td colspan="8" style="text-align:center;padding:48px 20px;color:var(--text-3)">Không có dữ liệu cho bộ lọc này.</td></tr>';
    return;
  }

  document.getElementById("otTableBody").innerHTML=rows.map(function(r){
    var isToday=r.date==="2026-06-15";
    var checkoutCell=r.checkOut
      ?'<span class="ot-time">'+r.checkOut+'</span>'
      :r.status==="working"
        ?'<span class="ot-time" style="color:var(--ok);font-weight:600;animation:wpulse 1.5s infinite">▶ đang làm</span>'
        :'<span class="ot-time missing">—</span>';

    var workCell=r.workMins
      ?'<span class="ot-hours'+(r.workMins<360?" low":"")+'">'+fmtMins(r.workMins)+'</span>'
      :'<span class="ot-hours" style="color:var(--text-3)">—</span>';

    var lateCell=r.late
      ?'<span class="ot-late">+'+r.lateMin+'ph</span>'
      :'<span style="color:var(--text-3);font-family:var(--font-mono);font-size:.72rem">—</span>';

    var btns="";
    if(r.status==="pending"){
      btns='<div class="ot-btns">'+
        '<button class="ot-btn approve" data-id="'+r.id+'" data-action="approve">✓ Duyệt</button>'+
        '<button class="ot-btn reject" data-id="'+r.id+'" data-action="reject">✗ Từ chối</button>'+
      '</div>';
    } else if(r.status==="approved"){
      btns='<button class="ot-btn view" data-id="'+r.id+'" data-action="view">Xem chi tiết</button>';
    } else if(r.status==="draft"){
      btns='<button class="ot-btn submit" data-id="'+r.id+'" data-action="submit">Nộp duyệt</button>';
    } else if(r.status==="working"){
      btns='<button class="ot-btn view" data-id="'+r.id+'" data-action="view">Xem log</button>';
    } else {
      btns='<button class="ot-btn view" data-id="'+r.id+'" data-action="view">Xem chi tiết</button>';
    }

    return '<tr data-id="'+r.id+'" style="'+(isToday&&r.status==="pending"?'background:rgba(59,91,219,.04)':'')+'" class="'+(isToday?"today-row":"")+'">'+
      '<td><div style="display:flex;align-items:center;gap:9px">'+
        '<span class="av-sm" style="width:28px;height:28px;font-size:.7rem">'+r.who+'</span>'+
        '<div><div style="font-size:.87rem;font-weight:600;color:var(--text)">'+memberName(r.who)+'</div>'+
          '<div style="font-size:.72rem;color:var(--text-3);font-family:var(--font-mono)">'+(MEMBERS.find(function(m){return m.v===r.who;})||{dept:""}).dept+'</div>'+
        '</div>'+
      '</div></td>'+
      '<td><div style="display:flex;flex-direction:column;gap:2px">'+
        '<span style="font-size:.86rem;font-weight:600;color:var(--text)">'+viDate(r.date)+'</span>'+
        '<span style="font-size:.72rem;color:var(--text-3);font-family:var(--font-mono)">'+dayOfWeek(r.date)+(isToday?" · Hôm nay":"")+'</span>'+
      '</div></td>'+
      '<td><span class="ot-time">'+r.checkIn+'</span></td>'+
      '<td>'+checkoutCell+'</td>'+
      '<td>'+workCell+'</td>'+
      '<td>'+lateCell+'</td>'+
      '<td>'+statusChip(r.status)+'</td>'+

    '</tr>';
  }).join("");
}

    } else {
      RECORDS.unshift({id:"OT-"+(nextId++),who:who,date:date,checkIn:ci,checkOut:co||null,workMins:workMins,status:"draft",note:note,late:late,lateMin:lateMin||0});
      showToast("Đã tạo bản ghi ✓","ok");
    }
    close();renderTable();renderKPIs();
  });
}

/* ── EVENTS ── */
document.getElementById("otTableBody").addEventListener("click",function(e){
  /* approve/reject buttons */
  var ab=e.target.closest("[data-action]");
  if(ab){
    e.stopPropagation();
    var id=ab.dataset.id, action=ab.dataset.action;
    if(action==="approve"||action==="reject") openActionModal(id,action);
    else if(action==="view"||action==="submit") openDrawer(id);
    return;
  }
  /* row click → drawer */
  var row=e.target.closest("tr[data-id]");
  if(row) openDrawer(row.dataset.id);
});

document.getElementById("odBody").addEventListener("click",function(e){
  var ab=e.target.closest("[data-drawer-approve]");
  if(ab){openActionModal(ab.dataset.drawerApprove,"approve");return;}
  var rb=e.target.closest("[data-drawer-reject]");
  if(rb){openActionModal(rb.dataset.drawerReject,"reject");return;}
});

document.getElementById("odBack").addEventListener("click",closeDrawer);
document.getElementById("odClose").addEventListener("click",closeDrawer);

document.getElementById("memberFilter").addEventListener("click",function(e){
  var c=e.target.closest(".mf-chip");if(!c)return;
  selMember=c.dataset.m;renderMemberFilter();renderTable();
});

document.getElementById("statusSeg").addEventListener("click",function(e){
  var b=e.target.closest("button[data-status]");if(!b)return;
  selStatus=b.dataset.status;
  document.querySelectorAll("#statusSeg button").forEach(function(x){
    x.classList.remove("on");x.style.background="";x.style.color="var(--text-3)";
  });
  b.classList.add("on");b.style.background="var(--accent-soft)";b.style.color="var(--accent-ink)";
  renderTable();
});

document.getElementById("prevMonth").addEventListener("click",function(){
  /* for demo just show a toast */
  showToast("Đã hiển thị tháng 5/2026 (demo)","warn");
});
document.getElementById("nextMonth").addEventListener("click",function(){
  showToast("Chưa có dữ liệu tháng 7/2026","warn");
});

document.getElementById("addRecordBtn").addEventListener("click",function(){openCreateModal(null);});
document.getElementById("exportBtn").addEventListener("click",function(){showToast("Đang xuất file Excel…","ok");});

/* ── TOAST ── */
function showToast(msg,type){
  var t=document.getElementById("toast");
  t.textContent=msg;t.className="toast "+(type||"ok");
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2800);
}

/* ── INIT ── */
renderKPIs();
renderMemberFilter();
renderTable();

})();
</script>
<script src="js/admin.js"></script>
</body>
</html>
