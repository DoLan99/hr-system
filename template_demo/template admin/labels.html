<script>(function(){var t=localStorage.getItem('jh-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>

<style>
/* ── System Labels ── */
.sl-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sl-stat{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:12px}
.sl-stat .si{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.sl-stat .si svg{width:18px;height:18px}
.sl-stat .sv{font-size:1.5rem;font-weight:800;letter-spacing:-.02em}
.sl-stat .sl{font-size:0.78rem;color:var(--text-3);margin-top:1px}

/* module tabs */
.mod-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.mod-tab{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 14px;border-radius:100px;font-size:0.83rem;font-weight:500;color:var(--text-2);background:var(--elev);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.mod-tab:hover{border-color:var(--accent);color:var(--accent-ink)}
.mod-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.mod-tab .mc{font-family:var(--font-mono);font-size:0.7rem;background:rgba(255,255,255,.18);border-radius:99px;padding:1px 7px}
.mod-tab:not(.on) .mc{background:var(--content);border:1px solid var(--border);color:var(--text-3)}

/* label groups */
.lb-group{background:var(--elev);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px}
.lb-group-head{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:background .12s}
.lb-group-head:hover{background:var(--content)}
.lb-group-head .gh-ico{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.lb-group-head .gh-ico svg{width:14px;height:14px}
.lb-group-head .gh-name{font-weight:700;font-size:0.9rem}
.lb-group-head .gh-ct{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-3);background:var(--content);border:1px solid var(--border);border-radius:99px;padding:2px 8px}
.lb-group-head .gh-chev{margin-left:auto;color:var(--text-3);transition:transform .18s}
.lb-group-head .gh-chev svg{width:15px;height:15px}
.lb-group.collapsed .gh-chev{transform:rotate(-90deg)}
.lb-group.collapsed .lb-grid{display:none}
.lb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;padding:14px}

/* label card */
.lb-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--content);border:1px solid var(--border);border-radius:10px;transition:border-color .15s,transform .15s;cursor:pointer;position:relative;group}
.lb-card:hover{border-color:var(--border-2);transform:translateY(-1px)}
.lb-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.lb-name{font-weight:600;font-size:0.86rem;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-ct{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-3);background:var(--elev);border:1px solid var(--border);border-radius:99px;padding:1px 7px;white-space:nowrap;flex-shrink:0}
.lb-actions{display:none;gap:3px;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--content);border-radius:7px}
.lb-card:hover .lb-actions{display:flex}
.lb-card:hover .lb-ct{opacity:0}
.lb-act{width:26px;height:26px;border-radius:6px;display:grid;place-items:center;color:var(--text-3);transition:background .12s,color .12s}
.lb-act:hover{background:var(--elev-2);color:var(--text)}
.lb-act.del:hover{background:var(--danger-soft);color:var(--danger)}
.lb-act svg{width:13px;height:13px}

/* add label row */
.add-lb-row{display:flex;align-items:center;gap:8px;padding:0 14px 14px}
.add-lb-row input{flex:1;background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:8px 11px;font-family:inherit;font-size:0.84rem;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.add-lb-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.add-lb-row input::placeholder{color:var(--text-3)}

/* inline color swatch */
.swatch-pick{display:flex;gap:5px;flex-wrap:wrap}
.sw{width:22px;height:22px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;flex-shrink:0}
.sw:hover{transform:scale(1.18)}
.sw.on{border-color:var(--text)}

/* modal */
.lm-modal{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.lm-modal.open{opacity:1;pointer-events:auto}
.lm-scrim{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.lm-card{position:relative;z-index:1;background:var(--elev);border:1px solid var(--border-2);border-radius:var(--r-lg);width:100%;max-width:440px;padding:24px;display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow-lg)}
.lm-card h2{font-size:1rem;font-weight:800}
.lm-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--text-3)}
.lm-close:hover{background:var(--content);color:var(--text)}
.lf{display:flex;flex-direction:column;gap:5px}
.lf label{font-size:0.8rem;font-weight:600;color:var(--text-2)}
.lf input,.lf select,.lf textarea{background:var(--content);border:1.5px solid var(--border-2);border-radius:9px;padding:9px 12px;font-family:inherit;font-size:0.88rem;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.lf input::placeholder{color:var(--text-3)}
.lf input:focus,.lf select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.lf .preview{display:inline-flex;align-items:center;gap:8px;padding:5px 13px;border-radius:99px;font-size:0.82rem;font-weight:600;margin-top:4px}
.lm-foot{display:flex;justify-content:flex-end;gap:8px;padding-top:6px;border-top:1px solid var(--border)}

/* preview pill (in label list) */
.lb-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:99px;font-size:0.78rem;font-weight:600}

/* empty state */
.lb-empty{padding:28px;text-align:center;color:var(--text-3);font-size:0.84rem}

@media(max-width:900px){.sl-stats{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.sl-stats{grid-template-columns:1fr 1fr}.lb-grid{grid-template-columns:1fr}}
</style>

  {id:"L30",gid:"leavetype",module:"leave",name:"Phép năm",color:"#3B5BDB",desc:"12 ngày/năm",uses:24},
  {id:"L31",gid:"leavetype",module:"leave",name:"Nghỉ ốm",color:"#dc2626",desc:"5 ngày/năm",uses:8},
  {id:"L32",gid:"leavetype",module:"leave",name:"Nghỉ cưới",color:"#be185d",desc:"3 ngày",uses:1},
  {id:"L33",gid:"leavetype",module:"leave",name:"Không lương",color:"#94a3b8",desc:"",uses:2},
  /* customers */
  {id:"L34",gid:"custtype",module:"cust",name:"Khách hàng lớn",color:"#6d28d9",desc:"Enterprise",uses:2},
  {id:"L35",gid:"custtype",module:"cust",name:"SME",color:"#0891b2",desc:"Doanh nghiệp nhỏ/vừa",uses:3},
  {id:"L36",gid:"custtype",module:"cust",name:"Startup",color:"#059669",desc:"",uses:1},
  /* skills */
  {id:"L37",gid:"techskill",module:"skill",name:"React",color:"#0891b2",desc:"",uses:3},
  {id:"L38",gid:"techskill",module:"skill",name:"Node.js",color:"#059669",desc:"",uses:4},
  {id:"L39",gid:"techskill",module:"skill",name:"TypeScript",color:"#3B5BDB",desc:"",uses:5},
  {id:"L40",gid:"techskill",module:"skill",name:"PostgreSQL",color:"#1d4ed8",desc:"",uses:3},
  {id:"L41",gid:"techskill",module:"skill",name:"Figma",color:"#be185d",desc:"",uses:2},
  {id:"L42",gid:"techskill",module:"skill",name:"DevOps",color:"#0f766e",desc:"",uses:2},
  /* system */
  {id:"L43",gid:"sysstate",module:"system",name:"Active",color:"#059669",desc:"",uses:12},
  {id:"L44",gid:"sysstate",module:"system",name:"Inactive",color:"#94a3b8",desc:"",uses:2},
  {id:"L45",gid:"sysstate",module:"system",name:"Pending",color:"#f59e0b",desc:"",uses:5},
  {id:"L46",gid:"sysstate",module:"system",name:"Archived",color:"#64748b",desc:"",uses:1}
];

var activeModule = "all", viewMode = "group", sortAZ = true, searchQ = "";

/* ── Stats ── */
function renderStats(){
  var totalLabels = LABELS.length;
  var totalGroups = GROUPS.length;
  var totalUses = LABELS.reduce(function(s,l){return s+l.uses;},0);
  var totalModules = MODULES.length - 1;
  document.getElementById("slStats").innerHTML=[
    {c:"#3B5BDB",sv:'<path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>',v:totalLabels,l:"Nhãn hệ thống"},
    {c:"#7c3aed",sv:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',v:totalGroups,l:"Nhóm nhãn"},
    {c:"#059669",sv:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>',v:totalModules,l:"Modules"},
    {c:"#d97706",sv:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/>',v:totalUses,l:"Lượt sử dụng"}
  ].map(function(s){
    return '<div class="sl-stat"><span class="si" style="background:'+s.c+'22;color:'+s.c+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">'+s.sv+'</svg></span><div><div class="sv">'+s.v+'</div><div class="sl">'+s.l+'</div></div></div>';
  }).join("");
}

/* ── Module tabs ── */
function renderModTabs(){
  document.getElementById("modTabs").innerHTML = MODULES.map(function(m){
    var ct = m.id==="all" ? LABELS.length : LABELS.filter(function(l){return l.module===m.id;}).length;
    return '<div class="mod-tab'+(activeModule===m.id?" on":"")+'" data-mid="'+m.id+'">'+
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="14" height="14">'+m.svg+'</svg>'+
      m.name+'<span class="mc">'+ct+'</span>'+
    '</div>';
  }).join("");
  document.querySelectorAll(".mod-tab[data-mid]").forEach(function(t){
    t.addEventListener("click",function(){activeModule=t.getAttribute("data-mid");renderModTabs();renderContent();});
  });
}

/* ── Content ── */
function filterLabels(){
  return LABELS.filter(function(l){
    if(activeModule!=="all" && l.module!==activeModule) return false;
    if(searchQ && l.name.toLowerCase().indexOf(searchQ.toLowerCase())===-1 && l.desc.toLowerCase().indexOf(searchQ.toLowerCase())===-1) return false;
    return true;
  }).sort(function(a,b){return sortAZ?a.name.localeCompare(b.name):b.name.localeCompare(a.name);});
}

function renderContent(){
  var list = filterLabels();
  document.getElementById("countLbl").textContent = list.length + " nhãn";

  if(viewMode==="group"){
    /* group view */
    var usedGroups = GROUPS.filter(function(g){
      return list.some(function(l){return l.gid===g.id;});
    });
    document.getElementById("labelContent").innerHTML = usedGroups.map(function(g){
      var gLabels = list.filter(function(l){return l.gid===g.id;});
      var cards = gLabels.map(function(l){return buildLabelCard(l);}).join("");
      return '<div class="lb-group" id="grp-'+g.id+'">'+
        '<div class="lb-group-head" data-gid="'+g.id+'">'+
          '<span class="gh-ico" style="background:'+g.color+'22;color:'+g.color+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">'+g.svg+'</svg></span>'+
          '<span class="gh-name">'+g.name+'</span>'+
          '<span class="gh-ct">'+gLabels.length+'</span>'+
          '<span class="gh-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>'+
        '</div>'+
        '<div class="lb-grid">'+cards+'</div>'+
        '<div class="add-lb-row">'+
          '<input type="text" placeholder="+ Thêm nhãn vào nhóm này…" data-gid="'+g.id+'" class="quick-add-input"/>'+
        '</div>'+
      '</div>';
    }).join("");
  } else {
    /* flat list */
    document.getElementById("labelContent").innerHTML =
      '<div class="lb-group"><div class="lb-grid">'+list.map(function(l){return buildLabelCard(l);}).join("")+'</div></div>';
  }

  /* group toggle */
  document.querySelectorAll(".lb-group-head[data-gid]").forEach(function(h){
    h.addEventListener("click",function(){
      var grp=h.parentElement; grp.classList.toggle("collapsed");
    });
  });

  /* edit / delete actions */
  document.querySelectorAll(".lb-act[data-edit]").forEach(function(b){
    b.addEventListener("click",function(e){e.stopPropagation();openLabelModal(b.getAttribute("data-edit"));});
  });
  document.querySelectorAll(".lb-act.del[data-del]").forEach(function(b){
    b.addEventListener("click",function(e){e.stopPropagation();
      if(confirm("Xóa nhãn này?")){var idx=LABELS.findIndex(function(x){return x.id===b.getAttribute("data-del");}); if(idx>-1)LABELS.splice(idx,1); renderStats(); renderModTabs(); renderContent();}
    });
  });

  /* quick-add */
  document.querySelectorAll(".quick-add-input").forEach(function(inp){
    inp.addEventListener("keydown",function(e){
      if(e.key==="Enter"&&inp.value.trim()){
        var gid=inp.getAttribute("data-gid"), g=GROUPS.find(function(x){return x.id===gid;});
        LABELS.push({id:"L"+(LABELS.length+1),gid:gid,module:g?g.module:"tasks",name:inp.value.trim(),color:g?g.color:PALETTE[0],desc:"",uses:0});
        renderStats(); renderModTabs(); renderContent();
      }
    });
  });
}

function buildLabelCard(l){
  return '<div class="lb-card" id="lc-'+l.id+'" title="'+(l.desc||l.name)+'">'+
    '<span class="lb-dot" style="background:'+l.color+'"></span>'+
    '<span class="lb-name">'+l.name+'</span>'+
    '<span class="lb-ct">'+l.uses+'</span>'+
    '<div class="lb-actions">'+
      '<button class="lb-act" data-edit="'+l.id+'" title="Sửa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></svg></button>'+
      '<button class="lb-act del" data-del="'+l.id+'" title="Xóa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6l-1 14H6L5 6"/></svg></button>'+
    '</div>'+
  '</div>';
}

/* ── Modal ── */
function buildSwatchPicker(selected){
  var row=document.getElementById("lmSwatchRow");
  row.innerHTML=PALETTE.map(function(c){
    return '<span class="sw'+(c===selected?" on":"")+'" style="background:'+c+'" data-c="'+c+'"></span>';
  }).join("");
  row.querySelectorAll(".sw").forEach(function(s){
    s.addEventListener("click",function(){
      row.querySelectorAll(".sw").forEach(function(x){x.classList.toggle("on",x===s);}); lmPickedColor=s.getAttribute("data-c"); updatePreview();
    });
  });
}
function updatePreview(){
  var n=document.getElementById("lmName").value||"Nhãn mẫu";
  var prev=document.getElementById("lmPreview");
  prev.textContent=n; prev.style.background=lmPickedColor+"22"; prev.style.color=lmPickedColor;
}
function openLabelModal(id){
  editingLabelId=id||null;
  var l=id?LABELS.find(function(x){return x.id===id;}):null;
  document.getElementById("lmTitle").textContent=l?"Sửa nhãn":"Thêm nhãn mới";
  document.getElementById("lmName").value=l?l.name:"";
  document.getElementById("lmDesc").value=l?l.desc:"";
  lmPickedColor=l?l.color:PALETTE[0];
  /* populate module select */
  var msel=document.getElementById("lmModule");
  msel.innerHTML=MODULES.filter(function(m){return m.id!=="all";}).map(function(m){return '<option value="'+m.id+'"'+(l&&l.module===m.id?" selected":"")+'>'+m.name+'</option>';}).join("");
  /* populate group select */
  var curMod=l?l.module:MODULES[1].id;
  var gsel=document.getElementById("lmGroup");
  function rebuildGroups(mod){ gsel.innerHTML=GROUPS.filter(function(g){return g.module===mod;}).map(function(g){return '<option value="'+g.id+'"'+(l&&l.gid===g.id?" selected":"")+'>'+g.name+'</option>';}).join(""); }
  rebuildGroups(curMod);
  msel.addEventListener("change",function(){rebuildGroups(this.value);});
  buildSwatchPicker(lmPickedColor); updatePreview();
  document.getElementById("lmName").addEventListener("input",updatePreview);
  document.getElementById("labelModal").classList.add("open");
  document.getElementById("lmName").focus();
}
document.getElementById("addLabelBtn").addEventListener("click",function(){openLabelModal(null);});
document.getElementById("lmClose").addEventListener("click",function(){document.getElementById("labelModal").classList.remove("open");});
document.getElementById("lmScrim").addEventListener("click",function(){document.getElementById("labelModal").classList.remove("open");});
document.getElementById("lmCancel").addEventListener("click",function(){document.getElementById("labelModal").classList.remove("open");});
document.getElementById("lmSave").addEventListener("click",function(){
  var name=document.getElementById("lmName").value.trim(); if(!name){alert("Nhập tên nhãn.");return;}
  var mod=document.getElementById("lmModule").value;
  var gid=document.getElementById("lmGroup").value;
  var desc=document.getElementById("lmDesc").value.trim();
  if(editingLabelId){
    var l=LABELS.find(function(x){return x.id===editingLabelId;});
    if(l){l.name=name;l.color=lmPickedColor;l.module=mod;l.gid=gid;l.desc=desc;}
  } else {
    LABELS.push({id:"L"+(LABELS.length+1),gid:gid,module:mod,name:name,color:lmPickedColor,desc:desc,uses:0});
  }
  document.getElementById("labelModal").classList.remove("open");
  renderStats(); renderModTabs(); renderContent();
});

/* ── View/sort toggles ── */
document.getElementById("viewGroup").addEventListener("click",function(){
  viewMode="group";this.classList.add("on");document.getElementById("viewFlat").classList.remove("on");renderContent();
});
document.getElementById("viewFlat").addEventListener("click",function(){
  viewMode="flat";this.classList.add("on");document.getElementById("viewGroup").classList.remove("on");renderContent();
});
document.getElementById("sortBtn").addEventListener("click",function(){
  sortAZ=!sortAZ;this.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M3 6h18M7 12h10M11 18h2"/></svg>Sắp xếp: '+(sortAZ?"A–Z":"Z–A");renderContent();
});
document.getElementById("searchInput").addEventListener("input",function(){searchQ=this.value;renderContent();});
document.getElementById("importBtn").addEventListener("click",function(){alert("Chức năng import CSV sẽ ra mắt trong phiên bản tiếp theo.");});

/* ── Init ── */
renderStats();
renderModTabs();
renderContent();
</script>
<script src="js/admin.js"></script>
</body>
</html>
